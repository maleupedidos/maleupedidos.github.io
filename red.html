<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Maleu Red — Pedidos Vendedores</title>
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#e65100" />
  <link rel="icon" href="img/logo-icono.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; background: #fafafa; color: #1a1a1a; min-height: 100vh; }

    /* Header */
    .header { background: #331C1C; color: #fff; padding: 1rem 1.2rem; display: flex; align-items: center; gap: .8rem; position: sticky; top: 0; z-index: 100; }
    .header img { width: 36px; height: 36px; border-radius: 50%; }
    .header h1 { font-size: 1rem; font-weight: 700; }
    .header small { font-size: .75rem; opacity: .7; display: block; }
    .badge-red { background: #e65100; color: #fff; font-size: .65rem; padding: 2px 8px; border-radius: 10px; font-weight: 700; margin-left: auto; }

    /* Container */
    .container { max-width: 600px; margin: 0 auto; padding: 1rem; }

    /* Sections */
    .section { background: #fff; border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .section h2 { font-size: .9rem; font-weight: 700; color: #e65100; margin-bottom: .8rem; text-transform: uppercase; letter-spacing: .5px; }

    /* Products */
    .prod-grid { display: flex; flex-direction: column; gap: .5rem; }
    .prod-row { display: flex; align-items: center; justify-content: space-between; padding: .6rem 0; border-bottom: 1px solid #f0f0f0; }
    .prod-row:last-child { border-bottom: none; }
    .prod-info { flex: 1; }
    .prod-name { font-size: .85rem; font-weight: 600; }
    .prod-price { font-size: .8rem; color: #666; }
    .prod-cat { font-size: .7rem; color: #e65100; font-weight: 600; margin-top: .8rem; padding-top: .5rem; border-top: 2px solid #fff3e0; text-transform: uppercase; }
    .qty-ctrl { display: flex; align-items: center; gap: .4rem; }
    .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 2px solid #e65100; background: #fff; color: #e65100; font-size: 1.1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .qty-btn:active { background: #e65100; color: #fff; }
    .qty-val { min-width: 24px; text-align: center; font-weight: 700; font-size: .9rem; }

    /* Form */
    .field { margin-bottom: .8rem; }
    .field label { display: block; font-size: .8rem; font-weight: 600; color: #555; margin-bottom: .3rem; }
    .field input, .field select { width: 100%; padding: .7rem; border: 1.5px solid #ddd; border-radius: 8px; font-size: .9rem; font-family: inherit; background: #fff; }
    .field input:focus, .field select:focus { outline: none; border-color: #e65100; }
    .field .err { color: #c62828; font-size: .75rem; display: none; margin-top: .2rem; }
    .field.invalid input, .field.invalid select { border-color: #c62828; }
    .field.invalid .err { display: block; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: .6rem; }

    /* Pago */
    .pago-opts { display: flex; gap: .6rem; }
    .pago-opt { flex: 1; padding: .7rem; border: 2px solid #ddd; border-radius: 8px; text-align: center; cursor: pointer; font-size: .85rem; font-weight: 600; transition: all .15s; }
    .pago-opt.sel { border-color: #e65100; background: #fff3e0; color: #e65100; }

    /* Summary */
    .summary { background: #f5f5f5; border-radius: 8px; padding: .8rem; }
    .sum-row { display: flex; justify-content: space-between; font-size: .85rem; padding: .25rem 0; }
    .sum-row.total { font-weight: 700; font-size: 1rem; border-top: 2px solid #ddd; padding-top: .5rem; margin-top: .3rem; }
    .sum-row.comision { color: #e65100; font-size: .8rem; }

    /* Submit */
    .submit-btn { width: 100%; padding: 1rem; background: #25D366; color: #fff; border: none; border-radius: 12px; font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; margin-top: .5rem; }
    .submit-btn:disabled { background: #ccc; }
    .submit-btn:active:not(:disabled) { transform: scale(.98); }

    /* Toast */
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(80px); background: #333; color: #fff; padding: .6rem 1.2rem; border-radius: 8px; font-size: .85rem; opacity: 0; transition: all .3s; z-index: 200; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Empty state */
    .empty-msg { text-align: center; padding: 1rem; color: #999; font-size: .85rem; }
  </style>
</head>
<body>

<div class="header">
  <img src="img/logo-icono.png" alt="Maleu" />
  <div>
    <h1>MALEU RED</h1>
    <small>Pedidos para vendedores</small>
  </div>
  <span class="badge-red">VENDEDOR</span>
</div>

<div class="container">

  <!-- DATOS DEL VENDEDOR -->
  <div class="section">
    <h2>Vendedor</h2>
    <div class="field" id="fld-vendedor">
      <label>Tu nombre (vendedor)</label>
      <input type="text" id="f-vendedor" placeholder="Ej: Marcos Bottcher" autocomplete="name" />
      <div class="err">Completá tu nombre</div>
    </div>
  </div>

  <!-- PRODUCTOS -->
  <div class="section">
    <h2>Productos</h2>
    <div class="prod-grid" id="prod-grid"></div>
  </div>

  <!-- DATOS DEL CLIENTE -->
  <div class="section" id="sec-cliente" style="display:none">
    <h2>Datos del cliente</h2>
    <div class="field" id="fld-cliente">
      <label>Nombre del cliente</label>
      <input type="text" id="f-cliente" placeholder="Ej: Juan Pérez" />
      <div class="err">Completá el nombre del cliente</div>
    </div>
    <div class="field" id="fld-telefono">
      <label>WhatsApp / Teléfono</label>
      <input type="tel" id="f-telefono" placeholder="11 5555 5555" />
      <div class="err">Completá el teléfono</div>
    </div>
    <div class="row-2">
      <div class="field" id="fld-partido">
        <label>Partido / Municipio</label>
        <input type="text" id="f-partido" placeholder="Ej: Pilar" />
        <div class="err">Completá el partido</div>
      </div>
      <div class="field" id="fld-localidad">
        <label>Localidad</label>
        <input type="text" id="f-localidad" placeholder="Ej: Garín" />
        <div class="err">Completá la localidad</div>
      </div>
    </div>
    <div class="row-2">
      <div class="field" id="fld-barrio">
        <label>Barrio</label>
        <input type="text" id="f-barrio" placeholder="Ej: Centro" />
        <div class="err">Completá el barrio</div>
      </div>
      <div class="field" id="fld-domicilio">
        <label>Domicilio / Lote</label>
        <input type="text" id="f-domicilio" placeholder="Ej: San Martín 456" />
        <div class="err">Completá el domicilio</div>
      </div>
    </div>
    <div class="row-2">
      <div class="field" id="fld-dia">
        <label>Día de entrega</label>
        <select id="f-dia">
          <option value="">Elegí un día</option>
          <option value="Lunes">Lunes</option>
          <option value="Miércoles">Miércoles</option>
          <option value="Viernes">Viernes</option>
        </select>
        <div class="err">Elegí un día</div>
      </div>
      <div class="field">
        <label>Método de pago</label>
        <div class="pago-opts">
          <div class="pago-opt" data-val="Efectivo" onclick="setPago(this)">Efectivo</div>
          <div class="pago-opt" data-val="Transferencia" onclick="setPago(this)">Transfer</div>
        </div>
      </div>
    </div>
  </div>

  <!-- RESUMEN -->
  <div class="section" id="sec-resumen" style="display:none">
    <h2>Resumen</h2>
    <div class="summary" id="summary"></div>
    <button class="submit-btn" id="btn-enviar" onclick="enviar()" disabled>Enviar pedido por WhatsApp</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxmrG5YVSshcYezk8lXFx_uxb7NFGcb9EfTXc7dsIN4rZyj73CET4mk_aKPFPDY2wNi/exec";
const WA_NUMBER = "5491155038905";

const PRODUCTOS = [
  { id:19, cat:"Pizzas Premium",   nombre:"Pizza Muzzarella",              precio:11000 },
  { id:1,  cat:"Pizzas Premium",   nombre:"Pizza Margarita",               precio:11000 },
  { id:2,  cat:"Pizzas Premium",   nombre:"Pizza Jamón y Queso",           precio:11000 },
  { id:3,  cat:"Pizzas Premium",   nombre:"Pizza Cebolla Caramelizada",    precio:11000 },
  { id:4,  cat:"Pizzas Premium",   nombre:"Pizza Jamón y Morrón",          precio:12000 },
  { id:5,  cat:"Pizzas Clásicas",  nombre:"Pack Muzarella x2",             precio:16000 },
  { id:6,  cat:"Pizzas Clásicas",  nombre:"Pack Jamón y Queso x2",         precio:16000 },
  { id:7,  cat:"Pizzas Clásicas",  nombre:"Pack Cebolla y Queso x2",       precio:16000 },
  { id:8,  cat:"Sorrentinos",      nombre:"Sorrentinos Cordero al Malbec", precio:17500 },
  { id:9,  cat:"Sorrentinos",      nombre:"Sorrentinos Jamón y Queso",     precio:16300 },
  { id:10, cat:"Sorrentinos",      nombre:"Sorrentinos Calabaza y Queso",  precio:14700 },
  { id:20, cat:"Sorrentinos",      nombre:"Sorrentinos Queso Brie",        precio:19300 },
  { id:21, cat:"Sorrentinos",      nombre:"Sorrentinos Langostinos",       precio:19300 },
  { id:22, cat:"Sorrentinos",      nombre:"Sorrentinos Pollo y Puerro",    precio:16300 },
  { id:23, cat:"Sorrentinos",      nombre:"Sorrentinos Espinaca",          precio:15100 },
  { id:11, cat:"Empanadas",        nombre:"Empanadas Carne a Cuchillo x8", precio:18800 },
  { id:12, cat:"Empanadas",        nombre:"Empanadas Jamón y Queso x8",    precio:16000 },
  { id:17, cat:"Empanadas",        nombre:"Empanadas Cebolla y Queso x8",  precio:16000 },
  { id:18, cat:"Empanadas",        nombre:"Empanadas Verdura x8",          precio:16000 },
  { id:13, cat:"Postres & Tortas", nombre:"Franui Leche",                  precio:8000  },
  { id:14, cat:"Postres & Tortas", nombre:"Torta Golosa",                  precio:24000 },
  { id:15, cat:"Postres & Tortas", nombre:"Torta Lemon Crumble",           precio:24000 },
  { id:16, cat:"Postres & Tortas", nombre:"Torta Coco",                    precio:24000 },
];

const cart = {};
let pago = '';

function ars(n) { return '$' + n.toLocaleString('es-AR'); }

// Render products
function renderProducts() {
  const grid = document.getElementById('prod-grid');
  let lastCat = '';
  let html = '';
  PRODUCTOS.forEach(p => {
    if (p.cat !== lastCat) {
      lastCat = p.cat;
      html += '<div class="prod-cat">' + p.cat + '</div>';
    }
    html += '<div class="prod-row">' +
      '<div class="prod-info"><div class="prod-name">' + p.nombre + '</div><div class="prod-price">' + ars(p.precio) + '</div></div>' +
      '<div class="qty-ctrl">' +
        '<button class="qty-btn" onclick="changeQty(' + p.id + ',-1)">-</button>' +
        '<span class="qty-val" id="qty-' + p.id + '">0</span>' +
        '<button class="qty-btn" onclick="changeQty(' + p.id + ',1)">+</button>' +
      '</div>' +
    '</div>';
  });
  grid.innerHTML = html;
}

function changeQty(id, delta) {
  const cur = cart[id] || 0;
  const next = Math.max(0, cur + delta);
  if (next === 0) delete cart[id]; else cart[id] = next;
  document.getElementById('qty-' + id).textContent = next;
  updateUI();
}

function updateUI() {
  const count = Object.values(cart).reduce((a, b) => a + b, 0);
  const secCliente = document.getElementById('sec-cliente');
  const secResumen = document.getElementById('sec-resumen');

  if (count > 0) {
    secCliente.style.display = '';
    secResumen.style.display = '';
    renderSummary();
  } else {
    secCliente.style.display = 'none';
    secResumen.style.display = 'none';
  }
  document.getElementById('btn-enviar').disabled = count === 0;
}

function renderSummary() {
  let total = 0;
  let lines = '';
  PRODUCTOS.forEach(p => {
    const qty = cart[p.id] || 0;
    if (qty === 0) return;
    const sub = p.precio * qty;
    total += sub;
    lines += '<div class="sum-row"><span>' + p.nombre + (qty > 1 ? ' x' + qty : '') + '</span><span>' + ars(sub) + '</span></div>';
  });
  const comision = Math.round(total * 17 / 100);
  lines += '<div class="sum-row total"><span>Total</span><span>' + ars(total) + '</span></div>';
  lines += '<div class="sum-row comision"><span>Tu comision (17%)</span><span>' + ars(comision) + '</span></div>';
  document.getElementById('summary').innerHTML = lines;
}

function setPago(el) {
  document.querySelectorAll('.pago-opt').forEach(o => o.classList.remove('sel'));
  el.classList.add('sel');
  pago = el.dataset.val;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function validate() {
  let ok = true;
  const fields = [
    ['fld-vendedor', 'f-vendedor'],
    ['fld-cliente', 'f-cliente'],
    ['fld-telefono', 'f-telefono'],
    ['fld-partido', 'f-partido'],
    ['fld-localidad', 'f-localidad'],
    ['fld-barrio', 'f-barrio'],
    ['fld-domicilio', 'f-domicilio'],
    ['fld-dia', 'f-dia'],
  ];
  fields.forEach(([fld, inp]) => {
    const el = document.getElementById(fld);
    const val = document.getElementById(inp).value.trim();
    if (!val) { el.classList.add('invalid'); ok = false; }
    else el.classList.remove('invalid');
  });
  if (document.getElementById('f-telefono').value.replace(/\D/g, '').length < 8) {
    document.getElementById('fld-telefono').classList.add('invalid'); ok = false;
  }
  if (!pago) { toast('Elegí un método de pago'); ok = false; }
  return ok;
}

function enviar() {
  if (!validate()) return;

  const vendedor = document.getElementById('f-vendedor').value.trim();
  const nombre = document.getElementById('f-cliente').value.trim();
  const telefono = document.getElementById('f-telefono').value.trim();
  const partido = document.getElementById('f-partido').value.trim();
  const localidad = document.getElementById('f-localidad').value.trim();
  const barrio = document.getElementById('f-barrio').value.trim();
  const domicilio = document.getElementById('f-domicilio').value.trim();
  const dia = document.getElementById('f-dia').value;

  const items = [];
  let total = 0;
  PRODUCTOS.forEach(p => {
    const qty = cart[p.id] || 0;
    if (qty > 0) {
      items.push({ id: p.id, nombre: p.nombre, qty, precio: p.precio });
      total += p.precio * qty;
    }
  });

  // POST a Sheets
  const postData = {
    canal: 'Red', vendedor, nombre, telefono,
    partido, localidad, barrioRed: barrio, domicilioRed: domicilio,
    dia, horario: 'A coordinar', pago,
    envio: 0, items, total,
    subtotalSinDescuento: total, descuento: 0
  };
  sendWithRetry(postData, 3);

  // WhatsApp
  const prodLines = items.map(i => '  - ' + i.nombre + (i.qty > 1 ? ' x' + i.qty : '') + '  ' + ars(i.precio * i.qty)).join('\n');
  const pagoStr = pago === 'Efectivo' ? 'Efectivo' : 'Mercado Pago';
  const msg = '*NUEVO PEDIDO -- MALEU RED*\n\n'
    + prodLines + '\n\n'
    + '---\n'
    + '*Total: ' + ars(total) + '*\n'
    + '---\n\n'
    + '*Vendedor:* ' + vendedor + '\n'
    + '*Cliente:* ' + nombre + '\n'
    + '*Zona:* ' + partido + ', ' + localidad + '\n'
    + '*Direccion:* ' + barrio + ', ' + domicilio + '\n'
    + '*WhatsApp:* ' + telefono + '\n'
    + '*Entrega:* ' + dia + '\n'
    + '*Pago:* ' + pagoStr
    + (pago === 'Transferencia' ? '\nAlias: *maleump*\nTitular: Tadeo Alberto Ustariz' : '');

  // Save form
  try {
    localStorage.setItem('maleu_red_vendedor', JSON.stringify({ vendedor, partido, localidad, barrio }));
  } catch(e) {}

  // Show confirm then redirect
  const btn = document.getElementById('btn-enviar');
  btn.disabled = true;
  btn.textContent = 'Pedido registrado';
  btn.style.background = '#2e7d32';

  setTimeout(function() {
    window.location.href = 'https://wa.me/' + WA_NUMBER + '?text=' + encodeURIComponent(msg);
  }, 800);

  setTimeout(function() {
    // Reset
    Object.keys(cart).forEach(k => delete cart[k]);
    PRODUCTOS.forEach(p => { const el = document.getElementById('qty-' + p.id); if (el) el.textContent = '0'; });
    document.getElementById('f-cliente').value = '';
    document.getElementById('f-telefono').value = '';
    document.getElementById('f-domicilio').value = '';
    document.getElementById('f-dia').value = '';
    pago = '';
    document.querySelectorAll('.pago-opt').forEach(o => o.classList.remove('sel'));
    btn.disabled = false;
    btn.textContent = 'Enviar pedido por WhatsApp';
    btn.style.background = '';
    updateUI();
  }, 2000);
}

function sendWithRetry(data, retries) {
  fetch(APPS_SCRIPT_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(data)
  }).catch(function() {
    if (retries > 1) setTimeout(function() { sendWithRetry(data, retries - 1); }, 2000);
  });
}

// Load saved vendedor data
try {
  const saved = JSON.parse(localStorage.getItem('maleu_red_vendedor') || 'null');
  if (saved) {
    if (saved.vendedor) document.getElementById('f-vendedor').value = saved.vendedor;
    if (saved.partido) document.getElementById('f-partido').value = saved.partido;
    if (saved.localidad) document.getElementById('f-localidad').value = saved.localidad;
    if (saved.barrio) document.getElementById('f-barrio').value = saved.barrio;
  }
} catch(e) {}

renderProducts();
</script>
</body>
</html>
