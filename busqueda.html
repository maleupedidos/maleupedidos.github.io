<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#331C1C">
<link rel="manifest" href="/busqueda-manifest.json">
<link rel="icon" href="/img/favicon.png">
<link rel="apple-touch-icon" href="/img/favicon.png">
<title>Maleu Sourcing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#F5F2EB;color:#331C1C;overflow-x:hidden;min-height:100dvh}

/* ── TOP BAR ── */
.topbar{background:#331C1C;color:#F2E8C7;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar h1{font-size:15px;font-weight:800;flex:1;letter-spacing:.03em}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.status-dot.online{background:#4CAF50}
.status-dot.offline{background:#F44336;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.badge{background:#F07D47;color:#fff;font-size:11px;font-weight:800;padding:3px 8px;border-radius:50px}
.btn-refresh{background:none;border:none;color:#F2E8C7;font-size:20px;cursor:pointer;padding:8px;border-radius:8px;line-height:1}
.btn-refresh:active{background:rgba(255,255,255,.15)}
.btn-refresh.spinning{animation:spin .8s linear}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TABS ── */
.tabs{display:flex;background:#E8DFC4;position:sticky;top:52px;z-index:99}
.tab{flex:1;padding:11px 4px;text-align:center;font-size:12px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;transition:.15s}
.tab.active{border-bottom-color:#F07D47;color:#F07D47}

/* ── LOADING / EMPTY ── */
.loading,.empty{text-align:center;padding:60px 20px;color:#7A4A4A}
.loading{font-style:italic}

/* ── PROVEEDOR CARD ── */
.prov-card{background:#fff;border-radius:14px;padding:16px;margin:8px;border:2px solid #E8DFC4}
.prov-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.prov-name{font-size:17px;font-weight:800}
.prov-cost{font-size:15px;font-weight:800;color:#F07D47}
.prov-cat{font-size:11px;font-weight:800;color:#F07D47;text-transform:uppercase;letter-spacing:.04em;margin:10px 0 4px;padding-top:8px;border-top:1px solid #F2E8C7}
.prov-cat:first-of-type{border-top:none;margin-top:0;padding-top:0}
.prov-item{display:flex;align-items:center;gap:8px;padding:3px 0;font-size:14px}
.prov-qty{font-weight:800;color:#331C1C;min-width:32px}
.prov-var{font-weight:500}
.prov-item-cost{margin-left:auto;font-size:12px;color:#7A4A4A}

/* ── ACTION BUTTONS ── */
.btn-wa{display:block;width:100%;margin-top:12px;padding:12px;background:#25D366;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;text-align:center}
.btn-wa:active{background:#1da851}
.btn-pedido{display:block;width:100%;margin-top:8px;padding:12px;background:#331C1C;color:#F2E8C7;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;text-align:center}
.btn-pedido:active{background:#5a3a3a}
.btn-pedido.done{background:#4CAF50;color:#fff}
.btn-recibir{display:block;width:100%;margin-top:8px;padding:12px;background:#1565C0;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;text-align:center}
.btn-recibir:active{background:#0d47a1}
.btn-recibir.done{background:#4CAF50}

/* ── RECIBIR PANEL ── */
.recibir-panel{margin-top:10px;background:#F2E8C7;border-radius:10px;padding:12px;display:none}
.recibir-panel.open{display:block}
.recibir-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #E8DFC4}
.recibir-row:last-child{border:none}
.recibir-name{flex:1;font-size:13px;font-weight:600}
.recibir-orig{font-size:12px;color:#7A4A4A;min-width:30px;text-align:center}
.recibir-arrow{font-size:14px;color:#7A4A4A}
.recibir-qty{width:50px;text-align:center;padding:8px 4px;border:2px solid #E8DFC4;border-radius:8px;font-size:16px;font-weight:800;font-family:inherit;background:#fff;outline:none}
.recibir-qty:focus{border-color:#1565C0}
.recibir-qty.changed{border-color:#e67e22;background:#fff3e0}
.recibir-qty.zero{border-color:#c0392b;background:#fce8e8}
.btn-confirmar-recibir{display:block;width:100%;margin-top:10px;padding:12px;background:#4CAF50;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.btn-confirmar-recibir:active{background:#388E3C}

/* ── TOTAL BAR ── */
.total-bar{background:#331C1C;color:#F2E8C7;border-radius:14px;padding:16px;margin:8px;display:flex;justify-content:space-between;align-items:center;font-size:16px;font-weight:800}
.total-bar .amount{color:#F07D47;font-size:18px}

/* ── NAV CARDS (hierarchical) ── */
.nav-card{background:#fff;border-radius:14px;padding:16px;margin:8px;border:2px solid #E8DFC4;display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s}
.nav-card:active{background:#F2E8C7;border-color:#F07D47}
.nav-card-icon{font-size:24px;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-card-icon.vd{background:#E8F5E9;color:#2E7D32}
.nav-card-icon.vi{background:#E3F2FD;color:#1565C0}
.nav-card-icon.zone{background:#FFF3E0;color:#F07D47}
.nav-card-body{flex:1}
.nav-card-title{font-size:16px;font-weight:800}
.nav-card-sub{font-size:12px;color:#7A4A4A;margin-top:2px}
.nav-card-count{font-size:20px;font-weight:800;color:#F07D47}
.nav-card-arrow{font-size:18px;color:#D4C8A0}
.ped-back{display:flex;align-items:center;gap:8px;padding:12px 8px;font-size:14px;font-weight:700;color:#F07D47;cursor:pointer}
.ped-back:active{opacity:.6}
.ped-summary{text-align:center;padding:16px 8px 8px;font-size:14px;color:#7A4A4A;font-weight:600}
.ped-summary strong{font-size:28px;font-weight:800;color:#331C1C;display:block;margin-bottom:2px}

/* ── CLIENTE CARD ── */
.cliente-card{background:#fff;border-radius:14px;padding:16px;margin:8px;border:2px solid #E8DFC4}
.cliente-head{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.cliente-name{font-size:16px;font-weight:800;flex:1}
.cliente-canal{font-size:10px;font-weight:700;background:#F07D47;color:#fff;padding:2px 8px;border-radius:50px}
.cliente-ped{font-size:11px;color:#7A4A4A;margin-bottom:8px}
.cliente-dir{font-size:12px;color:#7A4A4A;margin-bottom:8px}
.cliente-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:14px;border-bottom:1px solid #F2E8C7}
.cliente-item:last-child{border:none}
.cliente-item-qty{font-weight:800;color:#F07D47;min-width:30px}
.cliente-item-name{flex:1;font-weight:500}
.cliente-item-price{font-size:12px;color:#7A4A4A}
.cliente-total{display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:2px solid #F2E8C7;font-weight:800}
.cliente-total .amount{color:#F07D47}
.done-card{opacity:.5;border-color:#4CAF50}
.item-pendiente{background:#FFF8F0;border-radius:6px;padding:4px 8px!important;margin:2px 0}
.btn-call{display:block;width:100%;margin-top:10px;padding:10px;background:#25D366;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none}
.btn-call:active{background:#1da851}

/* ── NUEVO PEDIDO TAB ── */
.np-section{padding:8px}
.np-field{margin-bottom:14px}
.np-label{font-size:12px;font-weight:700;color:#7A4A4A;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.np-select{width:100%;padding:12px;border:2px solid #E8DFC4;border-radius:10px;font-family:inherit;font-size:14px;color:#331C1C;background:#fff;appearance:none;outline:none}
.np-select:focus{border-color:#F07D47}
.np-empty{font-size:13px;color:#7A4A4A;font-style:italic;padding:20px;text-align:center}
.np-prod-card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:8px;border:2px solid #E8DFC4;display:flex;align-items:center;gap:10px}
.np-prod-info{flex:1}
.np-prod-name{font-size:14px;font-weight:700}
.np-prod-meta{font-size:11px;color:#7A4A4A;margin-top:2px}
.np-prod-stock{font-size:10px;font-weight:700;padding:2px 6px;border-radius:50px;display:inline-block}
.stock-ok{background:#e8f5e8;color:#2e7d32}
.stock-low{background:#fff3e0;color:#e67e22}
.stock-out{background:#fce8e8;color:#c0392b}
.np-qty-wrap{display:flex;align-items:center;gap:0;border:2px solid #E8DFC4;border-radius:10px;overflow:hidden}
.np-qty-btn{width:40px;height:40px;border:none;background:#F2E8C7;font-size:20px;font-weight:800;color:#331C1C;cursor:pointer;display:flex;align-items:center;justify-content:center}
.np-qty-btn:active{background:#E8DFC4}
.np-qty-val{width:40px;text-align:center;font-size:16px;font-weight:800;border:none;outline:none;font-family:inherit;background:#fff}
/* iOS zoom fix: all inputs/selects must be >= 16px */
select,input[type="number"]{font-size:16px}
.np-origen-toggle{display:flex;border-radius:8px;overflow:hidden;border:2px solid #E8DFC4;margin-top:6px}
.np-origen-opt{flex:1;padding:6px 4px;text-align:center;font-size:11px;font-weight:700;cursor:pointer;transition:.15s;background:#fff;color:#7A4A4A}
.np-origen-opt.active-oc{background:#1565C0;color:#fff;border-color:#1565C0}
.np-origen-opt.active-dep{background:#4CAF50;color:#fff;border-color:#4CAF50}
.np-summary{background:#F2E8C7;border-radius:14px;padding:16px;margin:8px 0}
.np-summary-title{font-size:11px;font-weight:800;color:#F07D47;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.np-summary-line{display:flex;justify-content:space-between;font-size:13px;padding:2px 0}
.np-summary-total{display:flex;justify-content:space-between;font-weight:800;font-size:15px;border-top:2px solid #D4C8A0;margin-top:6px;padding-top:8px}
.np-summary-total .amount{color:#F07D47}
.btn-confirm{display:block;width:100%;margin-top:12px;padding:16px;background:#331C1C;color:#F2E8C7;border:none;border-radius:14px;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer}
.btn-confirm:active{background:#5a3a3a}
.btn-confirm:disabled{background:#ccc;color:#888;cursor:not-allowed}
.btn-confirm.success{background:#4CAF50;color:#fff}
.btn-confirm.hide{display:none}

/* ── STOCK OVERVIEW TABLE ── */
.stock-overview{margin:0 0 12px}
.stock-title{font-size:12px;font-weight:800;color:#F07D47;text-transform:uppercase;letter-spacing:.06em;padding:8px 0 6px}
.stock-table{width:100%;border-collapse:collapse;font-size:13px}
.stock-table th{font-size:10px;font-weight:700;color:#7A4A4A;text-transform:uppercase;letter-spacing:.04em;text-align:center;padding:6px 4px;border-bottom:2px solid #E8DFC4}
.stock-table th:first-child{text-align:left}
.stock-table td{padding:6px 4px;text-align:center;border-bottom:1px solid #F2E8C7}
.stock-table td:first-child{text-align:left;font-weight:700;font-size:12px}
.stock-table .val-stock{color:#331C1C;font-weight:700}
.stock-table .val-pedido{color:#1565C0;font-weight:800}
.stock-table .val-total{font-weight:800}
.stock-table .val-total.ok{color:#4CAF50}
.stock-table .val-total.low{color:#e67e22}
.stock-table .val-total.zero{color:#c0392b}
.stock-prov-header{font-size:11px;font-weight:800;color:#F07D47;text-transform:uppercase;letter-spacing:.04em;padding:10px 4px 4px;border-bottom:none!important}
.stock-prov-header td{border-bottom:none;text-align:left;padding:10px 4px 2px}

/* ── SYNC BANNER ── */
.sync-banner{background:#FFF3E0;color:#E65100;text-align:center;padding:6px;font-size:11px;font-weight:700;display:none}
.sync-banner.visible{display:block}

/* ── PAGOS TAB ── */
.deuda-card{background:#fff;border-radius:14px;padding:16px;margin:8px;border:2px solid #E8DFC4}
.deuda-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.deuda-prov{font-size:17px;font-weight:800}
.deuda-total{font-size:18px;font-weight:800;color:#c0392b}
.deuda-total.cero{color:#4CAF50}
.deuda-sem{display:flex;justify-content:space-between;padding:3px 0;font-size:13px;border-bottom:1px solid #F2E8C7}
.deuda-sem:last-child{border:none}
.deuda-sem-label{color:#7A4A4A}
.deuda-sem-monto{font-weight:700}
.pago-form{margin-top:12px;background:#F2E8C7;border-radius:12px;padding:14px;display:none}
.pago-form.open{display:block}
.pago-row{display:flex;gap:8px;margin-bottom:8px}
.pago-input-wrap{flex:1}
.pago-input-label{font-size:10px;font-weight:700;color:#7A4A4A;text-transform:uppercase;margin-bottom:3px}
.pago-input{width:100%;padding:10px;border:2px solid #E8DFC4;border-radius:8px;font-family:inherit;font-size:16px;font-weight:700;text-align:right;outline:none;background:#fff}
.pago-input:focus{border-color:#F07D47}
.pago-notas{width:100%;padding:8px;border:2px solid #E8DFC4;border-radius:8px;font-family:inherit;font-size:13px;outline:none;resize:none;margin-bottom:8px}
.pago-total-line{display:flex;justify-content:space-between;font-weight:800;font-size:15px;margin-bottom:10px}
.pago-total-line .amount{color:#F07D47}
.btn-pagar{display:block;width:100%;padding:14px;background:#4CAF50;color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer}
.btn-pagar:active{background:#388E3C}
.btn-pagar:disabled{background:#ccc;color:#888}
.btn-toggle-pago{display:block;width:100%;margin-top:10px;padding:12px;background:#331C1C;color:#F2E8C7;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer}
.btn-toggle-pago:active{background:#5a3a3a}
.al-dia{text-align:center;padding:20px;font-size:14px;color:#4CAF50;font-weight:700}

/* ── TOAST ── */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#331C1C;color:#F2E8C7;padding:10px 20px;border-radius:50px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1}

.hidden{display:none!important}
</style>
</head>
<body>

<div class="topbar">
  <h1>MALEU SOURCING</h1>
  <span id="lastSync" style="font-size:10px;opacity:.6"></span>
  <div class="status-dot" id="statusDot"></div>
  <span class="badge" id="counterBadge">--</span>
  <button class="btn-refresh" id="btnRefresh" onclick="refresh()">&#x21bb;</button>
</div>

<div class="sync-banner" id="syncBanner">Hay acciones pendientes de sincronizar</div>

<div class="tabs">
  <div class="tab active" data-tab="proveedores" onclick="switchTab('proveedores')">BUSQUEDA</div>
  <div class="tab" data-tab="pedidos" onclick="switchTab('pedidos')">ARMADO</div>
  <div class="tab" data-tab="pagos" onclick="switchTab('pagos')">PAGOS</div>
  <div class="tab" data-tab="nuevo" onclick="switchTab('nuevo')">+ NUEVO</div>
</div>

<div id="loadingView" class="loading">Cargando ordenes de compra...</div>
<div id="emptyView" class="empty hidden">
  <div style="font-size:36px;margin-bottom:12px">&#x2713;</div>
  <div style="font-size:16px;font-weight:700;margin-bottom:4px">Sin ordenes pendientes</div>
  <div style="font-size:13px;color:#7A4A4A">No hay productos para buscar esta semana</div>
</div>
<div id="errorView" class="empty hidden" style="color:#E65100">
  <div style="font-size:36px;margin-bottom:12px">&#x26A0;</div>
  <div style="font-size:16px;font-weight:700;margin-bottom:4px">No se pudo conectar</div>
  <div style="font-size:13px">Toca el boton de refresh o abri con wifi</div>
</div>

<!-- PROVEEDORES -->
<div id="provView" class="hidden"><div id="provList"></div></div>

<!-- PEDIDOS -->
<div id="pedidosView" class="hidden"><div id="pedidosList"></div></div>

<!-- PAGOS -->
<div id="pagosView" class="hidden"><div id="pagosList"></div></div>

<!-- NUEVO PEDIDO -->
<div id="nuevoView" class="hidden">
  <div class="np-section">
    <div class="np-field">
      <div class="np-label">Para quien es la compra</div>
      <select class="np-select" id="npVendedor" onchange="onNpVendedorChange()">
        <option value="Tadeo — Stock">Tadeo — Stock (Deposito)</option>
        <option value="Marcos Bottcher">Marcos Bottcher (Red)</option>
      </select>
    </div>
    <div class="np-field">
      <div class="np-label">Proveedor</div>
      <select class="np-select" id="npProv" onchange="onNpProvChange()">
        <option value="">Elegir proveedor...</option>
      </select>
    </div>
    <div id="npStockOverview"></div>
    <div id="npProductsList"></div>
    <div id="npSummary" class="hidden"></div>
    <button class="btn-confirm hide" id="npConfirm" onclick="confirmarCompra()" disabled>Confirmar compra</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   MALEU BUSQUEDA — Hoja de ruta de compra a proveedores
   ═══════════════════════════════════════════════════════════ */

var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxmrG5YVSshcYezk8lXFx_uxb7NFGcb9EfTXc7dsIN4rZyj73CET4mk_aKPFPDY2wNi/exec';

/* ── STATE ─────────────────────────────────────────────── */
var busqueda = { provs: [], clientes: [], total: 0, ocs: [] };
var catalogo = { proveedores: [], productos: {} };
var syncQueue = [];
var marcadosPedido = {};
var marcadosRecibido = {};
var waCopied = {};
var armadoChecked = {};
var currentTab = 'proveedores';
var isOnline = navigator.onLine;
var npQtys = {}; // { "PMu": 3, "ECaC": 1 }
var npOrigins = {}; // { "PMu": "Orden de Compra", "TLC": "Depósito" }

/* ── INIT ──────────────────────────────────────────────── */
loadLocal();
updateOnlineStatus();
window.addEventListener('online', function() { isOnline = true; updateOnlineStatus(); processSyncQueue(); refresh(true); });
window.addEventListener('offline', function() { isOnline = false; updateOnlineStatus(); });

if (busqueda.provs.length > 0 || busqueda.clientes.length > 0) {
  document.getElementById('loadingView').classList.add('hidden');
  render();
  updateLastSync();
  refresh(true);
} else {
  refresh();
}

// Cargar catalogo para tab Nuevo
loadCatalogo();

setInterval(function() { if (isOnline && document.visibilityState === 'visible') refresh(true); }, 90000);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw-busqueda.js').catch(function() {});
}

/* ── ONLINE STATUS ─────────────────────────────────────── */
function updateOnlineStatus() {
  document.getElementById('statusDot').className = 'status-dot ' + (isOnline ? 'online' : 'offline');
}

function updateLastSync() {
  var now = new Date();
  document.getElementById('lastSync').textContent = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
}

/* ── LOCAL STORAGE ─────────────────────────────────────── */
function saveLocal() {
  try {
    localStorage.setItem('maleu_busqueda', JSON.stringify({
      busqueda: busqueda, catalogo: catalogo, syncQueue: syncQueue, marcadosPedido: marcadosPedido, marcadosRecibido: marcadosRecibido, waCopied: waCopied, armadoChecked: armadoChecked, ts: Date.now()
    }));
  } catch(e) {}
}

function loadLocal() {
  try {
    var d = JSON.parse(localStorage.getItem('maleu_busqueda') || '{}');
    if (d.busqueda) busqueda = d.busqueda;
    if (d.catalogo && d.catalogo.proveedores) catalogo = d.catalogo;
    if (d.syncQueue) syncQueue = d.syncQueue;
    if (d.marcadosPedido) marcadosPedido = d.marcadosPedido;
    if (d.marcadosRecibido) marcadosRecibido = d.marcadosRecibido;
    if (d.waCopied) waCopied = d.waCopied;
    if (d.armadoChecked) armadoChecked = d.armadoChecked;
  } catch(e) {}
}

/* ── REFRESH (OC data) ─────────────────────────────────── */
function refresh(silent) {
  if (!silent) document.getElementById('loadingView').classList.remove('hidden');
  var btn = document.getElementById('btnRefresh');
  btn.classList.add('spinning');

  fetch(APPS_SCRIPT_URL + '?action=busqueda&t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      btn.classList.remove('spinning');
      busqueda = data;
      var provNames = {};
      busqueda.provs.forEach(function(p) { provNames[p.n] = true; });
      Object.keys(marcadosPedido).forEach(function(k) { if (!provNames[k]) delete marcadosPedido[k]; });
      saveLocal();
      render();
      updateLastSync();
      document.getElementById('loadingView').classList.add('hidden');
      processSyncQueue();
    })
    .catch(function() {
      btn.classList.remove('spinning');
      document.getElementById('loadingView').classList.add('hidden');
      if (busqueda.provs.length > 0) { render(); showToast('Sin conexion - datos del cache'); }
      else { document.getElementById('errorView').classList.remove('hidden'); }
    });
}

/* ── LOAD CATALOGO (products for Nuevo tab) ────────────── */
function loadCatalogo() {
  // If we have cached catalogo, populate the dropdown immediately
  if (catalogo.proveedores.length > 0) populateProvSelect();

  fetch(APPS_SCRIPT_URL + '?action=catalogo&t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      catalogo = data;
      saveLocal();
      populateProvSelect();
    })
    .catch(function() {
      if (catalogo.proveedores.length > 0) populateProvSelect();
    });
}

function populateProvSelect() {
  var sel = document.getElementById('npProv');
  var current = sel.value;
  sel.innerHTML = '<option value="">Elegir proveedor...</option>';
  catalogo.proveedores.forEach(function(p) {
    var opt = document.createElement('option');
    opt.value = p; opt.textContent = p;
    sel.appendChild(opt);
  });
  if (current) sel.value = current;
}

/* ── HELPERS ───────────────────────────────────────────── */
function formatMoney(n) { return '$' + n.toLocaleString('es-AR'); }
function esc(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

/* ── RENDER ────────────────────────────────────────────── */
function render() {
  var hasProv = busqueda.provs && busqueda.provs.length > 0;
  var hasCli = busqueda.clientes && busqueda.clientes.length > 0;

  document.getElementById('counterBadge').textContent = (busqueda.provs ? busqueda.provs.length : 0) + ' prov';
  document.getElementById('syncBanner').className = 'sync-banner' + (syncQueue.length > 0 ? ' visible' : '');
  document.getElementById('errorView').classList.add('hidden');

  if (!hasProv && !hasCli && currentTab !== 'nuevo' && currentTab !== 'pagos') {
    document.getElementById('provView').classList.add('hidden');
    document.getElementById('pedidosView').classList.add('hidden');
    document.getElementById('pagosView').classList.add('hidden');
    document.getElementById('nuevoView').classList.add('hidden');
    document.getElementById('emptyView').classList.remove('hidden');
    return;
  }
  document.getElementById('emptyView').classList.add('hidden');

  if (currentTab === 'proveedores') renderProveedores();
  else if (currentTab === 'pedidos') renderPedidos();
  else if (currentTab === 'pagos') renderPagos();
  else renderNuevo();
}

/* ── PROVEEDORES TAB ───────────────────────────────────── */
function renderProveedores() {
  document.getElementById('provView').classList.remove('hidden');
  document.getElementById('pedidosView').classList.add('hidden');
  document.getElementById('pagosView').classList.add('hidden');
  document.getElementById('nuevoView').classList.add('hidden');

  var html = '';
  busqueda.provs.forEach(function(prov, idx) {
    // Determinar estado real desde los datos del servidor
    var provOcs = getOcsByProv(prov.n);
    var allPedido = provOcs.length > 0 && provOcs.every(function(oc) { return oc.est === 'Pedido' || oc.est === 'Recibido'; });
    var allRecibido = provOcs.length > 0 && provOcs.every(function(oc) { return oc.est === 'Recibido' || oc.est === 'Cancelado'; });
    // Local overrides (para cuando aún no se sincronizó)
    if (marcadosPedido[prov.n]) allPedido = true;
    if (marcadosRecibido[prov.n]) allRecibido = true;

    html += '<div class="prov-card">';
    html += '<div class="prov-head"><span class="prov-name">' + prov.n + '</span><span class="prov-cost">' + formatMoney(prov.costo) + '</span></div>';

    prov.cats.forEach(function(c) {
      html += '<div class="prov-cat">' + c.cat + '</div>';
      c.items.forEach(function(it) {
        html += '<div class="prov-item"><span class="prov-qty">' + it.q + ' &times;</span><span class="prov-var">' + (it.v || c.cat) + '</span><span class="prov-item-cost">' + formatMoney(it.ct) + '</span></div>';
      });
    });

    // Botones según estado
    var waState = waCopied[prov.n];
    if (!waState) {
      html += '<button class="btn-wa" onclick="copyWA(' + idx + ',this,\'' + esc(prov.n) + '\')">Copiar para WhatsApp</button>';
    } else if (waState !== 'dismissed') {
      html += '<button class="btn-wa" style="background:#c0392b;font-size:20px;padding:8px" onclick="dismissWA(\'' + esc(prov.n) + '\')">&#x1F5D1;</button>';
    }
    // si 'dismissed' → no muestra nada

    if (!allPedido && !allRecibido) {
      // Estado: Pendiente → mostrar "Marcar como Pedido"
      html += '<button class="btn-pedido" onclick="marcarPedido(\'' + esc(prov.n) + '\',' + idx + ',this)">Marcar como Pedido</button>';
    }

    if (allPedido && !allRecibido && provOcs.length > 0) {
      // Estado: Pedido → mostrar "Recibir mercadería" agrupado por producto
      html += '<button class="btn-recibir" onclick="toggleRecibir(' + idx + ')">Recibir mercaderia</button>';
      html += '<div class="recibir-panel" id="recPanel_' + idx + '">';
      var grouped = agruparOcsPorProducto(provOcs);
      grouped.forEach(function(g, gi) {
        html += '<div class="recibir-row">' +
          '<span class="recibir-name">' + g.prod + '</span>' +
          '<span class="recibir-orig">' + g.totalQty + '</span>' +
          '<span class="recibir-arrow">&rarr;</span>' +
          '<input class="recibir-qty" id="recQty_' + idx + '_' + gi + '" type="number" inputmode="numeric" min="0" value="' + g.totalQty + '" onchange="onRecQtyChange(this,' + g.totalQty + ')">' +
          '</div>';
      });
      html += '<button class="btn-confirmar-recibir" onclick="confirmarRecibir(' + idx + ')">Confirmar recepcion</button>';
      html += '</div>';
    }

    // Si todo recibido, no mostrar nada extra (ya se ve el total arriba)

    html += '</div>';
  });

  if (busqueda.provs.length > 0) {
    html += '<div class="total-bar"><span>Total proveedores</span><span class="amount">' + formatMoney(busqueda.total || 0) + '</span></div>';
  } else {
    html = '<div class="al-dia" style="color:#7A4A4A">No hay busqueda de productos pendiente</div>';
  }
  document.getElementById('provList').innerHTML = html;
}

function copyWA(idx, btn, provName) {
  var prov = busqueda.provs[idx];
  if (!prov) return;
  navigator.clipboard.writeText(prov.wa).then(function() {
    btn.textContent = 'Copiado!';
    btn.style.background = '#331C1C';
    setTimeout(function() {
      waCopied[provName] = true;
      saveLocal();
      renderProveedores();
    }, 1200);
  });
  if (navigator.vibrate) navigator.vibrate(30);
}

function dismissWA(provName, idx) {
  waCopied[provName] = 'dismissed';
  saveLocal();
  renderProveedores();
  if (navigator.vibrate) navigator.vibrate(15);
}

function marcarPedido(provName, idx, btn) {
  if (marcadosPedido[provName]) return;
  marcadosPedido[provName] = true;
  var rows = [];
  if (busqueda.ocs) {
    busqueda.ocs.forEach(function(oc) {
      if (oc.prov === provName && oc.est === 'Pendiente') {
        rows.push({ r: oc.r, estado: 'Pedido' });
      }
    });
  }
  if (rows.length > 0) syncQueue.push({ action: 'marcarOC', rows: rows, ts: Date.now() });
  saveLocal();
  btn.classList.add('done');
  btn.innerHTML = 'Pedido enviado &#x2713;';
  processSyncQueue();
  if (navigator.vibrate) navigator.vibrate(50);
}

/* ── PAGOS TAB ─────────────────────────────────────────── */
function renderPagos() {
  document.getElementById('provView').classList.add('hidden');
  document.getElementById('pedidosView').classList.add('hidden');
  document.getElementById('pagosView').classList.remove('hidden');
  document.getElementById('nuevoView').classList.add('hidden');

      d.semanas.forEach(function(s) {

      html += '<div class="pago-form" id="pagoForm_' + idx + '">';
      html += '<div class="pago-row">';
      html += '<div class="pago-input-wrap"><div class="pago-input-label">Efectivo</div><input class="pago-input" id="pagoEf_' + idx + '" type="number" inputmode="numeric" placeholder="0" value="" oninput="updatePagoTotal(' + idx + ',' + d.total + ')"></div>';
      html += '<div class="pago-input-wrap"><div class="pago-input-label">Mercado Pago</div><input class="pago-input" id="pagoMp_' + idx + '" type="number" inputmode="numeric" placeholder="0" value="" oninput="updatePagoTotal(' + idx + ',' + d.total + ')"></div>';
      html += '</div>';
      html += '<textarea class="pago-notas" id="pagoNotas_' + idx + '" rows="2" placeholder="Notas (opcional)"></textarea>';
      html += '<div class="pago-total-line"><span>Pagando</span><span class="amount" id="pagoTotalLabel_' + idx + '">$0</span></div>';
      html += '<div class="pago-total-line" style="font-size:12px;color:#7A4A4A"><span>Queda pendiente</span><span id="pagoRestante_' + idx + '">' + formatMoney(d.total) + '</span></div>';
      html += '<button class="btn-pagar" id="btnPagar_' + idx + '" onclick="confirmarPago(' + idx + ')" disabled>Confirmar pago</button>';
      html += '</div>';

      html += '</div>';
    });

    html += '<div class="total-bar"><span>Deuda total</span><span class="amount">' + formatMoney(totalDeuda) + '</span></div>';
  }

  document.getElementById('pagosList').innerHTML = html;
}

function togglePagoForm(idx) {
  var form = document.getElementById('pagoForm_' + idx);
  if (form) form.classList.toggle('open');
}

function updatePagoTotal(idx, deudaTotal) {
  var ef = parseInt(document.getElementById('pagoEf_' + idx).value) || 0;
  var mp = parseInt(document.getElementById('pagoMp_' + idx).value) || 0;
  var total = ef + mp;
  document.getElementById('pagoTotalLabel_' + idx).textContent = formatMoney(total);
  var restante = Math.max(0, deudaTotal - total);
  document.getElementById('pagoRestante_' + idx).textContent = formatMoney(restante);
  document.getElementById('btnPagar_' + idx).disabled = total <= 0;
}

function confirmarPago(idx) {
  var deudas = busqueda.deudas || [];
  var d = deudas[idx];
  if (!d) return;

  var ef = parseInt(document.getElementById('pagoEf_' + idx).value) || 0;
  var mp = parseInt(document.getElementById('pagoMp_' + idx).value) || 0;
  var notas = document.getElementById('pagoNotas_' + idx).value || '';
  var total = ef + mp;
  if (total <= 0) return;

  // Determinar qué rows marcar como pagadas (de más vieja a más nueva, hasta cubrir el monto)
  var rowsToMark = [];
  var acum = 0;
  d.rows.forEach(function(r) {
    if (acum < total) {
      rowsToMark.push(r.r);
      acum += r.costo;
    }
  });

  var btn = document.getElementById('btnPagar_' + idx);
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  var payload = {
    action: 'pagarProveedor',
    proveedor: d.n,
    efectivo: ef,
    mp: mp,
    rows: rowsToMark,
    notas: notas
  };

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  }).then(function() {
    btn.textContent = 'Pago registrado';
    btn.style.background = '#331C1C';
    showToast('Pago a ' + d.n + ': ' + formatMoney(total));
    if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
    setTimeout(function() { refresh(true); }, 1500);
  }).catch(function() {
    syncQueue.push(payload);
    saveLocal();
    btn.textContent = 'Guardado (se sincroniza con señal)';
    showToast('Sin conexion - se enviara automaticamente');
  });
}

/* ── RECIBIR MERCADERÍA ────────────────────────────────── */
function getOcsByProv(provName) {
  if (!busqueda.ocs) return [];
  return busqueda.ocs.filter(function(oc) { return oc.prov === provName; });
}

function agruparOcsPorProducto(ocs) {
  var map = {};
  var order = [];
  ocs.forEach(function(oc) {
    if (!map[oc.prod]) {
      map[oc.prod] = { prod: oc.prod, totalQty: 0, rows: [] };
      order.push(oc.prod);
    }
    map[oc.prod].totalQty += oc.q;
    map[oc.prod].rows.push({ r: oc.r, q: oc.q });
  });
  return order.map(function(p) { return map[p]; });
}

function toggleRecibir(idx) {
  var panel = document.getElementById('recPanel_' + idx);
  if (!panel) return;
  panel.classList.toggle('open');
}

function onRecQtyChange(input, origQty) {
  var val = parseInt(input.value) || 0;
  input.className = 'recibir-qty' + (val === 0 ? ' zero' : val < origQty ? ' changed' : '');
}

function confirmarRecibir(idx) {
  var prov = busqueda.provs[idx];
  if (!prov) return;
  var provOcs = getOcsByProv(prov.n);
  var grouped = agruparOcsPorProducto(provOcs);
  var items = [];

  // Leer qty recibida por producto agrupado y distribuir a filas individuales
  grouped.forEach(function(g, gi) {
    var input = document.getElementById('recQty_' + idx + '_' + gi);
    var qtyRecibida = input ? (parseInt(input.value) || 0) : g.totalQty;
    var remaining = qtyRecibida;

    // Distribuir a las filas originales (en orden, hasta agotar)
    g.rows.forEach(function(row) {
      var asignar = Math.min(remaining, row.q);
      items.push({ r: row.r, qtyRecibida: Math.max(0, asignar) });
      remaining -= asignar;
    });
  });

  syncQueue.push({ action: 'recibirMercaderia', items: items, ts: Date.now() });
  marcadosRecibido[prov.n] = true;
  saveLocal();
  processSyncQueue();

  var panel = document.getElementById('recPanel_' + idx);
  if (panel) panel.classList.remove('open');
  showToast(prov.n + ' — mercaderia recibida');
  if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
  setTimeout(function() { renderProveedores(); }, 500);
}

/* ── PEDIDOS TAB — hierarchical navigation ─────────────── */
var pedLevel = 'root'; // 'root', 'vd', 'vi', 'zone:Clubes', 'zone:Estancias del Pilar', etc.

function classifyClientes() {
  var VD_CANALES = { 'Home': true, 'Pilar': true, 'Capital Federal': true };
  var VI_CANALES = { 'Clubes': true, 'Red': true };
  var vd = [], vi = [], dep = [];
  (busqueda.clientes || []).forEach(function(cli) {
    if (VD_CANALES[cli.canal]) vd.push(cli);
    else if (VI_CANALES[cli.canal]) vi.push(cli);
    else dep.push(cli); // Depósito y otros
  });
  return { vd: vd, vi: vi, dep: dep };
}

function getZone(cli) {
  if (cli.canal === 'Home') {
    // Extract barrio from dir (e.g. "Santa Catalina · Lote 123" → use parent barrio)
    // Home = Estancias del Pilar area
    return 'Estancias del Pilar';
  }
  if (cli.canal === 'Pilar') return 'Resto de Pilar';
  if (cli.canal === 'Capital Federal') return 'Capital Federal';
  if (cli.canal === 'Clubes') return 'Clubes';
  if (cli.canal === 'Red') return 'Red';
  if (cli.canal === 'Depósito') return 'Depósito';
  return cli.canal;
}

function renderPedidos() {
  document.getElementById('provView').classList.add('hidden');
  document.getElementById('pedidosView').classList.remove('hidden');
  document.getElementById('pagosView').classList.add('hidden');
  document.getElementById('nuevoView').classList.add('hidden');

  var cl = classifyClientes();
  var total = (busqueda.clientes || []).length;
  var totalIng = 0;
  (busqueda.clientes || []).forEach(function(c) { totalIng += c.ing; });

  var html = '';

  if (total === 0) {
    html += '<div class="al-dia" style="color:#7A4A4A">Sin pedidos para armar</div>';
    document.getElementById('pedidosList').innerHTML = html;
    return;
  }

  if (pedLevel === 'root') {
    html += '<div class="ped-summary"><strong>' + total + '</strong>pedidos para armar</div>';
    if (cl.vd.length > 0) {
      var vdProds = 0; cl.vd.forEach(function(c) { c.items.forEach(function(it) { vdProds += it.q; }); });
      html += '<div class="nav-card" onclick="pedNav(\'vd\')">' +
        '<div class="nav-card-icon vd">&#x1F3E0;</div>' +
        '<div class="nav-card-body"><div class="nav-card-title">Venta Directa</div><div class="nav-card-sub">' + vdProds + ' productos</div></div>' +
        '<span class="nav-card-count">' + cl.vd.length + '</span><span class="nav-card-arrow">&#x203A;</span></div>';
    }
    if (cl.vi.length > 0) {
      var viProds = 0; cl.vi.forEach(function(c) { c.items.forEach(function(it) { viProds += it.q; }); });
      html += '<div class="nav-card" onclick="pedNav(\'vi\')">' +
        '<div class="nav-card-icon vi">&#x1F3C6;</div>' +
        '<div class="nav-card-body"><div class="nav-card-title">Venta Indirecta</div><div class="nav-card-sub">' + viProds + ' productos</div></div>' +
        '<span class="nav-card-count">' + cl.vi.length + '</span><span class="nav-card-arrow">&#x203A;</span></div>';
    }
    if (cl.dep.length > 0) {
      var depProds = 0; cl.dep.forEach(function(c) { c.items.forEach(function(it) { depProds += it.q; }); });
      html += '<div class="nav-card" onclick="pedNav(\'dep\')">' +
        '<div class="nav-card-icon zone">&#x1F4E6;</div>' +
        '<div class="nav-card-body"><div class="nav-card-title">Deposito</div><div class="nav-card-sub">' + depProds + ' productos</div></div>' +
        '<span class="nav-card-count">' + cl.dep.length + '</span><span class="nav-card-arrow">&#x203A;</span></div>';
    }

  } else if (pedLevel === 'vd' || pedLevel === 'vi' || pedLevel === 'dep') {
    var list = pedLevel === 'vd' ? cl.vd : pedLevel === 'vi' ? cl.vi : cl.dep;
    var label = pedLevel === 'vd' ? 'Venta Directa' : pedLevel === 'vi' ? 'Venta Indirecta' : 'Deposito';
    html += '<div class="ped-back" onclick="pedNav(\'root\')">&#x2190; Volver</div>';
    html += '<div class="ped-summary"><strong>' + list.length + '</strong>pedidos — ' + label + '</div>';

    // Group by zone
    var zones = {};
    list.forEach(function(c) {
      var z = getZone(c);
      if (!zones[z]) zones[z] = [];
      zones[z].push(c);
    });

    Object.keys(zones).sort().forEach(function(z) {
      var zProds = 0; zones[z].forEach(function(c) { c.items.forEach(function(it) { zProds += it.q; }); });
      html += '<div class="nav-card" onclick="pedNav(\'zone:' + esc(z) + '\')">' +
        '<div class="nav-card-icon zone">&#x1F4CD;</div>' +
        '<div class="nav-card-body"><div class="nav-card-title">' + z + '</div><div class="nav-card-sub">' + zProds + ' productos</div></div>' +
        '<span class="nav-card-count">' + zones[z].length + '</span><span class="nav-card-arrow">&#x203A;</span></div>';
    });

  } else if (pedLevel.indexOf('zone:') === 0) {
    var zoneName = pedLevel.substring(5);
    var allList = classifyClientes();
    var filtered = (busqueda.clientes || []).filter(function(c) { return getZone(c) === zoneName; });
    // Determine parent
    var VD_CANALES = { 'Home': true, 'Pilar': true, 'Capital Federal': true };
    var VI_CANALES = { 'Clubes': true, 'Red': true };
    var firstCanal = filtered.length > 0 ? filtered[0].canal : '';
    var parent = VD_CANALES[firstCanal] ? 'vd' : VI_CANALES[firstCanal] ? 'vi' : 'dep';

    html += '<div class="ped-back" onclick="pedNav(\'' + parent + '\')">&#x2190; Volver</div>';
    html += '<div class="ped-summary"><strong>' + filtered.length + '</strong>pedidos — ' + zoneName + '</div>';

    filtered.forEach(function(cli) {
      html += renderClienteCard(cli);
    });
  }

  document.getElementById('pedidosList').innerHTML = html;
}

function renderClienteCard(cli) {
  var cardKey = (cli.canal + '|' + cli.ped).replace(/[^a-zA-Z0-9]/g, '_');
  var isDone = armadoChecked[cardKey];
  var html = '<div class="cliente-card' + (isDone ? ' done-card' : '') + '">';
  html += '<div class="cliente-head"><span class="cliente-name">' + cli.n + '</span><span class="cliente-canal">' + cli.canal + '</span></div>';
  if (cli.ped) html += '<div class="cliente-ped">Pedido ' + cli.ped + '</div>';
  if (cli.dir) html += '<div class="cliente-dir">' + cli.dir + '</div>';

  // Productos como checklist de armado (sin montos)
  cli.items.forEach(function(it) {
    var pendiente = (it.est === 'Pendiente' || it.est === 'Pedido');
    html += '<div class="cliente-item' + (pendiente ? ' item-pendiente' : '') + '">' +
      '<span class="cliente-item-qty">' + it.q + ' &times;</span>' +
      '<span class="cliente-item-name">' + it.prod + '</span>' +
      (pendiente ? '<span style="font-size:10px;background:#FFF3E0;color:#e67e22;padding:2px 6px;border-radius:50px;font-weight:700">Pendiente</span>' : '') +
      '</div>';
  });

  // Botón "Armado OK"
  html += '<button class="btn-pedido' + (isDone ? ' done' : '') + '" onclick="toggleArmadoCheck(\'' + cardKey + '\')" style="margin-top:10px">' + (isDone ? 'Armado &#x2713;' : 'Marcar armado') + '</button>';

  // Botones WA
  if (cli.tel) {
    var tel = cli.tel.replace(/[^0-9+]/g, '');
    if (tel.length < 12) tel = '54' + tel;
    html += '<div style="display:flex;gap:6px;margin-top:8px">';
    html += '<a href="https://wa.me/' + tel + '?text=' + encodeURIComponent('Hola! Ya tenemos tu pedido armado, en un rato lo entregamos!') + '" target="_blank" class="btn-call" style="flex:1;font-size:12px;padding:8px">Armado</a>';
    html += '<a href="https://wa.me/' + tel + '?text=' + encodeURIComponent('Estamos llegando!') + '" target="_blank" class="btn-call" style="flex:1;font-size:12px;padding:8px;background:#F07D47">Llegando</a>';
    html += '<a href="https://wa.me/' + tel + '?text=' + encodeURIComponent('Estoy afuera!') + '" target="_blank" class="btn-call" style="flex:1;font-size:12px;padding:8px;background:#331C1C">Estoy!</a>';
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function toggleArmadoCheck(key) {
  if (armadoChecked[key]) delete armadoChecked[key];
  else armadoChecked[key] = true;
  saveLocal();
  renderPedidos();
  if (navigator.vibrate) navigator.vibrate(30);
}

function pedNav(level) {
  pedLevel = level;
  renderPedidos();
  if (navigator.vibrate) navigator.vibrate(15);
}

/* ── NUEVO PEDIDO TAB ──────────────────────────────────── */
function renderNuevo() {
  document.getElementById('provView').classList.add('hidden');
  document.getElementById('pedidosView').classList.add('hidden');
  document.getElementById('pagosView').classList.add('hidden');
  document.getElementById('nuevoView').classList.remove('hidden');
  // Show stock overview if no provider selected
  var prov = document.getElementById('npProv').value;
  if (!prov) renderStockOverview();
}

function onNpVendedorChange() {
  var prov = document.getElementById('npProv').value;
  if (!prov) renderStockOverview();
}

function renderStockOverview() {
  var div = document.getElementById('npStockOverview');
  var vendedor = document.getElementById('npVendedor').value;

  // Solo mostrar para Tadeo (Deposito), no para Marcos
  if (vendedor !== 'Tadeo — Stock' || !catalogo.proveedores || catalogo.proveedores.length === 0) {
    div.innerHTML = '';
    return;
  }

  // Aggregate pending OC quantities per product — only Depósito channel (Tadeo's own orders)
  var ocPending = {};
  if (busqueda.ocs) {
    busqueda.ocs.forEach(function(oc) {
      if (oc.canal !== 'Depósito') return; // solo pedidos propios de Tadeo
      var abbr = oc.abbr || oc.prod;
      ocPending[abbr] = (ocPending[abbr] || 0) + (oc.q || 0);
    });
  }

  var html = '<div class="stock-overview">';
  html += '<div class="stock-title">Stock actual + pedidos pendientes</div>';
  html += '<table class="stock-table"><thead><tr><th>Producto</th><th>Stock</th><th>Pedido</th><th>Total</th></tr></thead><tbody>';

  catalogo.proveedores.forEach(function(prov) {
    var items = catalogo.productos[prov] || [];
    if (items.length === 0) return;
    html += '<tr class="stock-prov-header"><td colspan="4">' + prov + '</td></tr>';
    items.forEach(function(it) {
      var stock = (it.s !== null) ? it.s : 0;
      var pedido = ocPending[it.a] || 0;
      var total = stock + pedido;
      var cls = total === 0 ? 'zero' : total <= 3 ? 'low' : 'ok';
      html += '<tr>' +
        '<td>' + it.a + '</td>' +
        '<td class="val-stock">' + stock + '</td>' +
        '<td class="val-pedido">' + (pedido > 0 ? '+' + pedido : '-') + '</td>' +
        '<td class="val-total ' + cls + '">' + total + '</td>' +
        '</tr>';
    });
  });

  html += '</tbody></table></div>';
  div.innerHTML = html;
}

function onNpProvChange() {
  var prov = document.getElementById('npProv').value;
  var container = document.getElementById('npProductsList');
  npQtys = {};
  npOrigins = {};

  if (!prov || !catalogo.productos[prov]) {
    container.innerHTML = '';
    document.getElementById('npConfirm').classList.add('hide');
    renderStockOverview();
    updateNpSummary();
    return;
  }

  // Hide stock overview, show products
  document.getElementById('npStockOverview').innerHTML = '';
  document.getElementById('npConfirm').classList.remove('hide');

  var items = catalogo.productos[prov];
  var html = '';
  items.forEach(function(it) {
    // Default origin: if stock > 0 → Depósito, else → OC
    var defaultOrigen = (it.s !== null && it.s > 0) ? 'Depósito' : 'Orden de Compra';
    npOrigins[it.a] = defaultOrigen;
    var isOC = defaultOrigen === 'Orden de Compra';

    var stockHtml = '';
    if (it.s !== null) {
      if (it.s === 0) stockHtml = '<span class="np-prod-stock stock-out">Sin stock</span>';
      else if (it.s <= 3) stockHtml = '<span class="np-prod-stock stock-low">Stock: ' + it.s + '</span>';
      else stockHtml = '<span class="np-prod-stock stock-ok">Stock: ' + it.s + '</span>';
    }
    html += '<div class="np-prod-card" style="flex-wrap:wrap">' +
      '<div class="np-prod-info">' +
        '<div class="np-prod-name">' + it.n + '</div>' +
        '<div class="np-prod-meta">' + (it.c > 0 ? formatMoney(it.c) + ' c/u' : 'Sin costo') + ' ' + stockHtml + '</div>' +
      '</div>' +
      '<div class="np-qty-wrap">' +
        '<button class="np-qty-btn" onclick="npChangeQty(\'' + it.a + '\',-1)">-</button>' +
        '<input class="np-qty-val" id="npq_' + it.a + '" type="number" min="0" value="0" onchange="npSetQty(\'' + it.a + '\',this.value)" inputmode="numeric">' +
        '<button class="np-qty-btn" onclick="npChangeQty(\'' + it.a + '\',1)">+</button>' +
      '</div>' +
      '<div class="np-origen-toggle" id="npo_' + it.a + '" style="width:100%">' +
        '<div class="np-origen-opt' + (isOC ? ' active-oc' : '') + '" onclick="npSetOrigen(\'' + it.a + '\',\'Orden de Compra\')">OC (comprar)</div>' +
        '<div class="np-origen-opt' + (!isOC ? ' active-dep' : '') + '" onclick="npSetOrigen(\'' + it.a + '\',\'Depósito\')">Deposito (tengo)</div>' +
      '</div>' +
    '</div>';
  });
  container.innerHTML = html;
  updateNpSummary();
}

function npSetOrigen(abbr, origen) {
  npOrigins[abbr] = origen;
  var toggle = document.getElementById('npo_' + abbr);
  if (!toggle) return;
  var opts = toggle.children;
  opts[0].className = 'np-origen-opt' + (origen === 'Orden de Compra' ? ' active-oc' : '');
  opts[1].className = 'np-origen-opt' + (origen === 'Depósito' ? ' active-dep' : '');
  updateNpSummary();
  if (navigator.vibrate) navigator.vibrate(15);
}

function npChangeQty(abbr, delta) {
  var input = document.getElementById('npq_' + abbr);
  var val = Math.max(0, (parseInt(input.value) || 0) + delta);
  input.value = val;
  npQtys[abbr] = val;
  updateNpSummary();
  if (navigator.vibrate) navigator.vibrate(15);
}

function npSetQty(abbr, val) {
  npQtys[abbr] = Math.max(0, parseInt(val) || 0);
  updateNpSummary();
}

function getNpItems() {
  var prov = document.getElementById('npProv').value;
  if (!prov || !catalogo.productos[prov]) return [];
  var items = [];
  catalogo.productos[prov].forEach(function(it) {
    var qty = npQtys[it.a] || 0;
    if (qty > 0) items.push({ abbr: it.a, nombre: it.n, costo: it.c, qty: qty, origen: npOrigins[it.a] || 'Orden de Compra' });
  });
  return items;
}

function updateNpSummary() {
  var items = getNpItems();
  var div = document.getElementById('npSummary');
  var btn = document.getElementById('npConfirm');

  if (items.length === 0) {
    div.classList.add('hidden');
    btn.disabled = true;
    btn.textContent = 'Confirmar compra';
    btn.classList.remove('success');
    return;
  }

  var total = 0;
  var html = '<div class="np-summary"><div class="np-summary-title">Resumen del pedido</div>';
  items.forEach(function(it) {
    var sub = it.costo * it.qty;
    total += sub;
    var orTag = it.origen === 'Depósito' ? '<span style="font-size:10px;background:#4CAF50;color:#fff;padding:1px 6px;border-radius:50px;margin-left:4px">DEP</span>' : '<span style="font-size:10px;background:#1565C0;color:#fff;padding:1px 6px;border-radius:50px;margin-left:4px">OC</span>';
    html += '<div class="np-summary-line"><span>' + it.qty + ' x ' + it.nombre + orTag + '</span><span>' + formatMoney(sub) + '</span></div>';
  });
  html += '<div class="np-summary-total"><span>Total costo</span><span class="amount">' + formatMoney(total) + '</span></div>';
  html += '</div>';

  div.innerHTML = html;
  div.classList.remove('hidden');
  btn.disabled = false;
  btn.textContent = 'Confirmar compra — ' + formatMoney(total);
  btn.classList.remove('success');
}

function confirmarCompra() {
  var items = getNpItems();
  if (items.length === 0) return;

  var prov = document.getElementById('npProv').value;
  var vendedor = document.getElementById('npVendedor').value;
  var btn = document.getElementById('npConfirm');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  var payload = {
    action: 'compraManual',
    proveedor: prov,
    vendedor: vendedor,
    items: items
  };

  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(payload)
  }).then(function() {
    btn.classList.add('success');
    btn.textContent = 'Compra confirmada &#x2713;';
    showToast(items.length + ' producto(s) agregados a OC');
    if (navigator.vibrate) navigator.vibrate([50, 50, 50]);

    // Reset form after 2s
    setTimeout(function() {
      npQtys = {};
      onNpProvChange();
      btn.disabled = true;
      btn.textContent = 'Confirmar compra';
      btn.classList.remove('success');
      // Refresh OC data
      refresh(true);
    }, 2000);
  }).catch(function() {
    // Queue for later
    syncQueue.push(payload);
    saveLocal();
    btn.classList.add('success');
    btn.textContent = 'Guardado (se sincroniza con señal)';
    showToast('Sin conexion - se enviara automaticamente');
  });
}

/* ── SYNC QUEUE ────────────────────────────────────────── */
function processSyncQueue() {
  if (!isOnline || syncQueue.length === 0) return;
  var item = syncQueue[0];
  fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(item)
  }).then(function() {
    syncQueue.shift();
    saveLocal();
    document.getElementById('syncBanner').className = 'sync-banner' + (syncQueue.length > 0 ? ' visible' : '');
    if (syncQueue.length > 0) setTimeout(processSyncQueue, 1000);
  }).catch(function() {
    setTimeout(processSyncQueue, 30000);
  });
}

/* ── TAB SWITCH ────────────────────────────────────────── */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  render();
}

/* ── TOAST ─────────────────────────────────────────────── */
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}
</script>
