<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#331C1C">
<link rel="manifest" href="/ruta-manifest.json">
<link rel="icon" href="/img/favicon.png">
<link rel="apple-touch-icon" href="/img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<title>Maleu Ruta</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--brown:#331C1C;--orange:#F07D47;--beige:#F2E8C7;--bg:#F5F2EB;--white:#fff;--muted:#7A4A4A;--border:#E8DFC4;--green:#3d8b3d;--green-light:#e8f5e8}
body{font-family:'Montserrat',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--brown);overflow-x:hidden;min-height:100dvh}

/* ── TOP BAR ── */
.topbar{background:var(--brown);color:var(--beige);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar h1{font-size:15px;font-weight:800;flex:1;letter-spacing:.04em}
.status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.status-dot.online{background:#4CAF50}
.status-dot.offline{background:#F44336;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.badge{background:var(--orange);color:#fff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:50px}
.btn-refresh{background:none;border:none;color:var(--beige);font-size:18px;cursor:pointer;padding:8px;border-radius:8px;line-height:1}
.btn-refresh:active{background:rgba(255,255,255,.15)}
.btn-refresh.spinning{animation:spin .8s linear}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TABS ── */
.tabs{display:flex;background:var(--border);position:sticky;top:49px;z-index:99}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;transition:.15s}
.tab.active{border-bottom-color:var(--orange);color:var(--orange)}
.tab .tab-count{font-size:10px;background:var(--orange);color:#fff;padding:1px 6px;border-radius:50px;margin-left:4px}

/* ── LOADING / EMPTY ── */
.loading,.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.loading{font-style:italic}

/* ── ARMADO: RESUMEN PRODUCTOS ── */
.armado-summary{background:var(--white);border-bottom:1px solid var(--border);padding:10px 16px;font-size:11px;color:var(--muted);line-height:1.8}
.armado-summary strong{color:var(--brown);font-weight:800}

/* ── ARMADO VIEW ── */
.armado-list{padding:8px}
.armado-day-header{padding:12px 8px 6px;font-size:14px;font-weight:800;color:var(--brown);display:flex;align-items:center;justify-content:space-between}
.armado-day-header .day-count{font-size:11px;font-weight:700;background:var(--orange);color:#fff;padding:2px 10px;border-radius:50px}
.armado-day-header.other-day{color:var(--muted);opacity:.7}
.armado-barrio{padding:10px 8px 4px;font-size:12px;font-weight:800;color:var(--brown);border-top:2px solid var(--border);margin-top:4px}
.armado-subbarrio{padding:4px 8px 2px;font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
.armado-subbarrio .sb-count{font-size:9px;background:var(--beige);color:var(--muted);padding:1px 6px;border-radius:50px}
.armado-card{background:var(--white);border-radius:12px;padding:12px 14px;margin-bottom:6px;border:2px solid var(--border);transition:.15s}
.armado-card.done{opacity:.35;border-color:var(--green);background:var(--green-light);order:999}
.armado-head{display:flex;align-items:center;gap:8px}
.armado-check{width:26px;height:26px;border-radius:7px;border:2.5px solid #D4C8A0;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:#fff;cursor:pointer;transition:.15s}
.armado-card.done .armado-check{background:var(--green);border-color:var(--green)}
.armado-name{font-size:14px;font-weight:700;flex:1}
.armado-lote{font-size:11px;font-weight:800;color:var(--orange);flex-shrink:0}
.armado-prods{margin-top:6px;padding-left:34px;font-size:12px;line-height:1.6;color:#555}
.armado-prods span{font-weight:700;color:var(--brown)}
.armado-cards{display:flex;flex-direction:column}

/* ── RUTA VIEW ── */
.ruta-container{display:flex;flex-direction:column;height:calc(100dvh - 95px)}
.ruta-header{background:var(--brown);color:var(--beige);padding:6px 14px;display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700}
.ruta-header .ruta-zona{color:var(--orange)}
.ruta-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 14px;text-align:center}
.ruta-lote{font-size:56px;font-weight:900;color:var(--orange);line-height:1;margin-bottom:2px}
.ruta-nombre{font-size:16px;font-weight:700;color:var(--muted);margin-bottom:8px}
.ruta-productos{background:var(--white);border-radius:10px;padding:8px 14px;margin-bottom:6px;width:100%;text-align:left}
.ruta-prod-item{display:flex;justify-content:space-between;padding:3px 0;font-size:13px;border-bottom:1px solid var(--beige)}
.ruta-prod-item:last-child{border:none}
.ruta-prod-qty{font-weight:800;color:var(--orange);min-width:28px;text-align:right}
.ruta-cobrar{background:var(--white);border-radius:10px;padding:8px 14px;width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ruta-cobrar-total{font-size:22px;font-weight:900}
.ruta-cobrar-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:50px}
.ruta-cobrar-badge.efectivo{background:#fff3e0;color:#e67e22;border:2px solid #e67e22}
.ruta-cobrar-badge.transferencia{background:#e3f2fd;color:#1976d2;border:2px solid #1976d2}
.ruta-cobrar-badge.cobrado{background:var(--green-light);color:var(--green);border:2px solid var(--green)}
.ruta-extras{width:100%;display:flex;gap:6px;margin-bottom:4px}
.ruta-extras button,.ruta-extras a{flex:1;padding:8px;border:1.5px solid var(--border);border-radius:8px;background:var(--white);font-family:inherit;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;text-decoration:none;display:block}
.ruta-extras .btn-wpp-sm{color:#25D366;border-color:#25D366}

/* ── ACTIONS (fijo abajo) ── */
.ruta-actions{padding:8px 14px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0}
.btn-entregado{width:100%;padding:16px;border:none;border-radius:12px;font-family:inherit;font-size:18px;font-weight:900;cursor:pointer;background:var(--green);color:#fff;margin-bottom:6px;transition:.15s}
.btn-entregado:active{transform:scale(.97);background:#2d6a2d}
.btn-entregado.cobrar-first{background:var(--orange)}
.btn-entregado.cobrar-first:active{background:#d06830}
.ruta-nav{display:flex;gap:6px}
.ruta-nav button{flex:1;padding:10px;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.ruta-nav .btn-prev{background:var(--white);color:var(--brown);border:1.5px solid var(--border)}
.ruta-nav .btn-next{background:var(--brown);color:var(--beige)}

/* ── CONFIRM ── */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:#fff;border-radius:16px;padding:24px;max-width:300px;width:100%;text-align:center}
.confirm-box h3{font-size:17px;margin-bottom:6px}
.confirm-box p{font-size:13px;color:var(--muted);margin-bottom:18px}
.confirm-btns{display:flex;gap:8px}
.confirm-btns button{flex:1;padding:14px;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer}
.confirm-btns .btn-si{background:var(--green);color:#fff}
.confirm-btns .btn-no{background:var(--border);color:var(--brown)}

.sync-banner{background:#FFF3E0;color:#E65100;text-align:center;padding:5px;font-size:10px;font-weight:700;display:none}
.sync-banner.visible{display:block}
.hidden{display:none!important}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--brown);color:var(--beige);padding:10px 20px;border-radius:50px;font-size:12px;font-weight:700;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <h1>MALEU RUTA</h1>
  <span id="lastSync" style="font-size:9px;opacity:.6"></span>
  <div class="status-dot" id="statusDot"></div>
  <span class="badge" id="counterBadge">--</span>
  <button class="btn-refresh" id="btnRefresh" onclick="refresh()">&#x21bb;</button>
</div>

<div class="sync-banner" id="syncBanner">Entregas pendientes de sincronizar</div>

<div class="tabs">
  <div class="tab active" data-tab="armado" onclick="switchTab('armado')">ARMADO<span class="tab-count" id="tabArmadoCount"></span></div>
  <div class="tab" data-tab="ruta" onclick="switchTab('ruta')">RUTA<span class="tab-count" id="tabRutaCount"></span></div>
</div>

<div id="loadingView" class="loading">Cargando pedidos...</div>
<div id="emptyView" class="empty hidden">
  <div style="font-size:32px;margin-bottom:10px">&#x2713;</div>
  <div style="font-size:15px;font-weight:700;margin-bottom:4px" id="emptyTitle">Sin pedidos pendientes</div>
  <div style="font-size:12px" id="emptyDetail"></div>
</div>
<div id="errorView" class="empty hidden" style="color:#E65100">
  <div style="font-size:32px;margin-bottom:10px">&#x26A0;</div>
  <div style="font-size:15px;font-weight:700;margin-bottom:4px">No se pudo conectar</div>
  <div style="font-size:12px">Toca refresh</div>
</div>

<!-- ARMADO -->
<div id="armadoView" class="hidden">
  <div class="armado-summary" id="armadoSummary"></div>
  <div class="armado-list" id="armadoList"></div>
</div>

<!-- RUTA -->
<div id="rutaView" class="hidden">
  <div class="ruta-container">
    <div class="ruta-header" id="rutaHeader"></div>
    <div class="ruta-body" id="rutaBody"></div>
    <div class="ruta-actions" id="rutaActions"></div>
  </div>
</div>

<div id="confirmOverlay" class="confirm-overlay hidden"></div>
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   MALEU RUTA v3 — Delivery bajo estrés
   ═══════════════════════════════════════════════════════════ */
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxmrG5YVSshcYezk8lXFx_uxb7NFGcb9EfTXc7dsIN4rZyj73CET4mk_aKPFPDY2wNi/exec';
var WA_NUMBER = '5491155038905';

var PROD_NAMES = {
  PPM:'Pack Muzza x2', PPJyQ:'Pack J&Q x2', PPCyQ:'Pack C&Q x2',
  SCo:'Sorr. Cordero', SQB:'Sorr. Queso Brie', SL:'Sorr. Langostinos',
  SPyP:'Sorr. Pollo&Puerro', SJyQ:'Sorr. J&Q', SE:'Sorr. Espinaca', SCa:'Sorr. Calabaza',
  ECaC:'Emp. Carne x8', EJyQ:'Emp. J&Q x8', ECyQ:'Emp. C&Q x8', EV:'Emp. Verdura x8',
  TG:'Torta Golosa', TLC:'Torta Lemon', TC:'Torta Coco', F:'Franui',
  PMu:'Pizza Muzza', PMa:'Pizza Margarita', PJyQ:'Pizza J&Q', PCC:'Pizza Cebolla', PJyM:'Pizza J&M'
};

var DIAS_SEMANA = ['Domingo','Lunes','Martes','Mi\u00E9rcoles','Jueves','Viernes','S\u00E1bado'];
function getDiaHoy() { return DIAS_SEMANA[new Date().getDay()]; }

/* ── STATE ── */
var entregas=[], entregados={}, cobrados={}, propinas={}, syncQueue=[], armadoDone={};
var currentTab='armado', rutaIndex=0, isOnline=navigator.onLine, resumenBarrioAbierto=null;

/* ── INIT ── */
loadLocal();
updateOnlineStatus();
window.addEventListener('online', function(){isOnline=true;updateOnlineStatus();processSyncQueue();refresh(true)});
window.addEventListener('offline', function(){isOnline=false;updateOnlineStatus()});
// Restaurar tab activo visualmente
document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===currentTab)});
if(entregas.length>0){document.getElementById('loadingView').classList.add('hidden');render();updateLastSync();refresh(true)}else{refresh()}
setInterval(function(){if(isOnline&&document.visibilityState==='visible')refresh(true)},45000);
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw-ruta.js').catch(function(){})}

/* ── UTILS ── */
function updateOnlineStatus(){document.getElementById('statusDot').className='status-dot '+(isOnline?'online':'offline')}
function updateLastSync(){var n=new Date();document.getElementById('lastSync').textContent=n.getHours()+':'+String(n.getMinutes()).padStart(2,'0');localStorage.setItem('maleu_ruta_sync',n.getTime())}
function saveLocal(){try{localStorage.setItem('maleu_ruta',JSON.stringify({entregas:entregas,entregados:entregados,cobrados:cobrados,propinas:propinas,syncQueue:syncQueue,armadoDone:armadoDone,currentTab:currentTab,rutaIndex:rutaIndex,ts:Date.now()}))}catch(e){}}
function loadLocal(){try{var d=JSON.parse(localStorage.getItem('maleu_ruta')||'{}');if(d.entregas)entregas=d.entregas;if(d.entregados)entregados=d.entregados;if(d.cobrados)cobrados=d.cobrados;if(d.propinas)propinas=d.propinas;if(d.syncQueue)syncQueue=d.syncQueue;if(d.armadoDone)armadoDone=d.armadoDone;if(d.currentTab)currentTab=d.currentTab;if(d.rutaIndex!==undefined)rutaIndex=d.rutaIndex}catch(e){}}

function refresh(silent){
  if(!silent)document.getElementById('loadingView').classList.remove('hidden');
  var btn=document.getElementById('btnRefresh');btn.classList.add('spinning');
  fetch(APPS_SCRIPT_URL+'?action=entregas&t='+Date.now()).then(function(r){return r.json()}).then(function(data){
    btn.classList.remove('spinning');var se=data.e||[];var prev=getPendientes().length;entregas=se;
    var sk={};entregas.forEach(function(e){sk[e.h+'|'+e.id]=true});
    Object.keys(entregados).forEach(function(k){if(!sk[k])delete entregados[k]});
    Object.keys(cobrados).forEach(function(k){if(!sk[k])delete cobrados[k]});
    saveLocal();render();updateLastSync();
    var nc=getPendientes().length;if(silent&&nc>prev)showToast('+'+(nc-prev)+' pedido(s) nuevo(s)');
    document.getElementById('loadingView').classList.add('hidden');processSyncQueue();
  }).catch(function(){
    btn.classList.remove('spinning');document.getElementById('loadingView').classList.add('hidden');
    if(entregas.length>0){render();showToast('Sin conexion — cache')}else{document.getElementById('errorView').classList.remove('hidden')}
  });
}

/* ── HELPERS ── */
function eKey(e){return e.h+'|'+e.id}
function isEntregado(e){return entregados[eKey(e)]||e.es==='Entregado'}
function isCobrado(e){return cobrados[eKey(e)]||e.ep==='Cobrado'}
function getPendientes(){return entregas.filter(function(e){return!isEntregado(e)})}
function getHoyPendientes(){var h=getDiaHoy();return getPendientes().filter(function(e){return e.de===h})}
function getOtrosDias(){var h=getDiaHoy();return getPendientes().filter(function(e){return e.de!==h})}
function sortByZona(list){
  list.sort(function(a,b){
    var bo={'Estancias del Pilar':0,'Los Alcanfores':1,'Estancias del R\u00edo':2,'Pilar':3,'Capital Federal':4};
    var ba=bo[a.b]!==undefined?bo[a.b]:9,bb=bo[b.b]!==undefined?bo[b.b]:9;
    if(ba!==bb)return ba-bb;if(a.sb!==b.sb)return(a.sb||'').localeCompare(b.sb||'');
    return(parseInt(a.l)||999)-(parseInt(b.l)||999);
  });return list;
}
function getSorted(){return sortByZona(getHoyPendientes())}
function prodText(p){return p.map(function(x){return'<span>'+x.q+'x</span> '+(PROD_NAMES[x.a]||x.a)}).join('<br>')}
function formatMoney(n){return'$'+n.toLocaleString('es-AR')}
function getZonaSummary(list){
  var s={};list.forEach(function(e){var b=e.b||'Otros';if(!s[b])s[b]={total:0,subs:{}};s[b].total++;var sb=e.sb||b;if(!s[b].subs[sb])s[b].subs[sb]=0;s[b].subs[sb]++});return s;
}

/* ── RENDER ── */
function render(){
  var all=getPendientes(),hoy=getHoyPendientes();
  var totalHoy=entregas.filter(function(e){return e.de===getDiaHoy()}).length;
  var doneHoy=totalHoy-hoy.length;
  document.getElementById('counterBadge').textContent=doneHoy+'/'+totalHoy;
  document.getElementById('syncBanner').className='sync-banner'+(syncQueue.length>0?' visible':'');
  document.getElementById('errorView').classList.add('hidden');
  // Tab counts: ambos muestran HOY
  document.getElementById('tabArmadoCount').textContent=hoy.length||'';
  document.getElementById('tabRutaCount').textContent=hoy.length||'';
  if(all.length===0){
    document.getElementById('armadoView').classList.add('hidden');document.getElementById('rutaView').classList.add('hidden');
    document.getElementById('emptyView').classList.remove('hidden');
    document.getElementById('emptyTitle').textContent='Sin pedidos pendientes';
    document.getElementById('emptyDetail').textContent=entregas.length>0?entregas.length+' pedido(s) ya entregados':'No hay pedidos cargados';
    return;
  }
  document.getElementById('emptyView').classList.add('hidden');
  if(currentTab==='armado')renderArmado();else renderRuta();
}

/* ── ARMADO ── */
function renderArmado(){
  document.getElementById('armadoView').classList.remove('hidden');document.getElementById('rutaView').classList.add('hidden');
  var hoy=getDiaHoy(),pedH=sortByZona(getHoyPendientes()),pedO=sortByZona(getOtrosDias());

  // Resumen de productos de HOY (para sacar del freezer)
  var totals={};pedH.forEach(function(e){e.p.forEach(function(p){if(!totals[p.a])totals[p.a]=0;totals[p.a]+=p.q})});
  var sumParts=Object.keys(totals).map(function(a){return'<strong>'+totals[a]+'</strong> '+(PROD_NAMES[a]||a)});
  var summaryHtml='<strong>'+pedH.length+' pedidos para hoy '+hoy+'</strong>';
  if(pedO.length>0)summaryHtml+='<span style="float:right;font-size:10px;color:var(--muted)">Pendientes otros dias: '+pedO.length+'</span>';
  if(sumParts.length>0)summaryHtml+='<br>'+sumParts.join(' &middot; ');
  document.getElementById('armadoSummary').innerHTML=summaryHtml;

  var html='';
  // HOY: sin titulo redundante (ya está en el summary)
  if(pedH.length>0){html+=renderArmadoGroup(pedH,null,false)}
  // OTROS DIAS
  if(pedO.length>0){var pd={};pedO.forEach(function(e){if(!pd[e.de])pd[e.de]=[];pd[e.de].push(e)});Object.keys(pd).forEach(function(d){html+=renderArmadoGroup(pd[d],d,true)})}
  document.getElementById('armadoList').innerHTML=html;
}

function renderArmadoGroup(pedidos,titulo,isOther){
  var html='';
  if(titulo){html+='<div class="armado-day-header'+(isOther?' other-day':'')+'"><span>'+titulo+'</span><span class="day-count">'+pedidos.length+'</span></div>'}
  if(pedidos.length===0){html+='<div style="padding:10px 8px;font-size:12px;color:var(--muted)">Sin pedidos</div>';return html}

  var barrios={};pedidos.forEach(function(e){var b=e.b||e.h;if(!barrios[b])barrios[b]={};var sb=(e.b===e.sb||!e.sb)?'_main':e.sb;if(!barrios[b][sb])barrios[b][sb]=[];barrios[b][sb].push(e)});

  Object.keys(barrios).sort().forEach(function(b){
    var subs=barrios[b],tot=0;Object.keys(subs).forEach(function(s){tot+=subs[s].length});
    html+='<div class="armado-barrio">'+b+' ('+tot+')</div>';
    Object.keys(subs).sort().forEach(function(sb){
      if(sb!=='_main')html+='<div class="armado-subbarrio">'+sb+' <span class="sb-count">'+subs[sb].length+'</span></div>';
      // Container for flex ordering (done goes to bottom)
      html+='<div class="armado-cards">';
      subs[sb].forEach(function(e){
        var key=eKey(e),isDone=armadoDone[key];
        var loteStr=e.l?'Lote '+e.l:'';
        html+='<div class="armado-card'+(isDone?' done':'')+'" onclick="toggleArmado(\''+key+'\')">'
          +'<div class="armado-head">'
          +'<div class="armado-check">'+(isDone?'&#x2713;':'')+'</div>'
          +'<span class="armado-name">'+e.c+'</span>'
          +(loteStr?'<span class="armado-lote">'+loteStr+'</span>':'')
          +'</div>'
          +'<div class="armado-prods">'+prodText(e.p)+'</div>'
          +'</div>';
      });
      html+='</div>';
    });
  });
  return html;
}

function toggleArmado(key){
  if(armadoDone[key]){
    // Desmarcar: sin confirmación
    delete armadoDone[key];saveLocal();renderArmado();
  } else {
    // Marcar: con confirmación
    var o=document.getElementById('confirmOverlay');o.className='confirm-overlay';
    o.innerHTML='<div class="confirm-box"><h3>Pedido armado?</h3><p>Bolsa lista para entregar</p><div class="confirm-btns"><button class="btn-no" onclick="cerrarConfirm()">No</button><button class="btn-si" onclick="cerrarConfirm();confirmarArmado(\''+key+'\')">Si, armado</button></div></div>';
  }
}
function confirmarArmado(key){armadoDone[key]=true;saveLocal();renderArmado();if(navigator.vibrate)navigator.vibrate(30)}

/* ── RUTA ── */
function renderRuta(){
  document.getElementById('armadoView').classList.add('hidden');document.getElementById('rutaView').classList.remove('hidden');
  var sorted=getSorted(),header=document.getElementById('rutaHeader'),body=document.getElementById('rutaBody'),actions=document.getElementById('rutaActions');

  if(sorted.length===0){
    header.innerHTML='';
    body.innerHTML='<div class="empty" style="padding:40px">Todas las entregas de hoy completadas</div>';
    actions.innerHTML='';return;
  }
  if(rutaIndex>=sorted.length)rutaIndex=sorted.length-1;if(rutaIndex<0)rutaIndex=0;
  var e=sorted[rutaIndex],key=eKey(e);

  // Header compacto: zona + contador
  var zona=(e.sb&&e.sb!==e.b)?e.sb:e.b;
  header.innerHTML='<span>'+(rutaIndex+1)+'/'+sorted.length+'</span><span class="ruta-zona">'+zona+'</span><span>#'+e.id+'</span>';

  // Body: LOTE primero (lo que necesito ver manejando)
  var h='';
  if(e.l){h+='<div class="ruta-lote">'+e.l+'</div>'}
  else{h+='<div style="font-size:28px;font-weight:900;color:var(--orange);margin-bottom:4px">'+e.d+'</div>'}
  h+='<div class="ruta-nombre">'+e.c+'</div>';

  // Productos
  h+='<div class="ruta-productos">';e.p.forEach(function(p){h+='<div class="ruta-prod-item"><span>'+(PROD_NAMES[p.a]||p.a)+'</span><span class="ruta-prod-qty">'+p.q+'</span></div>'});h+='</div>';

  // Cobrar
  var prop=propinas[key]||0,totalFact=e.$+prop;
  var cobrado=isCobrado(e);
  var badgeClass=cobrado?'cobrado':(e.fp==='Efectivo'?'efectivo':'transferencia');
  var badgeText=cobrado?'Cobrado':e.fp;
  h+='<div class="ruta-cobrar"><span class="ruta-cobrar-total" id="totalFacturado">'+formatMoney(totalFact)+'</span><span class="ruta-cobrar-badge '+badgeClass+'">'+badgeText+'</span></div>';

  // Extras: WhatsApp + Propina (siempre visibles, una fila cada uno)
  h+='<div class="ruta-extras">';
  if(e.t){var tel=e.t.replace(/[^0-9]/g,'');if(tel.length<12)tel='54'+tel;h+='<a href="https://wa.me/'+tel+'?text='+encodeURIComponent('Estamos yendo a dejar tu pedido! :)')+'" class="btn-wpp-sm">WA '+e.c.split(' ')[0]+'</a>'}
  if(!cobrado){h+='<div style="flex:1;display:flex;align-items:center;gap:6px;background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:6px 8px"><label style="font-size:11px;font-weight:700;flex-shrink:0">Propina $</label><input type="number" id="propinaInput" inputmode="numeric" placeholder="0" value="'+(prop||'')+'" oninput="actualizarPropina(\''+key+'\','+e.$+')" style="flex:1;border:none;font-size:14px;font-weight:700;font-family:inherit;text-align:right;outline:none;background:transparent"></div>'}
  h+='</div>';
  body.innerHTML=h;

  // Actions: botón principal + nav
  var a='';
  if(!cobrado&&e.fp==='Efectivo'){
    a+='<button class="btn-entregado cobrar-first" id="btnCobrado" onclick="marcarCobrado(\''+key+'\')">COBRADO '+formatMoney(totalFact)+'</button>';
  }
  a+='<button class="btn-entregado" onclick="confirmarEntregado(\''+key+'\')">ENTREGADO</button>';
  a+='<div class="ruta-nav"><button class="btn-prev" onclick="rutaPrev()">&larr;</button><button class="btn-next" onclick="rutaNext()">Siguiente &rarr;</button></div>';
  actions.innerHTML=a;
}

function rutaNext(){var s=getSorted();if(rutaIndex>=s.length-1){showToast('No hay mas entregas');return}rutaIndex++;saveLocal();renderRuta()}
function rutaPrev(){if(rutaIndex<=0){showToast('Es la primera entrega');return}rutaIndex--;saveLocal();renderRuta()}

/* ── PROPINA ── */
function actualizarPropina(key,pedidoTotal){
  var v=parseInt(document.getElementById('propinaInput').value)||0;
  if(v>0)propinas[key]=v;else delete propinas[key];saveLocal();
  var total=pedidoTotal+v;
  var el=document.getElementById('totalFacturado');if(el)el.textContent=formatMoney(total);
  var btn=document.getElementById('btnCobrado');if(btn)btn.textContent='COBRADO '+formatMoney(total);
}

/* ── CONFIRMAR ENTREGADO ── */
function confirmarEntregado(key){
  var o=document.getElementById('confirmOverlay');o.className='confirm-overlay';
  o.innerHTML='<div class="confirm-box"><h3>Marcar como entregado?</h3><p>Se actualiza en el Sheets</p><div class="confirm-btns"><button class="btn-no" onclick="cerrarConfirm()">No</button><button class="btn-si" onclick="cerrarConfirm();marcarEntregado(\''+key+'\')">Si, entregado</button></div></div>';
}
function cerrarConfirm(){document.getElementById('confirmOverlay').classList.add('hidden')}

/* ── MARCAR ENTREGADO ── */
function marcarEntregado(key){
  entregados[key]=true;var parts=key.split('|'),hoja=parts[0],id=parts[1];
  var ent=entregas.find(function(e){return e.h===hoja&&String(e.id)===id});
  if(ent){syncQueue.push({action:'marcarEntregado',hoja:ent.h,id:String(ent.id),row:ent.r,cobrado:!!cobrados[key],propina:propinas[key]||0,ts:Date.now()})}
  saveLocal();processSyncQueue();if(navigator.vibrate)navigator.vibrate(50);
  // Auto-avance: no incrementar index porque el entregado sale de la lista
  showToast('Entregado a '+((ent&&ent.c)||'').split(' ')[0]);
  render();
}

function marcarCobrado(key){cobrados[key]=true;saveLocal();renderRuta();if(navigator.vibrate)navigator.vibrate(30)}

/* ── SYNC ── */
function processSyncQueue(){
  if(!isOnline||syncQueue.length===0)return;
  fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(syncQueue[0])}).then(function(){
    syncQueue.shift();saveLocal();document.getElementById('syncBanner').className='sync-banner'+(syncQueue.length>0?' visible':'');
    if(syncQueue.length>0)setTimeout(processSyncQueue,1000);
  }).catch(function(){setTimeout(processSyncQueue,30000)});
}

/* ── TABS ── */
function switchTab(tab){currentTab=tab;saveLocal();document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===tab)});render()}

/* ── TOAST ── */
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},3000)}
</script>
</body>
</html>
