<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#331C1C">
<link rel="manifest" href="/ruta-manifest.json">
<link rel="icon" href="/img/favicon.png">
<link rel="apple-touch-icon" href="/img/favicon.png">
<title>Maleu Ruta</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#F5F2EB;color:#331C1C;overflow-x:hidden;min-height:100dvh}

/* ── TOP BAR ── */
.topbar{background:#331C1C;color:#F2E8C7;padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar h1{font-size:16px;font-weight:800;flex:1;letter-spacing:.03em}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.status-dot.online{background:#4CAF50}
.status-dot.offline{background:#F44336;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.badge{background:#F07D47;color:#fff;font-size:12px;font-weight:800;padding:3px 10px;border-radius:50px}
.btn-refresh{background:none;border:none;color:#F2E8C7;font-size:20px;cursor:pointer;padding:8px;border-radius:8px;line-height:1}
.btn-refresh:active{background:rgba(255,255,255,.15)}
.btn-refresh.spinning{animation:spin .8s linear}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TABS ── */
.tabs{display:flex;background:#E8DFC4;position:sticky;top:52px;z-index:99}
.tab{flex:1;padding:12px;text-align:center;font-size:14px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;transition:.15s}
.tab.active{border-bottom-color:#F07D47;color:#F07D47}

/* ── LOADING / EMPTY ── */
.loading,.empty{text-align:center;padding:60px 20px;color:#7A4A4A}
.loading{font-style:italic}

/* ── ARMADO VIEW ── */
.armado-list{padding:8px}
.armado-day-header{padding:12px 8px 6px;font-size:15px;font-weight:800;color:#331C1C;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.armado-day-header .day-count{font-size:12px;font-weight:700;background:#F07D47;color:#fff;padding:2px 10px;border-radius:50px}
.armado-day-header.other-day{color:#7A4A4A;opacity:.7}
.armado-barrio{padding:10px 8px 4px;font-size:13px;font-weight:800;color:#331C1C;border-top:2px solid #E8DFC4;margin-top:4px}
.armado-subbarrio{padding:4px 8px 2px;font-size:11px;font-weight:700;color:#F07D47;text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
.armado-subbarrio .sb-count{font-size:10px;background:#F2E8C7;color:#7A4A4A;padding:1px 6px;border-radius:50px}
.armado-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:8px;border:2px solid #E8DFC4;transition:.15s}
.armado-card.done{opacity:.4;border-color:#4CAF50;background:#f0f8f0}
.armado-head{display:flex;align-items:center;gap:10px}
.armado-check{width:28px;height:28px;border-radius:8px;border:2.5px solid #D4C8A0;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;color:#fff;cursor:pointer;transition:.15s}
.armado-card.done .armado-check{background:#4CAF50;border-color:#4CAF50}
.armado-name{font-size:15px;font-weight:700;flex:1}
.armado-zona{font-size:10px;font-weight:700;background:#F07D47;color:#fff;padding:2px 8px;border-radius:50px}
.armado-prods{margin-top:8px;padding-left:38px;font-size:13px;line-height:1.7;color:#555}
.armado-prods span{font-weight:700;color:#331C1C}

/* ── RUTA VIEW ── */
.ruta-container{display:flex;flex-direction:column;min-height:calc(100dvh - 104px)}
.ruta-card{flex:1;padding:16px;display:flex;flex-direction:column}
.ruta-counter{text-align:center;font-size:12px;color:#7A4A4A;padding:8px;font-weight:600}
.ruta-subbarrio-banner{background:#F07D47;color:#fff;text-align:center;padding:6px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.ruta-resumen{background:#fff;border-bottom:1px solid #E8DFC4;padding:10px 16px}
.ruta-resumen-barrios{display:flex;gap:6px;flex-wrap:wrap}
.ruta-resumen-barrio{font-size:12px;background:#331C1C;color:#F2E8C7;padding:5px 12px;border-radius:50px;font-weight:700;cursor:pointer;transition:.15s}
.ruta-resumen-barrio.active{background:#F07D47;color:#fff}
.ruta-resumen-subs{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;padding-left:4px}
.ruta-resumen-sub{font-size:10px;background:#F2E8C7;padding:2px 8px;border-radius:50px;font-weight:700;color:#7A4A4A}
.ruta-resumen-sub.active{background:#F07D47;color:#fff}
.ruta-nombre{text-align:center;font-size:22px;font-weight:800;margin-bottom:4px}
.ruta-dir{text-align:center;font-size:16px;color:#7A4A4A;margin-bottom:2px}
.ruta-lote{text-align:center;font-size:42px;font-weight:900;color:#F07D47;letter-spacing:.02em;margin-bottom:12px;line-height:1.1}
.ruta-productos{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:12px;flex:1}
.ruta-prod-item{display:flex;justify-content:space-between;padding:4px 0;font-size:14px;border-bottom:1px solid #F2E8C7}
.ruta-prod-item:last-child{border:none}
.ruta-prod-qty{font-weight:800;color:#F07D47;min-width:30px}
.ruta-pago{display:flex;justify-content:space-between;align-items:center;background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.ruta-total{font-size:22px;font-weight:800}
.pago-badge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:50px}
.pago-badge.cobrado{background:#e8f5e8;color:#2d6a2d}
.pago-badge.no-cobrado{background:#fff3e0;color:#e67e22}
.pago-badge.efectivo{border:2px solid #4CAF50}
.pago-badge.transferencia{border:2px solid #2196F3}

/* ── PROPINA ── */
.propina-row{display:flex;align-items:center;gap:8px;background:#fff;border-radius:12px;padding:10px 16px;margin-bottom:12px}
.propina-row label{font-size:13px;font-weight:700;flex-shrink:0}
.propina-input{flex:1;border:2px solid #E8DFC4;border-radius:8px;padding:8px 12px;font-size:16px;font-weight:700;font-family:inherit;text-align:right;outline:none}
.propina-input:focus{border-color:#F07D47}

/* ── ACTION BUTTONS ── */
.ruta-actions{padding:0 16px 16px;display:flex;flex-direction:column;gap:8px}
.btn-entregar{width:100%;padding:18px;border:none;border-radius:14px;font-family:inherit;font-size:18px;font-weight:800;cursor:pointer;transition:.15s}
.btn-entregar.primary{background:#4CAF50;color:#fff}
.btn-entregar.primary:active{background:#388E3C;transform:scale(.97)}
.btn-entregar.secondary{background:#fff;color:#331C1C;border:2px solid #E8DFC4}
.btn-entregar.secondary:active{background:#F2E8C7}
.btn-entregar.cobrar{background:#F07D47;color:#fff}
.btn-entregar.cobrar:active{background:#d06830}
.btn-nav{background:none;border:2px solid #D4C8A0;color:#331C1C;width:50px;height:50px;border-radius:12px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-nav:active{background:#E8DFC4}
.nav-row{display:flex;gap:8px;align-items:center;justify-content:center;padding:0 16px 8px}
.btn-wpp{background:#25D366;color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:700}

/* ── CONFIRM OVERLAY ── */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:#fff;border-radius:16px;padding:24px;max-width:320px;width:100%;text-align:center}
.confirm-box h3{font-size:18px;margin-bottom:8px}
.confirm-box p{font-size:14px;color:#7A4A4A;margin-bottom:20px}
.confirm-btns{display:flex;gap:8px}
.confirm-btns button{flex:1;padding:14px;border:none;border-radius:12px;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer}
.confirm-btns .btn-si{background:#4CAF50;color:#fff}
.confirm-btns .btn-no{background:#E8DFC4;color:#331C1C}

/* ── SYNC BANNER ── */
.sync-banner{background:#FFF3E0;color:#E65100;text-align:center;padding:6px;font-size:11px;font-weight:700;display:none}
.sync-banner.visible{display:block}

.hidden{display:none!important}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#331C1C;color:#F2E8C7;padding:10px 20px;border-radius:50px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <h1>MALEU RUTA</h1>
  <span id="lastSync" style="font-size:10px;opacity:.6"></span>
  <div class="status-dot" id="statusDot"></div>
  <span class="badge" id="counterBadge">--</span>
  <button class="btn-refresh" id="btnRefresh" onclick="refresh()">&#x21bb;</button>
</div>

<div class="sync-banner" id="syncBanner">Hay entregas pendientes de sincronizar</div>

<div class="tabs">
  <div class="tab active" data-tab="armado" onclick="switchTab('armado')">ARMADO</div>
  <div class="tab" data-tab="ruta" onclick="switchTab('ruta')">RUTA</div>
</div>

<div id="loadingView" class="loading">Cargando pedidos...</div>
<div id="emptyView" class="empty hidden">
  <div style="font-size:36px;margin-bottom:12px">&#x2713;</div>
  <div style="font-size:16px;font-weight:700;margin-bottom:4px" id="emptyTitle">Sin pedidos pendientes</div>
  <div style="font-size:13px" id="emptyDetail"></div>
</div>
<div id="errorView" class="empty hidden" style="color:#E65100">
  <div style="font-size:36px;margin-bottom:12px">&#x26A0;</div>
  <div style="font-size:16px;font-weight:700;margin-bottom:4px">No se pudo conectar</div>
  <div style="font-size:13px">Toca el boton de refresh</div>
</div>

<!-- ARMADO -->
<div id="armadoView" class="hidden">
  <div class="armado-list" id="armadoList"></div>
</div>

<!-- RUTA -->
<div id="rutaView" class="hidden">
  <div class="ruta-container">
    <div class="ruta-resumen" id="rutaResumen"></div>
    <div class="ruta-subbarrio-banner" id="rutaSubbarrioBanner"></div>
    <div class="ruta-counter" id="rutaCounter"></div>
    <div class="ruta-card" id="rutaCard"></div>
    <div class="nav-row">
      <button class="btn-nav" onclick="rutaPrev()">&#x2190;</button>
      <button class="btn-entregar secondary" onclick="rutaNext()" style="flex:1">Siguiente &#x2192;</button>
      <button class="btn-nav" onclick="rutaNext()">&#x2192;</button>
    </div>
    <div class="ruta-actions" id="rutaActions"></div>
  </div>
</div>

<div id="confirmOverlay" class="confirm-overlay hidden"></div>
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   MALEU RUTA v2 — Plataforma de delivery mobile-first
   ═══════════════════════════════════════════════════════════ */

var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxmrG5YVSshcYezk8lXFx_uxb7NFGcb9EfTXc7dsIN4rZyj73CET4mk_aKPFPDY2wNi/exec';
var WA_NUMBER = '5491155038905';

var PROD_NAMES = {
  PPM:'Pack Muzza x2', PPJyQ:'Pack J&Q x2', PPCyQ:'Pack C&Q x2',
  SCo:'Sorr. Cordero', SQB:'Sorr. Queso Brie', SL:'Sorr. Langostinos',
  SPyP:'Sorr. Pollo&Puerro', SJyQ:'Sorr. J&Q', SE:'Sorr. Espinaca', SCa:'Sorr. Calabaza',
  ECaC:'Emp. Carne x8', EJyQ:'Emp. J&Q x8', ECyQ:'Emp. C&Q x8', EV:'Emp. Verdura x8',
  TG:'Torta Golosa', TLC:'Torta Lemon', TC:'Torta Coco', F:'Franui',
  PMu:'Pizza Muzza', PMa:'Pizza Margarita', PJyQ:'Pizza J&Q', PCC:'Pizza Cebolla', PJyM:'Pizza J&M'
};

/* ── CONSTANTES ────────────────────────────────────────── */
var DIAS_SEMANA = ['Domingo','Lunes','Martes','Mi\u00E9rcoles','Jueves','Viernes','S\u00E1bado'];

function getDiaHoy() {
  return DIAS_SEMANA[new Date().getDay()];
}

/* ── STATE ─────────────────────────────────────────────── */
var entregas = [];
var entregados = {};
var cobrados = {};
var propinas = {};       // { "Home|3": 500 }
var syncQueue = [];
var armadoDone = {};
var currentTab = 'armado';
var rutaIndex = 0;
var isOnline = navigator.onLine;

/* ── INIT ──────────────────────────────────────────────── */
loadLocal();
updateOnlineStatus();
window.addEventListener('online', function() { isOnline = true; updateOnlineStatus(); processSyncQueue(); refresh(true); });
window.addEventListener('offline', function() { isOnline = false; updateOnlineStatus(); });

if (entregas.length > 0) {
  document.getElementById('loadingView').classList.add('hidden');
  render();
  updateLastSync();
  refresh(true);
} else {
  refresh();
}

setInterval(function() { if (isOnline && document.visibilityState === 'visible') refresh(true); }, 90000);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw-ruta.js').catch(function() {});
}

/* ── ONLINE STATUS ─────────────────────────────────────── */
function updateOnlineStatus() {
  var dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + (isOnline ? 'online' : 'offline');
}

function updateLastSync() {
  var el = document.getElementById('lastSync');
  var now = new Date();
  el.textContent = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
  localStorage.setItem('maleu_ruta_sync', now.getTime());
}

/* ── LOCAL STORAGE ─────────────────────────────────────── */
function saveLocal() {
  try {
    localStorage.setItem('maleu_ruta', JSON.stringify({
      entregas: entregas, entregados: entregados, cobrados: cobrados,
      propinas: propinas, syncQueue: syncQueue, armadoDone: armadoDone, ts: Date.now()
    }));
  } catch(e) {}
}

function loadLocal() {
  try {
    var d = JSON.parse(localStorage.getItem('maleu_ruta') || '{}');
    if (d.entregas) entregas = d.entregas;
    if (d.entregados) entregados = d.entregados;
    if (d.cobrados) cobrados = d.cobrados;
    if (d.propinas) propinas = d.propinas;
    if (d.syncQueue) syncQueue = d.syncQueue;
    if (d.armadoDone) armadoDone = d.armadoDone;
  } catch(e) {}
}

/* ── REFRESH ──────────────────────────────────────────── */
function refresh(silent) {
  if (!silent) document.getElementById('loadingView').classList.remove('hidden');
  var btn = document.getElementById('btnRefresh');
  btn.classList.add('spinning');

  fetch(APPS_SCRIPT_URL + '?action=entregas&t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      btn.classList.remove('spinning');
      var serverEntregas = data.e || [];
      var prevCount = getPendientes().length;
      entregas = serverEntregas;

      var serverKeys = {};
      entregas.forEach(function(e) { serverKeys[e.h + '|' + e.id] = true; });
      Object.keys(entregados).forEach(function(k) { if (!serverKeys[k]) delete entregados[k]; });
      Object.keys(cobrados).forEach(function(k) { if (!serverKeys[k]) delete cobrados[k]; });

      saveLocal();
      render();
      updateLastSync();

      var newCount = getPendientes().length;
      if (silent && newCount > prevCount) {
        showToast((newCount - prevCount) + ' pedido(s) nuevo(s)');
      }
      document.getElementById('loadingView').classList.add('hidden');
      processSyncQueue();
    })
    .catch(function() {
      btn.classList.remove('spinning');
      document.getElementById('loadingView').classList.add('hidden');
      if (entregas.length > 0) { render(); showToast('Sin conexion - datos del cache'); }
      else { document.getElementById('errorView').classList.remove('hidden'); }
    });
}

/* ── HELPERS ────────────────────────────────────────────── */
function eKey(e) { return e.h + '|' + e.id; }
function isEntregado(e) { return entregados[eKey(e)] || e.es === 'Entregado'; }
function isCobrado(e) { return cobrados[eKey(e)] || e.ep === 'Cobrado'; }
function getPendientes() { return entregas.filter(function(e) { return !isEntregado(e); }); }
function getHoyPendientes() { var h = getDiaHoy(); return getPendientes().filter(function(e) { return e.de === h; }); }
function getOtrosDias() { var h = getDiaHoy(); return getPendientes().filter(function(e) { return e.de !== h; }); }

function sortByZona(list) {
  list.sort(function(a, b) {
    var bo = {'Estancias del Pilar':0,'Los Alcanfores':1,'Estancias del R\u00edo':2,'Pilar':3,'Capital Federal':4};
    var ba = bo[a.b] !== undefined ? bo[a.b] : 9, bb = bo[b.b] !== undefined ? bo[b.b] : 9;
    if (ba !== bb) return ba - bb;
    if (a.sb !== b.sb) return (a.sb || '').localeCompare(b.sb || '');
    var la = parseInt(a.l) || 999, lb = parseInt(b.l) || 999;
    return la - lb;
  });
  return list;
}

function getSorted() { return sortByZona(getHoyPendientes()); }

function prodText(prods) {
  return prods.map(function(p) { return '<span>' + p.q + 'x</span> ' + (PROD_NAMES[p.a] || p.a); }).join('<br>');
}

function formatMoney(n) { return '$' + n.toLocaleString('es-AR'); }

// Resumen por barrio/sub-barrio
function getZonaSummary(list) {
  var summary = {};
  list.forEach(function(e) {
    var b = e.b || 'Otros';
    if (!summary[b]) summary[b] = { total: 0, subs: {} };
    summary[b].total++;
    var sb = e.sb || b;
    if (!summary[b].subs[sb]) summary[b].subs[sb] = 0;
    summary[b].subs[sb]++;
  });
  return summary;
}

/* ── RENDER ─────────────────────────────────────────────── */
function render() {
  var allPending = getPendientes();
  var hoyPending = getHoyPendientes();
  var totalHoy = entregas.filter(function(e) { return e.de === getDiaHoy(); }).length;
  var doneHoy = totalHoy - hoyPending.length;

  document.getElementById('counterBadge').textContent = doneHoy + '/' + totalHoy;
  document.getElementById('syncBanner').className = 'sync-banner' + (syncQueue.length > 0 ? ' visible' : '');
  document.getElementById('errorView').classList.add('hidden');

  if (allPending.length === 0) {
    document.getElementById('armadoView').classList.add('hidden');
    document.getElementById('rutaView').classList.add('hidden');
    document.getElementById('emptyView').classList.remove('hidden');
    document.getElementById('emptyTitle').textContent = 'Sin pedidos pendientes';
    document.getElementById('emptyDetail').textContent = entregas.length > 0
      ? entregas.length + ' pedido(s) ya entregados' : 'No hay pedidos cargados';
    return;
  }
  document.getElementById('emptyView').classList.add('hidden');

  if (currentTab === 'armado') renderArmado();
  else renderRuta();
}

/* ── ARMADO ─────────────────────────────────────────────── */
function renderArmado() {
  document.getElementById('armadoView').classList.remove('hidden');
  document.getElementById('rutaView').classList.add('hidden');

  var hoy = getDiaHoy();
  var pedidosHoy = sortByZona(getHoyPendientes());
  var pedidosOtros = sortByZona(getOtrosDias());

  var html = '';
  html += renderArmadoGroup(pedidosHoy, 'Hoy ' + hoy, false);

  if (pedidosOtros.length > 0) {
    var porDia = {};
    pedidosOtros.forEach(function(e) { if (!porDia[e.de]) porDia[e.de] = []; porDia[e.de].push(e); });
    Object.keys(porDia).forEach(function(dia) {
      html += renderArmadoGroup(porDia[dia], dia, true);
    });
  }

  document.getElementById('armadoList').innerHTML = html;
}

function renderArmadoGroup(pedidos, titulo, isOtherDay) {
  var html = '';
  html += '<div class="armado-day-header' + (isOtherDay ? ' other-day' : '') + '">' +
    '<span>' + titulo + '</span><span class="day-count">' + pedidos.length + '</span></div>';

  if (pedidos.length === 0) {
    html += '<div style="padding:12px 8px;font-size:13px;color:#7A4A4A">Sin pedidos</div>';
    return html;
  }

  // Agrupar por barrio privado, luego sub-barrio
  var barrios = {};
  pedidos.forEach(function(e) {
    var b = e.b || e.h;
    if (!barrios[b]) barrios[b] = {};
    var sb = (e.b === e.sb || !e.sb) ? '_main' : e.sb;
    if (!barrios[b][sb]) barrios[b][sb] = [];
    barrios[b][sb].push(e);
  });

  Object.keys(barrios).sort().forEach(function(b) {
    var subs = barrios[b];
    var totalBarrio = 0;
    Object.keys(subs).forEach(function(s) { totalBarrio += subs[s].length; });
    html += '<div class="armado-barrio">' + b + ' (' + totalBarrio + ')</div>';

    Object.keys(subs).sort().forEach(function(sb) {
      if (sb !== '_main') {
        html += '<div class="armado-subbarrio">' + sb + ' <span class="sb-count">' + subs[sb].length + '</span></div>';
      }
      subs[sb].forEach(function(e) {
        var key = eKey(e);
        var isDone = armadoDone[key];
        html += '<div class="armado-card' + (isDone ? ' done' : '') + '" onclick="toggleArmado(\'' + key + '\')">' +
          '<div class="armado-head">' +
          '<div class="armado-check">' + (isDone ? '&#x2713;' : '') + '</div>' +
          '<span class="armado-name">' + e.c + '</span>' +
          '</div>' +
          '<div class="armado-prods">' + prodText(e.p) + '</div>' +
          '</div>';
      });
    });
  });

  return html;
}

function toggleArmado(key) {
  if (armadoDone[key]) delete armadoDone[key];
  else armadoDone[key] = true;
  saveLocal();
  renderArmado();
}

/* ── RUTA ──────────────────────────────────────────────── */
function renderRuta() {
  document.getElementById('armadoView').classList.add('hidden');
  document.getElementById('rutaView').classList.remove('hidden');

  var sorted = getSorted();
  var banner = document.getElementById('rutaSubbarrioBanner');
  var resumen = document.getElementById('rutaResumen');

  if (sorted.length === 0) {
    banner.style.display = 'none';
    resumen.innerHTML = '';
    document.getElementById('rutaCounter').textContent = 'Todas las entregas de hoy completadas';
    document.getElementById('rutaCard').innerHTML = '<div class="empty" style="padding:40px">Sin pedidos pendientes</div>';
    document.getElementById('rutaActions').innerHTML = '';
    return;
  }

  if (rutaIndex >= sorted.length) rutaIndex = sorted.length - 1;
  if (rutaIndex < 0) rutaIndex = 0;

  var e = sorted[rutaIndex];
  var key = eKey(e);

  // Mini resumen: barrios privados tocables, expanden sub-barrios
  var summary = getZonaSummary(sorted);
  var barrioActual = e.b || 'Otros';
  var sbActual = e.sb || e.b || 'Otros';
  var resHtml = '<div class="ruta-resumen-barrios">';
  Object.keys(summary).forEach(function(b) {
    var isActive = resumenBarrioAbierto === b;
    resHtml += '<span class="ruta-resumen-barrio' + (isActive ? ' active' : '') + '" onclick="toggleResumenBarrio(\'' + b + '\')">' + b + ' — ' + summary[b].total + '</span>';
  });
  resHtml += '</div>';
  // Sub-barrios: solo si el usuario tocó un barrio
  if (resumenBarrioAbierto && summary[resumenBarrioAbierto]) {
    var subs = summary[resumenBarrioAbierto].subs;
    var subKeys = Object.keys(subs).filter(function(sb) { return sb !== resumenBarrioAbierto; });
    if (subKeys.length > 0) {
      resHtml += '<div class="ruta-resumen-subs">';
      subKeys.forEach(function(sb) {
        var isActive = sb === sbActual;
        resHtml += '<span class="ruta-resumen-sub' + (isActive ? ' active' : '') + '">' + sb + ' — ' + subs[sb] + '</span>';
      });
      resHtml += '</div>';
    }
  }
  resumen.innerHTML = resHtml;

  // Banner zona actual
  var bannerText = (e.sb && e.sb !== e.b) ? e.sb : e.b;
  var enEstaZona = sorted.filter(function(x) {
    return (x.sb && x.sb !== x.b) ? x.sb === bannerText : x.b === bannerText;
  }).length;
  banner.textContent = bannerText + ' (' + enEstaZona + ')';
  banner.style.display = 'block';

  document.getElementById('rutaCounter').textContent = (rutaIndex + 1) + ' de ' + sorted.length + ' pendientes';

  // Card
  var html = '';
  html += '<div class="ruta-nombre">' + e.c + '</div>';
  if (e.sb && e.l) {
    html += '<div class="ruta-lote">Lote ' + e.l + '</div>';
  } else {
    html += '<div class="ruta-dir" style="font-size:24px;font-weight:800;margin-bottom:12px">' + e.d + '</div>';
  }

  html += '<div class="ruta-productos">';
  e.p.forEach(function(p) {
    html += '<div class="ruta-prod-item"><span>' + (PROD_NAMES[p.a] || p.a) + '</span><span class="ruta-prod-qty">' + p.q + '</span></div>';
  });
  html += '</div>';

  var pagoClass = isCobrado(e) ? 'cobrado' : 'no-cobrado';
  var pagoType = e.fp === 'Efectivo' ? ' efectivo' : ' transferencia';
  html += '<div class="ruta-pago">' +
    '<span class="ruta-total">' + formatMoney(e.$) + '</span>' +
    '<span class="pago-badge ' + pagoClass + pagoType + '">' +
    e.fp + ' &middot; ' + (isCobrado(e) ? 'Cobrado' : 'No cobrado') +
    '</span></div>';

  // Propina
  if (!isCobrado(e)) {
    html += '<div class="propina-row"><label>Propina $</label><input type="number" class="propina-input" id="propinaInput" inputmode="numeric" placeholder="0" value="' + (propinas[key] || '') + '" onchange="guardarPropina(\'' + key + '\')"></div>';
  }

  document.getElementById('rutaCard').innerHTML = html;

  // Actions
  var actions = '';

  // WhatsApp
  if (e.t) {
    var tel = e.t.replace(/[^0-9]/g, '');
    if (tel.length < 12) tel = '54' + tel;
    var waMsg = encodeURIComponent('Estamos yendo a dejar el pedido! :)');
    actions += '<a href="https://wa.me/' + tel + '?text=' + waMsg + '" class="btn-entregar btn-wpp" style="text-decoration:none">WhatsApp a ' + e.c.split(' ')[0] + '</a>';
  }

  // Cobrar
  if (!isCobrado(e)) {
    actions += '<button class="btn-entregar cobrar" onclick="marcarCobrado(\'' + key + '\')">COBRADO ' + formatMoney(e.$) + '</button>';
  }

  // Entregado con confirmación
  actions += '<button class="btn-entregar primary" onclick="confirmarEntregado(\'' + key + '\')">ENTREGADO &#x2713;</button>';

  document.getElementById('rutaActions').innerHTML = actions;
}

function rutaNext() { rutaIndex++; renderRuta(); }
function rutaPrev() { rutaIndex = Math.max(0, rutaIndex - 1); renderRuta(); }

var resumenBarrioAbierto = null;
function toggleResumenBarrio(b) {
  resumenBarrioAbierto = (resumenBarrioAbierto === b) ? null : b;
  var sorted = getSorted();
  for (var i = 0; i < sorted.length; i++) {
    if (sorted[i].b === b) { rutaIndex = i; break; }
  }
  renderRuta();
}

/* ── PROPINA ──────────────────────────────────────────── */
function guardarPropina(key) {
  var input = document.getElementById('propinaInput');
  var val = parseInt(input.value) || 0;
  if (val > 0) propinas[key] = val;
  else delete propinas[key];
  saveLocal();
}

/* ── CONFIRMAR ENTREGADO ─────────────────────────────── */
function confirmarEntregado(key) {
  var overlay = document.getElementById('confirmOverlay');
  overlay.className = 'confirm-overlay';
  overlay.innerHTML = '<div class="confirm-box">' +
    '<h3>Marcar como entregado?</h3>' +
    '<p>Se actualiza en el Sheets automaticamente</p>' +
    '<div class="confirm-btns">' +
    '<button class="btn-no" onclick="cerrarConfirm()">No</button>' +
    '<button class="btn-si" onclick="cerrarConfirm();marcarEntregado(\'' + key + '\')">Si, entregado</button>' +
    '</div></div>';
}

function cerrarConfirm() {
  document.getElementById('confirmOverlay').classList.add('hidden');
}

/* ── MARCAR ENTREGADO ──────────────────────────────────── */
function marcarEntregado(key) {
  entregados[key] = true;

  var parts = key.split('|');
  var hoja = parts[0], id = parts[1];
  var entrega = entregas.find(function(e) { return e.h === hoja && String(e.id) === id; });

  if (entrega) {
    syncQueue.push({
      action: 'marcarEntregado',
      hoja: entrega.h,
      id: String(entrega.id),
      row: entrega.r,
      cobrado: !!cobrados[key],
      propina: propinas[key] || 0,
      ts: Date.now()
    });
  }

  saveLocal();
  render();
  processSyncQueue();
  if (navigator.vibrate) navigator.vibrate(50);
}

function marcarCobrado(key) {
  cobrados[key] = true;
  saveLocal();
  renderRuta();
  if (navigator.vibrate) navigator.vibrate(30);
}

/* ── SYNC QUEUE ────────────────────────────────────────── */
function processSyncQueue() {
  if (!isOnline || syncQueue.length === 0) return;
  var item = syncQueue[0];
  fetch(APPS_SCRIPT_URL, {
    method: 'POST', mode: 'no-cors',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(item)
  }).then(function() {
    syncQueue.shift();
    saveLocal();
    document.getElementById('syncBanner').className = 'sync-banner' + (syncQueue.length > 0 ? ' visible' : '');
    if (syncQueue.length > 0) setTimeout(processSyncQueue, 1000);
  }).catch(function() {
    setTimeout(processSyncQueue, 30000);
  });
}

/* ── TAB SWITCH ────────────────────────────────────────── */
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.toggle('active', t.dataset.tab === tab); });
  render();
}

/* ── TOAST ─────────────────────────────────────────────── */
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}
</script>
