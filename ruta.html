<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="format-detection" content="telephone=no,address=no,date=no,email=no">
<meta name="x-apple-disable-message-reformatting">
<meta name="theme-color" content="#331C1C">
<link rel="manifest" href="/ruta-manifest.json">
<link rel="icon" href="/img/favicon.png">
<link rel="apple-touch-icon" href="/img/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<title>Maleu Ruta</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--brown:#331C1C;--orange:#F07D47;--beige:#F2E8C7;--bg:#F5F2EB;--white:#fff;--muted:#7A4A4A;--border:#E8DFC4;--green:#3d8b3d;--green-light:#e8f5e8}
body{font-family:'Montserrat',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--brown);overflow-x:hidden;min-height:100dvh}

/* ── TOP BAR ── */
.topbar{background:var(--brown);color:var(--beige);padding:12px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar h1{font-size:15px;font-weight:800;flex:1;letter-spacing:.04em}
.status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.status-dot.online{background:#4CAF50}
.status-dot.offline{background:#F44336;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.badge{background:var(--orange);color:#fff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:50px}
.btn-refresh{background:none;border:none;color:var(--beige);font-size:18px;cursor:pointer;padding:8px;border-radius:8px;line-height:1}
.btn-refresh:active{background:rgba(255,255,255,.15)}
.btn-refresh.spinning{animation:spin .8s linear}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TABS ── */
.tabs{display:flex;background:var(--border);position:sticky;top:49px;z-index:99}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;transition:.15s}
.tab.active{border-bottom-color:var(--orange);color:var(--orange)}
.tab .tab-count{font-size:10px;background:var(--orange);color:#fff;padding:1px 6px;border-radius:50px;margin-left:4px}

/* ── LOADING / EMPTY ── */
.loading,.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.loading{font-style:italic}

/* ── ARMADO: RESUMEN PRODUCTOS ── */
.armado-summary{background:var(--white);border-bottom:1px solid var(--border);padding:10px 16px;font-size:11px;color:var(--muted);line-height:1.8}
.armado-summary strong{color:var(--brown);font-weight:800}

/* ── ARMADO VIEW ── */
.armado-list{padding:8px}
.armado-day-header{padding:12px 8px 6px;font-size:14px;font-weight:800;color:var(--brown);display:flex;align-items:center;justify-content:space-between}
.armado-day-header .day-count{font-size:11px;font-weight:700;background:var(--orange);color:#fff;padding:2px 10px;border-radius:50px}
.armado-day-header.other-day{color:var(--muted);opacity:.7}
.armado-barrio{padding:10px 8px 4px;font-size:12px;font-weight:800;color:var(--brown);border-top:2px solid var(--border);margin-top:4px}
.armado-subbarrio{padding:4px 8px 2px;font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
.armado-subbarrio .sb-count{font-size:9px;background:var(--beige);color:var(--muted);padding:1px 6px;border-radius:50px}
.armado-card{background:var(--white);border-radius:12px;padding:12px 14px;margin-bottom:6px;border:2px solid var(--border);transition:.15s}
.armado-card.done{opacity:.35;border-color:var(--green);background:var(--green-light);order:999}
.armado-head{display:flex;align-items:center;gap:8px}
.armado-check{width:26px;height:26px;border-radius:7px;border:2.5px solid #D4C8A0;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:#fff;cursor:pointer;transition:.15s}
.armado-card.done .armado-check{background:var(--green);border-color:var(--green)}
.armado-name{font-size:14px;font-weight:700;flex:1}
.armado-lote{font-size:11px;font-weight:800;color:var(--orange);flex-shrink:0}
.armado-prods{margin-top:6px;padding-left:34px;font-size:12px;line-height:1.6;color:#555}
.armado-prods span{font-weight:700;color:var(--brown)}
.armado-cards{display:flex;flex-direction:column}

/* ── RUTA VIEW ── */
.ruta-container{display:flex;flex-direction:column;height:calc(100dvh - 95px)}
.ruta-header{background:var(--brown);color:var(--beige);padding:6px 14px;display:flex;justify-content:space-between;align-items:center;font-size:11px;font-weight:700}
.ruta-header .ruta-zona{color:var(--orange)}
.ruta-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 14px;text-align:center}
.ruta-lote{font-size:40px;font-weight:900;color:var(--orange);line-height:1;margin-bottom:2px}
.ruta-resumen{background:var(--white);border-bottom:1px solid var(--border);padding:6px 12px;display:flex;gap:5px;flex-wrap:wrap}
.ruta-resumen-pill{font-size:10px;background:var(--brown);color:var(--beige);padding:3px 8px;border-radius:50px;font-weight:700;cursor:pointer}
.ruta-resumen-pill.active{background:var(--orange);color:#fff}
.ruta-nombre{font-size:16px;font-weight:700;color:var(--muted);margin-bottom:8px}
.ruta-productos{background:var(--white);border-radius:10px;padding:8px 14px;margin-bottom:6px;width:100%;text-align:left}
.ruta-prod-item{display:flex;justify-content:space-between;padding:3px 0;font-size:13px;border-bottom:1px solid var(--beige)}
.ruta-prod-item:last-child{border:none}
.ruta-prod-qty{font-weight:800;color:var(--orange);min-width:28px;text-align:right}
.ruta-cobrar{background:var(--white);border-radius:10px;padding:8px 14px;width:100%;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ruta-cobrar-total{font-size:22px;font-weight:900}
.ruta-cobrar-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:50px}
.ruta-cobrar-badge.efectivo{background:#fff3e0;color:#e67e22;border:2px solid #e67e22}
.ruta-cobrar-badge.transferencia{background:#e3f2fd;color:#1976d2;border:2px solid #1976d2}
.ruta-cobrar-badge.cobrado{background:var(--green-light);color:var(--green);border:2px solid var(--green)}
.ruta-extras{width:100%;display:flex;gap:6px;margin-bottom:4px}
.ruta-extras button,.ruta-extras a{flex:1;padding:8px;border:1.5px solid var(--border);border-radius:8px;background:var(--white);font-family:inherit;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center;text-decoration:none;display:block}
.ruta-extras .btn-wpp-sm{color:#25D366;border-color:#25D366}

/* ── ACTIONS (fijo abajo) ── */
.ruta-actions{padding:8px 14px;background:var(--bg);border-top:1px solid var(--border);flex-shrink:0}
.btn-entregado{width:100%;padding:16px;border:none;border-radius:12px;font-family:inherit;font-size:18px;font-weight:900;cursor:pointer;background:var(--green);color:#fff;margin-bottom:6px;transition:.15s}
.btn-entregado:active{transform:scale(.97);background:#2d6a2d}
.btn-entregado.cobrar-first{background:var(--orange)}
.btn-entregado.cobrar-first:active{background:#d06830}
.ruta-nav{display:flex;gap:6px}
.ruta-nav button{flex:1;padding:10px;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
.ruta-nav .btn-prev{background:var(--white);color:var(--brown);border:1.5px solid var(--border)}
.ruta-nav .btn-next{background:var(--brown);color:var(--beige)}

/* ── CONFIRM ── */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.confirm-box{background:#fff;border-radius:16px;padding:24px;max-width:300px;width:100%;text-align:center}
.confirm-box h3{font-size:17px;margin-bottom:6px}
.confirm-box p{font-size:13px;color:var(--muted);margin-bottom:18px}
.confirm-btns{display:flex;gap:8px}
.confirm-btns button{flex:1;padding:14px;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:800;cursor:pointer}
.confirm-btns .btn-si{background:var(--green);color:#fff}
.confirm-btns .btn-no{background:var(--border);color:var(--brown)}

/* ── PENDIENTES COBRO ── */
.cobro-section{padding:12px 14px;border-top:2px solid var(--orange)}
.cobro-title{font-size:13px;font-weight:800;color:var(--orange);margin-bottom:8px}
.cobro-card{background:var(--white);border-radius:10px;padding:10px 12px;margin-bottom:6px;border:2px solid #fff3e0;display:flex;flex-direction:column;gap:6px}
.cobro-card-head{display:flex;justify-content:space-between;align-items:center}
.cobro-card-name{font-size:14px;font-weight:700}
.cobro-card-total{font-size:16px;font-weight:800;color:var(--orange)}
.cobro-card-actions{display:flex;gap:6px}
.cobro-card-actions button,.cobro-card-actions a{flex:1;padding:8px;border:none;border-radius:8px;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none}
.cobro-btn-alias{background:#25D366;color:#fff}
.cobro-btn-cobrado{background:var(--orange);color:#fff}

/* ── NUEVO PEDIDO ── */
.nuevo-field{margin-bottom:10px}
.nuevo-field label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px}
.nuevo-field input,.nuevo-field select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;background:var(--white);outline:none}
.nuevo-field input:focus,.nuevo-field select:focus{border-color:var(--orange)}
.nuevo-prod-row{display:flex;align-items:center;gap:8px;background:var(--white);padding:6px 10px;border-radius:8px;margin-bottom:4px}
.nuevo-prod-name{flex:1;font-size:12px;font-weight:600}
.nuevo-prod-qty{display:flex;align-items:center;gap:4px}
.nuevo-prod-qty button{width:28px;height:28px;border:1.5px solid var(--border);background:var(--white);border-radius:6px;font-family:inherit;font-size:14px;font-weight:800;cursor:pointer}
.nuevo-prod-qty input{width:40px;text-align:center;border:1.5px solid var(--border);border-radius:6px;padding:4px;font-family:inherit;font-size:13px;font-weight:700}

.sync-banner{background:#FFF3E0;color:#E65100;text-align:center;padding:5px;font-size:10px;font-weight:700;display:none}
.sync-banner.visible{display:block}
.hidden{display:none!important}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--brown);color:var(--beige);padding:10px 20px;border-radius:50px;font-size:12px;font-weight:700;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <h1>MALEU RUTA</h1>
  <span id="lastSync" style="font-size:9px;opacity:.6"></span>
  <div class="status-dot" id="statusDot"></div>
  <span class="badge" id="counterBadge">--</span>
  <button class="btn-refresh" id="btnRefresh" onclick="refresh()">&#x21bb;</button>
</div>

<div class="sync-banner" id="syncBanner">Entregas pendientes de sincronizar</div>

<div class="tabs">
  <div class="tab active" data-tab="armado" onclick="switchTab('armado')">ARMADO<span class="tab-count" id="tabArmadoCount"></span></div>
  <div class="tab" data-tab="ruta" onclick="switchTab('ruta')">RUTA<span class="tab-count" id="tabRutaCount"></span></div>
  <div class="tab" data-tab="cobros" onclick="switchTab('cobros')">COBROS<span class="tab-count" id="tabCobrosCount"></span></div>
  <div class="tab" data-tab="nuevo" onclick="switchTab('nuevo')" style="flex:0 0 50px;font-size:18px">+</div>
</div>

<div id="loadingView" class="loading">Cargando pedidos...</div>
<div id="emptyView" class="empty hidden">
  <div style="font-size:32px;margin-bottom:10px">&#x2713;</div>
  <div style="font-size:15px;font-weight:700;margin-bottom:4px" id="emptyTitle">Sin pedidos pendientes</div>
  <div style="font-size:12px" id="emptyDetail"></div>
</div>
<div id="errorView" class="empty hidden" style="color:#E65100">
  <div style="font-size:32px;margin-bottom:10px">&#x26A0;</div>
  <div style="font-size:15px;font-weight:700;margin-bottom:4px">No se pudo conectar</div>
  <div style="font-size:12px">Toca refresh</div>
</div>

<!-- ARMADO -->
<div id="armadoView" class="hidden">
  <div class="armado-summary" id="armadoSummary"></div>
  <div class="armado-list" id="armadoList"></div>
</div>

<!-- RUTA -->
<div id="rutaView" class="hidden">
  <div class="ruta-container">
    <div class="ruta-resumen" id="rutaResumen"></div>
    <div class="ruta-header" id="rutaHeader"></div>
    <div class="ruta-body" id="rutaBody"></div>
    <div class="ruta-actions" id="rutaActions"></div>
  </div>
</div>

<!-- COBROS -->
<div id="cobrosView" class="hidden" style="padding:12px 14px">
  <div id="cobrosContent"></div>
</div>

<!-- NUEVO PEDIDO (manual) -->
<div id="nuevoView" class="hidden" style="padding:12px 14px">
  <div style="font-size:14px;font-weight:800;margin-bottom:10px">Nuevo pedido manual</div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:12px">Para casos especiales: vos, ancianos sin WhatsApp, etc.</div>

  <button onclick="autocompletarTadeo()" style="width:100%;padding:10px;border:2px solid var(--orange);background:var(--white);color:var(--orange);border-radius:10px;font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;margin-bottom:12px">&#128230; Sacar mercaderia para mi</button>

  <div class="nuevo-field">
    <label>Nombre cliente</label>
    <input type="text" id="nuevoNombre" placeholder="Ej: Marta (ancianita)">
  </div>

  <div class="nuevo-field">
    <label>Canal</label>
    <select id="nuevoCanal" onchange="nuevoCanalChange()">
      <option value="Home">Home (Estancias)</option>
      <option value="Pilar">Pilar</option>
      <option value="Capital Federal">Capital Federal</option>
    </select>
  </div>

  <div id="nuevoHomeFields">
    <div class="nuevo-field">
      <label>Barrio privado</label>
      <select id="nuevoBarrio" onchange="nuevoBarrioChange()">
        <option value="Estancias del Pilar">Estancias del Pilar</option>
        <option value="Los Alcanfores">Los Alcanfores</option>
        <option value="Estancias del Rio">Estancias del Rio</option>
      </select>
    </div>
    <div class="nuevo-field" id="nuevoSubBarrioWrap">
      <label>Sub barrio</label>
      <select id="nuevoSubBarrio">
        <option value="">Elegi sub barrio</option>
        <option value="Champagnat Alto">Champagnat Alto</option>
        <option value="Champagnat Bajo">Champagnat Bajo</option>
        <option value="La Pionera">La Pionera</option>
        <option value="La Paz">La Paz</option>
        <option value="El Recuerdo">El Recuerdo</option>
        <option value="Golf">Golf</option>
        <option value="Argentina 1">Argentina 1</option>
        <option value="Argentina 2">Argentina 2</option>
        <option value="Argentina 3">Argentina 3</option>
        <option value="Argentina 4">Argentina 4</option>
      </select>
    </div>
    <div class="nuevo-field">
      <label>Lote</label>
      <input type="text" id="nuevoLote" inputmode="numeric" placeholder="123">
    </div>
  </div>

  <div id="nuevoPilarFields" class="hidden">
    <div class="nuevo-field"><label>Direccion</label><input type="text" id="nuevoDireccion" placeholder="Pilara, Bosque..."></div>
    <div class="nuevo-field"><label>Lote / Casa</label><input type="text" id="nuevoPilarLote" placeholder="123"></div>
  </div>

  <div id="nuevoCfFields" class="hidden">
    <div class="nuevo-field"><label>Barrio CABA</label><input type="text" id="nuevoCabaBarrio" placeholder="Palermo"></div>
    <div class="nuevo-field"><label>Calle</label><input type="text" id="nuevoCabaCalle" placeholder="Av. Santa Fe"></div>
    <div class="nuevo-field"><label>Numero</label><input type="text" id="nuevoCabaNumero" placeholder="1234"></div>
    <div class="nuevo-field"><label>Piso (opcional)</label><input type="text" id="nuevoCabaPiso" placeholder="3B"></div>
  </div>

  <div class="nuevo-field">
    <label>Telefono (opcional)</label>
    <input type="tel" id="nuevoTel" placeholder="+5491155038905">
  </div>

  <div class="nuevo-field">
    <label>Dia de entrega</label>
    <select id="nuevoDia"></select>
  </div>

  <div style="font-size:12px;font-weight:800;margin:14px 0 6px">Productos</div>
  <div id="nuevoProductos"></div>

  <div style="background:var(--white);border-radius:10px;padding:10px 14px;margin-top:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span style="font-size:12px;font-weight:700;color:var(--muted)" id="nuevoSubtotalLabel">Subtotal productos</span>
      <span id="nuevoSubtotal" style="font-size:16px;font-weight:800;color:var(--brown)">$0</span>
    </div>
    <div style="font-size:11px;font-weight:700;margin-bottom:4px;color:var(--muted)">Como pago?</div>
    <div style="display:flex;gap:6px;margin-bottom:6px">
      <div style="flex:1;display:flex;align-items:center;gap:4px"><label style="font-size:10px;color:var(--muted);flex-shrink:0">Efect $</label><input type="number" id="nuevoEfectivo" inputmode="numeric" placeholder="0" value="" oninput="autosaveNuevo();updateNuevoTotal()" style="flex:1;border:1.5px solid var(--border);border-radius:6px;padding:6px;font-size:13px;font-weight:700;text-align:right;font-family:inherit"></div>
      <div style="flex:1;display:flex;align-items:center;gap:4px"><label style="font-size:10px;color:var(--muted);flex-shrink:0">Trans $</label><input type="number" id="nuevoTrans" inputmode="numeric" placeholder="0" value="" oninput="autosaveNuevo();updateNuevoTotal()" style="flex:1;border:1.5px solid var(--border);border-radius:6px;padding:6px;font-size:13px;font-weight:700;text-align:right;font-family:inherit"></div>
    </div>
    <div style="display:flex;align-items:center;gap:4px;margin-bottom:6px"><label style="font-size:10px;color:var(--muted);flex-shrink:0;width:50px">Propina $</label><input type="number" id="nuevoPropina" inputmode="numeric" placeholder="0" value="" oninput="autosaveNuevo();updateNuevoTotal()" style="flex:1;border:1.5px solid var(--border);border-radius:6px;padding:6px;font-size:13px;font-weight:700;text-align:right;font-family:inherit"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);padding-top:6px">
      <span style="font-size:13px;font-weight:700">Total</span>
      <span id="nuevoTotal" style="font-size:22px;font-weight:900;color:var(--orange)">$0</span>
    </div>
  </div>

  <div style="background:var(--white);border-radius:10px;padding:10px 14px;margin-top:8px">
    <div style="font-size:12px;font-weight:700;margin-bottom:6px">Tipo de pedido</div>
    <div style="display:flex;gap:6px">
      <label style="flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;text-align:center;font-size:12px;font-weight:700;cursor:pointer"><input type="radio" name="nuevoTipo" value="normal" checked onchange="autosaveNuevo();updateNuevoTotal()" style="margin-right:4px">Normal (CF)</label>
      <label style="flex:1;padding:10px;border:1.5px solid var(--border);border-radius:8px;text-align:center;font-size:12px;font-weight:700;cursor:pointer"><input type="radio" name="nuevoTipo" value="costo" onchange="autosaveNuevo();updateNuevoTotal()" style="margin-right:4px">Al costo</label>
    </div>
  </div>

  <button id="btnGuardarNuevo" onclick="guardarNuevo()" style="width:100%;padding:16px;border:none;border-radius:12px;background:var(--green);color:#fff;font-family:inherit;font-size:16px;font-weight:900;cursor:pointer;margin-top:10px">GUARDAR PEDIDO</button>
  <div id="nuevoSuccess" style="display:none;text-align:center;padding:12px;background:var(--green-light);color:var(--green);border-radius:10px;margin-top:8px;font-weight:800;font-size:13px"></div>
</div>

<div id="confirmOverlay" class="confirm-overlay hidden"></div>
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   MALEU RUTA v3 — Delivery bajo estrés
   ═══════════════════════════════════════════════════════════ */
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxmrG5YVSshcYezk8lXFx_uxb7NFGcb9EfTXc7dsIN4rZyj73CET4mk_aKPFPDY2wNi/exec';
var WA_NUMBER = '5491155038905';

var PROD_NAMES = {
  PPM:'Pack Muzza x2', PPJyQ:'Pack J&Q x2', PPCyQ:'Pack C&Q x2',

];
var nuevoCart={};

var DIAS_SEMANA = ['Domingo','Lunes','Martes','Mi\u00E9rcoles','Jueves','Viernes','S\u00E1bado'];
function getDiaHoy() { return DIAS_SEMANA[new Date().getDay()]; }

/* ── STATE ── */
var entregas=[], entregados={}, cobrados={}, propinas={}, syncQueue=[], armadoDone={}, pendientesCobro=[];
var currentTab='armado', rutaIndex=0, isOnline=navigator.onLine, resumenBarrioAbierto=null;

/* ── INIT ── */
loadLocal();
updateOnlineStatus();
window.addEventListener('online', function(){isOnline=true;updateOnlineStatus();processSyncQueue();refresh(true)});
window.addEventListener('offline', function(){isOnline=false;updateOnlineStatus()});
// Restaurar tab activo visualmente
document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===currentTab)});
if(entregas.length>0){document.getElementById('loadingView').classList.add('hidden');render();updateLastSync();refresh(true)}else{refresh()}
setInterval(function(){if(isOnline&&document.visibilityState==='visible')refresh(true)},45000);
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw-ruta.js').catch(function(){})}

/* ── UTILS ── */
function updateOnlineStatus(){document.getElementById('statusDot').className='status-dot '+(isOnline?'online':'offline')}
function updateLastSync(){var n=new Date();document.getElementById('lastSync').textContent=n.getHours()+':'+String(n.getMinutes()).padStart(2,'0');localStorage.setItem('maleu_ruta_sync',n.getTime())}
function saveLocal(){try{localStorage.setItem('maleu_ruta',JSON.stringify({entregas:entregas,entregados:entregados,cobrados:cobrados,propinas:propinas,syncQueue:syncQueue,armadoDone:armadoDone,pendientesCobro:pendientesCobro,currentTab:currentTab,rutaIndex:rutaIndex,ts:Date.now()}))}catch(e){}}
function loadLocal(){try{var d=JSON.parse(localStorage.getItem('maleu_ruta')||'{}');if(d.entregas)entregas=d.entregas;if(d.entregados)entregados=d.entregados;if(d.cobrados)cobrados=d.cobrados;if(d.propinas)propinas=d.propinas;if(d.syncQueue)syncQueue=d.syncQueue;if(d.armadoDone)armadoDone=d.armadoDone;if(d.pendientesCobro)pendientesCobro=d.pendientesCobro;if(d.currentTab)currentTab=d.currentTab;if(d.rutaIndex!==undefined)rutaIndex=d.rutaIndex}catch(e){}}

function refresh(silent){
  if(!silent)document.getElementById('loadingView').classList.remove('hidden');
  var btn=document.getElementById('btnRefresh');btn.classList.add('spinning');
  fetch(APPS_SCRIPT_URL+'?action=entregas&t='+Date.now()).then(function(r){return r.json()}).then(function(data){
    btn.classList.remove('spinning');var se=data.e||[];var prev=getPendientes().length;entregas=se;
    var sk={};entregas.forEach(function(e){sk[e.h+'|'+e.id]=true});
    Object.keys(entregados).forEach(function(k){if(!sk[k])delete entregados[k]});
    Object.keys(cobrados).forEach(function(k){if(!sk[k])delete cobrados[k]});
    mergeArmadoBusqueda();saveLocal();render();updateLastSync();
    var nc=getPendientes().length;if(silent&&nc>prev)showToast('+'+(nc-prev)+' pedido(s) nuevo(s)');
    document.getElementById('loadingView').classList.add('hidden');processSyncQueue();
  }).catch(function(){
    btn.classList.remove('spinning');document.getElementById('loadingView').classList.add('hidden');
    if(entregas.length>0){render();showToast('Sin conexion — cache')}else{document.getElementById('errorView').classList.remove('hidden')}
  });
}

/* ── HELPERS ── */
function eKey(e){return e.h+'|'+e.id}
function isEntregado(e){return entregados[eKey(e)]||e.es==='Entregado'}
function isCobrado(e){return cobrados[eKey(e)]||e.ep==='Cobrado'}
function getPendientes(){return entregas.filter(function(e){return!isEntregado(e)})}
function getHoyPendientes(){var h=getDiaHoy();return getPendientes().filter(function(e){return e.de===h})}
function getOtrosDias(){var h=getDiaHoy();return getPendientes().filter(function(e){return e.de!==h})}
function sortByZona(list){
  list.sort(function(a,b){
    var bo={'Estancias del Pilar':0,'Los Alcanfores':1,'Estancias del R\u00edo':2,'Pilar':3,'Capital Federal':4,'Clubes':5};
    var ba=bo[a.b]!==undefined?bo[a.b]:9,bb=bo[b.b]!==undefined?bo[b.b]:9;
    if(ba!==bb)return ba-bb;if(a.sb!==b.sb)return(a.sb||'').localeCompare(b.sb||'');
    return(parseInt(a.l)||999)-(parseInt(b.l)||999);
  });return list;
}
function getSorted(){return sortByZona(getHoyPendientes())}
function prodText(p){return p.map(function(x){return'<span>'+x.q+'x</span> '+(PROD_NAMES[x.a]||x.a)}).join('<br>')}
function formatMoney(n){return'$'+n.toLocaleString('es-AR')}
function getZonaSummary(list){
  var s={};list.forEach(function(e){var b=e.b||'Otros';if(!s[b])s[b]={total:0,subs:{}};s[b].total++;var sb=e.sb||b;if(!s[b].subs[sb])s[b].subs[sb]=0;s[b].subs[sb]++});return s;
}

/* ── RENDER ── */
function render(){
  var all=getPendientes(),hoy=getHoyPendientes();
  var totalHoy=entregas.filter(function(e){return e.de===getDiaHoy()}).length;
  var doneHoy=totalHoy-hoy.length;
  document.getElementById('counterBadge').textContent=doneHoy+'/'+totalHoy;
  document.getElementById('syncBanner').className='sync-banner'+(syncQueue.length>0?' visible':'');
  document.getElementById('errorView').classList.add('hidden');
  // Tab counts: ambos muestran HOY
  var porArmar=0;hoy.forEach(function(e){if(!armadoDone[eKey(e)])porArmar++});
  document.getElementById('tabArmadoCount').textContent=porArmar||'';
  document.getElementById('tabRutaCount').textContent=hoy.length||'';
  document.getElementById('tabCobrosCount').textContent=pendientesCobro.length||'';
  if(all.length===0&&pendientesCobro.length===0&&currentTab!=='nuevo'){
    document.getElementById('armadoView').classList.add('hidden');document.getElementById('rutaView').classList.add('hidden');document.getElementById('cobrosView').classList.add('hidden');document.getElementById('nuevoView').classList.add('hidden');
    document.getElementById('emptyView').classList.remove('hidden');
    document.getElementById('emptyTitle').textContent='Sin pedidos pendientes';
    document.getElementById('emptyDetail').textContent=entregas.length>0?entregas.length+' pedido(s) ya entregados':'No hay pedidos cargados';
    return;
  }
  document.getElementById('emptyView').classList.add('hidden');
  if(currentTab==='nuevo')renderNuevo();else if(currentTab==='armado')renderArmado();else if(currentTab==='cobros')renderCobros();else renderRuta();
}

/* ── ARMADO ── */
function renderArmado(){
  document.getElementById('armadoView').classList.remove('hidden');document.getElementById('rutaView').classList.add('hidden');document.getElementById('cobrosView').classList.add('hidden');document.getElementById('nuevoView').classList.add('hidden');
  var hoy=getDiaHoy(),pedH=sortByZona(getHoyPendientes()),pedO=sortByZona(getOtrosDias());

  // Resumen de productos de HOY (para sacar del freezer)
  var totals={};pedH.forEach(function(e){e.p.forEach(function(p){if(!totals[p.a])totals[p.a]=0;totals[p.a]+=p.q})});
  var sumParts=Object.keys(totals).map(function(a){return'<strong>'+totals[a]+'</strong> '+(PROD_NAMES[a]||a)});
  var armadosHoy=0;pedH.forEach(function(e){if(armadoDone[eKey(e)])armadosHoy++});
  var faltanHoy=pedH.length-armadosHoy;
  var summaryHtml='<strong>'+faltanHoy+' por armar</strong> de '+pedH.length+' pedidos hoy';
  if(pedO.length>0)summaryHtml+='<span style="float:right;font-size:10px;color:var(--muted)">Otros dias: '+pedO.length+'</span>';
  if(sumParts.length>0)summaryHtml+='<br>'+sumParts.join(' &middot; ');
  document.getElementById('armadoSummary').innerHTML=summaryHtml;

  var html='';
  if(pedH.length>0){html+=renderArmadoGroup(pedH,'Hoy',false)}
  // OTROS DIAS
  if(pedO.length>0){var pd={};pedO.forEach(function(e){if(!pd[e.de])pd[e.de]=[];pd[e.de].push(e)});Object.keys(pd).forEach(function(d){html+=renderArmadoGroup(pd[d],d,true)})}
  document.getElementById('armadoList').innerHTML=html;
}

function renderArmadoGroup(pedidos,titulo,isOther){
  var html='';
  if(titulo){html+='<div class="armado-day-header'+(isOther?' other-day':'')+'"><span>'+titulo+'</span><span class="day-count">'+pedidos.length+'</span></div>'}
  if(pedidos.length===0){html+='<div style="padding:10px 8px;font-size:12px;color:var(--muted)">Sin pedidos</div>';return html}

  var barrios={};pedidos.forEach(function(e){var b=e.b||e.h;if(!barrios[b])barrios[b]={};var sb=(e.b===e.sb||!e.sb)?'_main':e.sb;if(!barrios[b][sb])barrios[b][sb]=[];barrios[b][sb].push(e)});

  Object.keys(barrios).sort().forEach(function(b){
    var subs=barrios[b],tot=0;Object.keys(subs).forEach(function(s){tot+=subs[s].length});
    html+='<div class="armado-barrio">'+b+' ('+tot+')</div>';
    Object.keys(subs).sort().forEach(function(sb){
      if(sb!=='_main')html+='<div class="armado-subbarrio">'+sb+' <span class="sb-count">'+subs[sb].length+'</span></div>';
      // Container for flex ordering (done goes to bottom)
      html+='<div class="armado-cards">';
      subs[sb].forEach(function(e){
        var key=eKey(e),isDone=armadoDone[key];
        var loteStr=e.l?'Lote '+e.l:'';
        html+='<div class="armado-card'+(isDone?' done':'')+'" onclick="toggleArmado(\''+key+'\')">'
          +'<div class="armado-head">'
          +'<div class="armado-check">'+(isDone?'&#x2713;':'')+'</div>'
          +'<span class="armado-name">'+e.c+'</span>'
          +(loteStr?'<span class="armado-lote">'+loteStr+'</span>':'')
          +'</div>'
          +'<div class="armado-prods">'+prodText(e.p)+'</div>'
          +'</div>';
      });
      html+='</div>';
    });
  });
  return html;
}

function toggleArmado(key){
  if(armadoDone[key]){
    delete armadoDone[key];syncArmadoBusqueda(key,false);saveLocal();render();
  } else {
    var o=document.getElementById('confirmOverlay');o.className='confirm-overlay';
    o.innerHTML='<div class="confirm-box"><h3>Pedido armado?</h3><p>Bolsa lista para entregar</p><div class="confirm-btns"><button class="btn-no" onclick="cerrarConfirm()">No</button><button class="btn-si" onclick="cerrarConfirm();confirmarArmado(\''+key+'\')">Si, armado</button></div></div>';
  }
}
function confirmarArmado(key){armadoDone[key]=true;syncArmadoBusqueda(key,true);saveLocal();render();if(navigator.vibrate)navigator.vibrate(30)}

// Sincronizar armado con Búsqueda (bidireccional)
function syncArmadoBusqueda(key,done){
  try{
    var bus=JSON.parse(localStorage.getItem('maleu_busqueda')||'{}');
    if(!bus.armadoChecked)bus.armadoChecked={};
    var busKey=key.replace(/[^a-zA-Z0-9]/g,'_');
    if(done)bus.armadoChecked[busKey]=true;else delete bus.armadoChecked[busKey];
    localStorage.setItem('maleu_busqueda',JSON.stringify(bus));
  }catch(e){}
}

// Al cargar, leer armados de Búsqueda y mergear
function mergeArmadoBusqueda(){
  try{
    var bus=JSON.parse(localStorage.getItem('maleu_busqueda')||'{}');
    if(bus.armadoChecked){
      entregas.forEach(function(e){
        var busKey=eKey(e).replace(/[^a-zA-Z0-9]/g,'_');
        if(bus.armadoChecked[busKey])armadoDone[eKey(e)]=true;
      });
    }
  }catch(e){}
}

/* ── RUTA ── */
function renderRuta(){
  document.getElementById('armadoView').classList.add('hidden');document.getElementById('rutaView').classList.remove('hidden');document.getElementById('cobrosView').classList.add('hidden');document.getElementById('nuevoView').classList.add('hidden');
  var sorted=getSorted(),resumen=document.getElementById('rutaResumen'),header=document.getElementById('rutaHeader'),body=document.getElementById('rutaBody'),actions=document.getElementById('rutaActions');

  if(sorted.length===0){
    resumen.innerHTML='';header.innerHTML='';
    body.innerHTML='<div class="empty" style="padding:30px">Todas las entregas de hoy completadas</div>';
    actions.innerHTML='';return;
  }
  if(rutaIndex>=sorted.length)rutaIndex=0;if(rutaIndex<0)rutaIndex=sorted.length-1;
  var e=sorted[rutaIndex],key=eKey(e);

  // Pills de barrios arriba
  var summary=getZonaSummary(sorted);
  var barrioActual=e.b||'Otros';
  var rh='';
  Object.keys(summary).forEach(function(b){
    var isActive=b===barrioActual;
    rh+='<span class="ruta-resumen-pill'+(isActive?' active':'')+'">'+b+' '+summary[b].total+'</span>';
  });
  resumen.innerHTML=rh;

  // Header compacto
  var zona=(e.sb&&e.sb!==e.b)?e.sb:e.b;
  header.innerHTML='<span>'+(rutaIndex+1)+'/'+sorted.length+'</span><span class="ruta-zona">'+zona+'</span><span>#'+e.id+'</span>';

  // Body
  var h='';
  if(e.l){h+='<div class="ruta-lote"><span style="font-size:16px;font-weight:700;display:block;color:var(--muted)">Lote</span>'+e.l+'</div>'}
  else{h+='<div style="font-size:24px;font-weight:900;color:var(--orange);margin-bottom:4px">'+e.d+'</div>'}
  h+='<div class="ruta-nombre">'+e.c+'</div>';

  h+='<div class="ruta-productos">';e.p.forEach(function(p){h+='<div class="ruta-prod-item"><span>'+(PROD_NAMES[p.a]||p.a)+'</span><span class="ruta-prod-qty">'+p.q+'</span></div>'});h+='</div>';

  var prop=propinas[key]||0,totalFact=e.$+prop;
  var cobrado=isCobrado(e);
  var badgeClass=cobrado?'cobrado':(e.fp==='Efectivo'?'efectivo':'transferencia');
  var badgeText=cobrado?'Cobrado':e.fp;
  h+='<div class="ruta-cobrar"><span class="ruta-cobrar-total" id="totalFacturado">'+formatMoney(totalFact)+'</span><span class="ruta-cobrar-badge '+badgeClass+'">'+badgeText+'</span></div>';

  h+='<div class="ruta-extras">';
  if(e.t){var tel=e.t.replace(/[^0-9]/g,'');if(tel.length<12)tel='54'+tel;h+='<a href="https://wa.me/'+tel+'?text='+encodeURIComponent('En camino a dejarte el pedido!')+'" class="btn-wpp-sm">En camino</a>';h+='<a href="https://wa.me/'+tel+'?text='+encodeURIComponent('Estoy afuera!')+'" class="btn-wpp-sm">Estoy afuera</a>'}
  if(!cobrado){h+='<div style="flex:1;display:flex;align-items:center;gap:6px;background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:6px 8px"><label style="font-size:11px;font-weight:700;flex-shrink:0">Propina $</label><input type="number" id="propinaInput" inputmode="numeric" placeholder="0" value="'+(prop||'')+'" oninput="actualizarPropina(\''+key+'\','+e.$+')" style="flex:1;border:none;font-size:14px;font-weight:700;font-family:inherit;text-align:right;outline:none;background:transparent"></div>'}
  h+='</div>';

  body.innerHTML=h;

  // Actions
  var a='';
  if(!cobrado){a+='<button class="btn-entregado cobrar-first" id="btnCobrado" onclick="marcarCobrado(\''+key+'\')">COBRADO '+formatMoney(totalFact)+'</button>'}
  a+='<button class="btn-entregado" onclick="confirmarEntregado(\''+key+'\')">ENTREGADO</button>';
  a+='<div class="ruta-nav"><button class="btn-prev" onclick="rutaPrev()">&larr;</button><button class="btn-next" onclick="rutaNext()">Siguiente &rarr;</button></div>';
  actions.innerHTML=a;
}

function renderCobros(){
  document.getElementById('armadoView').classList.add('hidden');document.getElementById('rutaView').classList.add('hidden');
  document.getElementById('cobrosView').classList.remove('hidden');document.getElementById('nuevoView').classList.add('hidden');
  renderCobrosFromServer();
  fetchCobrosPendientes();
}

function fetchCobrosPendientes(){
  fetch(APPS_SCRIPT_URL+'?action=cobrosPendientes&t='+Date.now())
    .then(function(r){return r.json()})
    .then(function(data){
      var cobros=data.cobros||[];
      // Mergear con pendientesCobro local (priorizar server pero agregar locales no sincronizados)
      var serverKeys={};cobros.forEach(function(c){serverKeys[c.key]=true});
      pendientesCobro.forEach(function(pc){if(!serverKeys[pc.key])cobros.push(pc)});
      pendientesCobro=cobros;
      saveLocal();
      if(currentTab==='cobros')renderCobrosFromServer();
      document.getElementById('tabCobrosCount').textContent=cobros.length||'';
    })
    .catch(function(){});
}

function parseFecha(s){
  // "dd/MM/yyyy" → timestamp
  if(!s)return 0;
  var p=s.split('/');if(p.length!==3)return 0;
  return new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0])).getTime();
}

function renderCobrosFromServer(){
  var el=document.getElementById('cobrosContent');
  if(pendientesCobro.length===0){
    el.innerHTML='<div class="empty" style="padding:40px">Sin pendientes de cobro</div>';return;
  }
  var total=0;pendientesCobro.forEach(function(pc){total+=pc.$});
  var h='<div style="font-size:13px;font-weight:800;margin-bottom:10px">'+pendientesCobro.length+' pendiente(s) — Total: '+formatMoney(total)+'</div>';

  // Agrupar por fecha, más viejo primero (más urgente)
  var grupos={};
  pendientesCobro.forEach(function(pc){
    var k=pc.fe||'Sin fecha';
    if(!grupos[k])grupos[k]={ts:parseFecha(pc.fe),dia:pc.de||'',items:[]};
    grupos[k].items.push(pc);
  });
  var keys=Object.keys(grupos).sort(function(a,b){return grupos[a].ts-grupos[b].ts});

  keys.forEach(function(k){
    var g=grupos[k];
    var subtotal=0;g.items.forEach(function(i){subtotal+=i.$});
    h+='<div style="font-size:12px;font-weight:800;color:var(--orange);margin:12px 0 6px;display:flex;justify-content:space-between"><span>'+(g.dia?g.dia+' ':'')+k+'</span><span>'+formatMoney(subtotal)+'</span></div>';
    h+='<div class="cobro-section" style="border:none;padding:0">';
    g.items.forEach(function(pc){
      var globalIdx=pendientesCobro.indexOf(pc);
      var tel=pc.t?(pc.t.replace(/[^0-9]/g,'')):null;if(tel&&tel.length<12)tel='54'+tel;
      var aliasMsg=encodeURIComponent('Hola! Cuando puedas mandanos el comprobante. El alias es maleump. Gracias!');
      var fpDefault=pc.fp||'Efectivo';
      h+='<div class="cobro-card"><div class="cobro-card-head"><span class="cobro-card-name">'+pc.c+' <span style="font-size:10px;color:var(--muted);font-weight:600">('+pc.h+' #'+pc.id+')</span></span><span class="cobro-card-total" id="cobroTotal_'+globalIdx+'">'+formatMoney(pc.$)+'</span></div>';
      // Select forma de pago
      h+='<div style="display:flex;align-items:center;gap:6px"><label style="font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0">Pago</label><select id="cobroFp_'+globalIdx+'" onchange="cambiarFpCobro('+globalIdx+','+pc.$+')" style="flex:1;border:1.5px solid var(--border);border-radius:6px;padding:5px;font-size:12px;font-weight:700;font-family:inherit;background:var(--white)">'
        +'<option value="Efectivo"'+(fpDefault==='Efectivo'?' selected':'')+'>Efectivo</option>'
        +'<option value="Transferencia"'+(fpDefault==='Transferencia'?' selected':'')+'>Transferencia</option>'
        +'<option value="Mixto"'+(fpDefault==='Mixto'?' selected':'')+'>Mixto (Ef+Trans)</option>'
        +'</select></div>';
      // Montos mixto (hidden por default si no es Mixto)
      h+='<div id="cobroMixto_'+globalIdx+'" style="display:'+(fpDefault==='Mixto'?'flex':'none')+';gap:4px">'
        +'<div style="flex:1;display:flex;align-items:center;gap:4px;background:var(--bg);border-radius:6px;padding:4px 8px"><label style="font-size:10px;flex-shrink:0">Ef $</label><input type="number" id="cobroEf_'+globalIdx+'" inputmode="numeric" placeholder="0" style="flex:1;border:none;background:transparent;text-align:right;font-size:12px;font-weight:700;font-family:inherit;outline:none"></div>'
        +'<div style="flex:1;display:flex;align-items:center;gap:4px;background:var(--bg);border-radius:6px;padding:4px 8px"><label style="font-size:10px;flex-shrink:0">Tr $</label><input type="number" id="cobroTr_'+globalIdx+'" inputmode="numeric" placeholder="0" style="flex:1;border:none;background:transparent;text-align:right;font-size:12px;font-weight:700;font-family:inherit;outline:none"></div>'
        +'</div>';
      // Propina
      h+='<div style="display:flex;align-items:center;gap:6px;background:var(--bg);border-radius:6px;padding:4px 10px"><label style="font-size:10px;font-weight:700;color:var(--muted);flex-shrink:0">Propina $</label><input type="number" id="cobroPropina_'+globalIdx+'" inputmode="numeric" placeholder="0" value="" oninput="actualizarCobroPropina('+globalIdx+','+pc.$+')" style="flex:1;border:none;font-size:13px;font-weight:700;font-family:inherit;text-align:right;outline:none;background:transparent"></div>';
      h+='<div class="cobro-card-actions">';
      if(tel){h+='<a href="https://wa.me/'+tel+'?text='+aliasMsg+'" class="cobro-btn-alias">Pedir comprobante</a>'}
      h+='<button class="cobro-btn-cobrado" onclick="confirmarCobro('+globalIdx+')">Cobrado</button></div></div>';
    });
    h+='</div>';
  });
  el.innerHTML=h;
}

/* ── CONFIRMAR ENTREGADO ── */
function confirmarEntregado(key){
  var o=document.getElementById('confirmOverlay');o.className='confirm-overlay';
  o.innerHTML='<div class="confirm-box"><h3>Marcar como entregado?</h3><p>Se actualiza en el Sheets</p><div class="confirm-btns"><button class="btn-no" onclick="cerrarConfirm()">No</button><button class="btn-si" onclick="cerrarConfirm();marcarEntregado(\''+key+'\')">Si, entregado</button></div></div>';
}
function cerrarConfirm(){document.getElementById('confirmOverlay').classList.add('hidden')}

/* ── MARCAR ENTREGADO ── */
function marcarEntregado(key){
  entregados[key]=true;var parts=key.split('|'),hoja=parts[0],id=parts[1];
  var ent=entregas.find(function(e){return e.h===hoja&&String(e.id)===id});
  if(ent){
    syncQueue.push({action:'marcarEntregado',hoja:ent.h,id:String(ent.id),row:ent.r,cobrado:!!cobrados[key],propina:propinas[key]||0,ts:Date.now()});
    // Si no está cobrado, guardar para seguimiento
    if(!cobrados[key]&&ent.ep!=='Cobrado'){
      pendientesCobro.push({key:key,c:ent.c,t:ent.t,$:ent.$,fp:ent.fp,ts:Date.now()});
    }
  }
  saveLocal();processSyncQueue();if(navigator.vibrate)navigator.vibrate(50);
  showToast('Entregado a '+((ent&&ent.c)||'').split(' ')[0]);
  render();
}

function marcarCobrado(key){cobrados[key]=true;saveLocal();renderRuta();if(navigator.vibrate)navigator.vibrate(30)}

function cambiarFpCobro(i,total){
  var fp=document.getElementById('cobroFp_'+i).value;
  var mixto=document.getElementById('cobroMixto_'+i);
  if(mixto)mixto.style.display=(fp==='Mixto')?'flex':'none';
}

function confirmarCobro(i){
  if(i<0||i>=pendientesCobro.length)return;
  var pc=pendientesCobro[i];
  var propina=parseInt(document.getElementById('cobroPropina_'+i).value)||0;
  var fp=document.getElementById('cobroFp_'+i).value;
  var ef=0,tr=0;
  if(fp==='Mixto'){
    ef=parseInt(document.getElementById('cobroEf_'+i).value)||0;
    tr=parseInt(document.getElementById('cobroTr_'+i).value)||0;
    if(ef+tr===0){showToast('Completa los montos Ef y Tr');return}
  } else if(fp==='Efectivo'){ef=pc.$} else {tr=pc.$}
  var totalConPropina=pc.$+propina;
  var o=document.getElementById('confirmOverlay');o.className='confirm-overlay';
  o.innerHTML='<div class="confirm-box"><h3>Confirmar cobro?</h3>'
    +'<p>'+pc.c+'<br>'+fp+' — '+formatMoney(totalConPropina)+(propina>0?' (con propina)':'')+'</p>'
    +'<div class="confirm-btns"><button class="btn-no" onclick="cerrarConfirm()">No</button><button class="btn-si" onclick="cerrarConfirm();cobrarPendiente('+i+','+ef+','+tr+',\''+fp+'\')">Si, cobrado</button></div></div>';
}

function cobrarPendiente(i,ef,tr,fp){
  if(i<0||i>=pendientesCobro.length)return;
  var pc=pendientesCobro[i];
  var propina=parseInt(document.getElementById('cobroPropina_'+i)?document.getElementById('cobroPropina_'+i).value:0)||0;
  // propMet: si es Mixto y hay propina, va a la parte más grande
  var propMet=fp==='Transferencia'?'Transferencia':'Efectivo';
  if(fp==='Mixto')propMet=tr>ef?'Transferencia':'Efectivo';
  cobrados[pc.key]=true;
  var parts=pc.key.split('|');
  syncQueue.push({action:'marcarCobrado',hoja:parts[0],id:parts[1],formaPago:fp||'Efectivo',ef:ef||0,tr:tr||0,propina:propina,propMet:propMet,ts:Date.now()});
  pendientesCobro.splice(i,1);
  saveLocal();processSyncQueue();
  if(currentTab==='cobros')renderCobrosFromServer();else renderRuta();
  showToast('Cobrado a '+pc.c.split(' ')[0]+' ('+fp+')');
  if(navigator.vibrate)navigator.vibrate(30);
}

/* ── SYNC ── */
function processSyncQueue(){
  if(!isOnline||syncQueue.length===0)return;
  fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(syncQueue[0])}).then(function(){
    syncQueue.shift();saveLocal();document.getElementById('syncBanner').className='sync-banner'+(syncQueue.length>0?' visible':'');
    if(syncQueue.length>0)setTimeout(processSyncQueue,1000);
  }).catch(function(){setTimeout(processSyncQueue,30000)});
}

/* ── TABS ── */
function switchTab(tab){currentTab=tab;saveLocal();document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab===tab)});render()}

/* ── NUEVO PEDIDO MANUAL ── */
var nuevoSaving=false;
var precioCatalogo={}; // {abbr: {p: precio, c: costo}}

function autocompletarTadeo(){
  document.getElementById('nuevoNombre').value='Tadeo Ustariz';
  document.getElementById('nuevoCanal').value='Home';
  document.getElementById('nuevoBarrio').value='Estancias del Pilar';
  document.getElementById('nuevoSubBarrio').value='Champagnat Alto';
  document.getElementById('nuevoLote').value='289';
  document.getElementById('nuevoTel').value='+5491136887500';
  // Default: al costo (para sacar mercaderia propia)
  var radios=document.getElementsByName('nuevoTipo');
  for(var i=0;i<radios.length;i++)radios[i].checked=(radios[i].value==='costo');
  nuevoCanalChange();nuevoBarrioChange();autosaveNuevo();updateNuevoTotal();
  showToast('Datos cargados — agrega productos');
}

function fetchPrecios(){
  if(Object.keys(precioCatalogo).length>0)return;
  fetch(APPS_SCRIPT_URL+'?action=precios&t='+Date.now())
    .then(function(r){return r.json()})
    .then(function(data){precioCatalogo=data||{};updateNuevoTotal()})
    .catch(function(){});
}

function renderNuevo(){
  document.getElementById('armadoView').classList.add('hidden');
  document.getElementById('rutaView').classList.add('hidden');
  document.getElementById('cobrosView').classList.add('hidden');
  document.getElementById('nuevoView').classList.remove('hidden');

  var diaSel=document.getElementById('nuevoDia');
  if(diaSel.options.length===0){
    DIAS_SEMANA.forEach(function(d){var o=document.createElement('option');o.value=d;o.text=d;diaSel.appendChild(o)});
    diaSel.value=getDiaHoy();
  }

  var pc=document.getElementById('nuevoProductos');
  if(!pc.dataset.rendered){
    var html='';
    CATALOGO_NUEVO.forEach(function(p){
      html+='<div class="nuevo-prod-row"><span class="nuevo-prod-name">'+p.n+'</span>'
        +'<div class="nuevo-prod-qty">'
        +'<button onclick="nuevoQty('+p.id+',-1)">-</button>'
        +'<input type="number" id="qty_'+p.id+'" value="0" min="0" inputmode="numeric" onchange="nuevoQtySet('+p.id+')">'
        +'<button onclick="nuevoQty('+p.id+',1)">+</button>'
        +'</div></div>';
    });
    pc.innerHTML=html;
    pc.dataset.rendered='1';
  }

  // Listeners autosave en todos los inputs
  var ids=['nuevoNombre','nuevoCanal','nuevoBarrio','nuevoSubBarrio','nuevoLote','nuevoDireccion','nuevoPilarLote','nuevoCabaBarrio','nuevoCabaCalle','nuevoCabaNumero','nuevoCabaPiso','nuevoTel','nuevoDia'];
  ids.forEach(function(id){var el=document.getElementById(id);if(el&&!el.dataset.autolisten){el.addEventListener('input',autosaveNuevo);el.addEventListener('change',autosaveNuevo);el.dataset.autolisten='1'}});

  restaurarNuevo();
  nuevoCanalChange();
  nuevoBarrioChange();
  fetchPrecios();
  updateNuevoTotal();
}

function nuevoCanalChange(){
  var c=document.getElementById('nuevoCanal').value;
  document.getElementById('nuevoHomeFields').classList.toggle('hidden',c!=='Home');
  document.getElementById('nuevoPilarFields').classList.toggle('hidden',c!=='Pilar');
  document.getElementById('nuevoCfFields').classList.toggle('hidden',c!=='Capital Federal');
  autosaveNuevo();
}

function nuevoBarrioChange(){
  var b=document.getElementById('nuevoBarrio').value;
  // Sub barrio solo aplica a Estancias del Pilar
  document.getElementById('nuevoSubBarrioWrap').style.display=(b==='Estancias del Pilar')?'block':'none';
  autosaveNuevo();
}

function nuevoQty(id,delta){
  var inp=document.getElementById('qty_'+id);
  var v=(parseInt(inp.value)||0)+delta;if(v<0)v=0;
  inp.value=v;nuevoCart[id]=v;if(v===0)delete nuevoCart[id];
  autosaveNuevo();
}
function nuevoQtySet(id){
  var v=parseInt(document.getElementById('qty_'+id).value)||0;
  nuevoCart[id]=v;if(v===0)delete nuevoCart[id];
  autosaveNuevo();
}

function updateNuevoTotal(){
  // Tipo: normal (precio retail) o costo
  var tipo='normal';var radios=document.getElementsByName('nuevoTipo');
  for(var i=0;i<radios.length;i++)if(radios[i].checked)tipo=radios[i].value;

  // Subtotal automatico segun precio/costo del catalogo
  var subtotal=0;
  Object.keys(nuevoCart).forEach(function(id){
    var qty=nuevoCart[id];if(!qty)return;
    var prod=CATALOGO_NUEVO.find(function(x){return x.id==id});
    if(!prod)return;
    var precios=precioCatalogo[prod.abbr];
    if(!precios)return;
    var p=tipo==='costo'?precios.c:precios.p;
    subtotal+=p*qty;
  });

  var pr=parseInt(document.getElementById('nuevoPropina').value)||0;
  var label=tipo==='costo'?'Subtotal (al costo)':'Subtotal productos';
  document.getElementById('nuevoSubtotalLabel').textContent=label;
  document.getElementById('nuevoSubtotal').textContent=formatMoney(subtotal);
  document.getElementById('nuevoTotal').textContent=formatMoney(subtotal+pr);

  // Auto-llenar efectivo si esta vacio (sugerencia)
  // Solo si no hay ef ni tr cargados manualmente
  // (no lo forzamos para no sobreescribir lo que Tadeo esté escribiendo)
}

/* ── AUTOSAVE del form para no perder datos al refrescar ── */
function autosaveNuevo(){
  try{
    var tipo='normal';var radios=document.getElementsByName('nuevoTipo');
    for(var i=0;i<radios.length;i++)if(radios[i].checked)tipo=radios[i].value;
    var state={
      nombre:document.getElementById('nuevoNombre').value,
      canal:document.getElementById('nuevoCanal').value,
      barrio:document.getElementById('nuevoBarrio').value,
      subBarrio:document.getElementById('nuevoSubBarrio').value,
      lote:document.getElementById('nuevoLote').value,
      direccion:document.getElementById('nuevoDireccion').value,
      pilarLote:document.getElementById('nuevoPilarLote').value,
      cabaBarrio:document.getElementById('nuevoCabaBarrio').value,
      cabaCalle:document.getElementById('nuevoCabaCalle').value,
      cabaNumero:document.getElementById('nuevoCabaNumero').value,
      cabaPiso:document.getElementById('nuevoCabaPiso').value,
      tel:document.getElementById('nuevoTel').value,
      dia:document.getElementById('nuevoDia').value,
      efectivo:document.getElementById('nuevoEfectivo').value,
      trans:document.getElementById('nuevoTrans').value,
      propina:document.getElementById('nuevoPropina').value,
      tipo:tipo,
      cart:nuevoCart
    };
    localStorage.setItem('maleu_ruta_nuevo_form',JSON.stringify(state));
  }catch(e){}
  updateNuevoTotal();
}

function restaurarNuevo(){
  try{
    var s=JSON.parse(localStorage.getItem('maleu_ruta_nuevo_form')||'{}');
    if(!s||Object.keys(s).length===0)return;
    if(s.nombre)document.getElementById('nuevoNombre').value=s.nombre;
    if(s.canal)document.getElementById('nuevoCanal').value=s.canal;
    if(s.barrio)document.getElementById('nuevoBarrio').value=s.barrio;
    if(s.subBarrio)document.getElementById('nuevoSubBarrio').value=s.subBarrio;
    if(s.lote)document.getElementById('nuevoLote').value=s.lote;
    if(s.direccion)document.getElementById('nuevoDireccion').value=s.direccion;
    if(s.pilarLote)document.getElementById('nuevoPilarLote').value=s.pilarLote;
    if(s.cabaBarrio)document.getElementById('nuevoCabaBarrio').value=s.cabaBarrio;
    if(s.cabaCalle)document.getElementById('nuevoCabaCalle').value=s.cabaCalle;
    if(s.cabaNumero)document.getElementById('nuevoCabaNumero').value=s.cabaNumero;
    if(s.cabaPiso)document.getElementById('nuevoCabaPiso').value=s.cabaPiso;
    if(s.tel)document.getElementById('nuevoTel').value=s.tel;
    if(s.dia)document.getElementById('nuevoDia').value=s.dia;
    if(s.efectivo)document.getElementById('nuevoEfectivo').value=s.efectivo;
    if(s.trans)document.getElementById('nuevoTrans').value=s.trans;
    if(s.propina)document.getElementById('nuevoPropina').value=s.propina;
    if(s.tipo){var r=document.getElementsByName('nuevoTipo');for(var i=0;i<r.length;i++)if(r[i].value===s.tipo)r[i].checked=true}
    if(s.cart){nuevoCart=s.cart;Object.keys(s.cart).forEach(function(id){var el=document.getElementById('qty_'+id);if(el)el.value=s.cart[id]})}
    updateNuevoTotal();
  }catch(e){}
}

function limpiarNuevo(){
  localStorage.removeItem('maleu_ruta_nuevo_form');
  ['nuevoNombre','nuevoSubBarrio','nuevoLote','nuevoDireccion','nuevoPilarLote','nuevoCabaBarrio','nuevoCabaCalle','nuevoCabaNumero','nuevoCabaPiso','nuevoTel','nuevoEfectivo','nuevoTrans','nuevoPropina'].forEach(function(id){var el=document.getElementById(id);if(el)el.value=''});
  nuevoCart={};CATALOGO_NUEVO.forEach(function(p){var i=document.getElementById('qty_'+p.id);if(i)i.value=0});
  var r=document.getElementsByName('nuevoTipo');for(var i=0;i<r.length;i++)r[i].checked=(r[i].value==='normal');
  updateNuevoTotal();
}

function guardarNuevo(){
  if(nuevoSaving)return; // evitar doble submit
  var nombre=document.getElementById('nuevoNombre').value.trim();
  if(!nombre){showToast('Falta el nombre');return}
  var canal=document.getElementById('nuevoCanal').value;
  var dia=document.getElementById('nuevoDia').value;
  var tel=document.getElementById('nuevoTel').value.trim();
  var ef=parseInt(document.getElementById('nuevoEfectivo').value)||0;
  var tr=parseInt(document.getElementById('nuevoTrans').value)||0;
  var propina=parseInt(document.getElementById('nuevoPropina').value)||0;
  var tipo='normal';var radios=document.getElementsByName('nuevoTipo');
  for(var i=0;i<radios.length;i++)if(radios[i].checked)tipo=radios[i].value;

  var items=[];Object.keys(nuevoCart).forEach(function(id){if(nuevoCart[id]>0)items.push({id:Number(id),qty:nuevoCart[id]})});
  if(items.length===0){showToast('Agrega al menos un producto');return}

  // Total = subtotal auto (precio o costo) — ef/tr son informativos
  var subtotal=0;
  items.forEach(function(it){
    var prod=CATALOGO_NUEVO.find(function(x){return x.id==it.id});
    var precios=prod?precioCatalogo[prod.abbr]:null;
    if(!precios)return;
    var p=tipo==='costo'?precios.c:precios.p;
    subtotal+=p*it.qty;
  });
  var total=subtotal;
  // Si no cargó ef/tr manualmente, completar ef con el total
  if(ef===0&&tr===0)ef=total;

  // Forma de pago: Efectivo, Transferencia o Mixto
  var formaPago='Efectivo';
  if(ef>0&&tr>0)formaPago='Mixto';
  else if(tr>0)formaPago='Transferencia';

  var data={canal:canal,fecha:new Date().toLocaleString('es-AR'),nombre:nombre,telefono:tel,dia:dia,horario:'',pago:formaPago,envio:0,items:items,total:total,subtotalSinDescuento:total,descuento:0,propina:propina,tipoPedido:tipo};

  if(canal==='Home'){
    data.barrioPrivado=document.getElementById('nuevoBarrio').value;
    data.subBarrio=(data.barrioPrivado==='Estancias del Pilar')?document.getElementById('nuevoSubBarrio').value.trim():'';
    data.barrio=data.subBarrio||data.barrioPrivado;
    data.lote=document.getElementById('nuevoLote').value.trim();
  } else if(canal==='Pilar'){
    data.barrioPrivado='';data.subBarrio='';
    data.barrio=document.getElementById('nuevoDireccion').value.trim();
    data.direccion=data.barrio;
    data.lote=document.getElementById('nuevoPilarLote').value.trim();
  } else {
    data.barrioCaba=document.getElementById('nuevoCabaBarrio').value.trim();
    data.calle=document.getElementById('nuevoCabaCalle').value.trim();
    data.numero=document.getElementById('nuevoCabaNumero').value.trim();
    data.piso=document.getElementById('nuevoCabaPiso').value.trim();
  }

  nuevoSaving=true;
  var btn=document.getElementById('btnGuardarNuevo');
  btn.disabled=true;btn.style.opacity='0.6';btn.textContent='Guardando...';

  fetch(APPS_SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(data)})
    .then(function(){
      // Cartel de éxito visible
      var s=document.getElementById('nuevoSuccess');
      s.style.display='block';
      s.textContent='Pedido registrado con exito! '+nombre+' — '+formatMoney(total);
      btn.textContent='GUARDAR PEDIDO';btn.disabled=false;btn.style.opacity='1';
      nuevoSaving=false;
      limpiarNuevo();
      // Refresh y volver a armado despues de 2s
      setTimeout(function(){
        s.style.display='none';
        refresh();
        currentTab='armado';saveLocal();
        document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.tab==='armado')});
        render();
      },2500);
    })
    .catch(function(){
      showToast('Error al guardar — intenta de nuevo');
      btn.textContent='GUARDAR PEDIDO';btn.disabled=false;btn.style.opacity='1';
      nuevoSaving=false;
    });
}

/* ── TOAST ── */
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},3000)}
</script>
