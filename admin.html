<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#331C1C">
<link rel="manifest" href="/admin-manifest.json">
<link rel="icon" href="/img/favicon.png">
<link rel="apple-touch-icon" href="/img/favicon.png">
<title>Maleu Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--brown:#331C1C;--brown-mid:#5C3A2A;--brown-light:#7A4A4A;--cream:#F5F2EB;--cream-dark:#E8DFC4;--orange:#F07D47;--orange-light:#FFF3E0;--green:#4CAF50;--green-bg:#E8F5E9;--green-dark:#2E7D32;--red:#C62828;--red-bg:#FFEBEE;--blue:#1565C0;--blue-bg:#E3F2FD;--text:#F2E8C7;--sidebar-w:200px}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--cream);color:var(--brown);overflow-x:hidden;min-height:100dvh}
.app{display:flex;min-height:100dvh}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#4A2820 0%,#331C1C 100%);color:var(--text);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100}
.sidebar-brand{padding:20px 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo{width:32px;height:32px;border-radius:8px;object-fit:cover}
.sidebar-brand-text h2{font-size:18px;font-weight:800;letter-spacing:.03em;line-height:1}
.sidebar-brand-text small{font-size:10px;color:var(--orange);font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.sidebar-nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;font-size:14px;font-weight:600;color:rgba(242,232,199,.5);cursor:pointer;transition:.15s;border-left:3px solid transparent}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.04)}
.nav-item.active{color:var(--orange);border-left-color:var(--orange);background:rgba(240,125,71,.08)}
.nav-item .nav-icon{font-size:18px;width:24px;text-align:center}
.sidebar-footer{padding:12px 20px;border-top:1px solid rgba(255,255,255,.08)}
.nav-item.exit{color:rgba(242,232,199,.3)}
.nav-item.exit:hover{color:var(--text)}

/* ── MAIN ── */
.main{flex:1;margin-left:var(--sidebar-w);min-height:100dvh}

/* ── TOPBAR ── */
.topbar{background:var(--cream);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:90;border-bottom:1px solid var(--cream-dark)}
.topbar-left{flex:1;display:flex;align-items:center;gap:8px}
.status-label{font-size:12px;color:var(--brown-light)}
.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:4px 12px;border-radius:50px}
.status-badge.ok{background:var(--green-bg);color:var(--green-dark)}
.status-badge.warn{background:var(--orange-light);color:#E65100}
.status-badge.error{background:var(--red-bg);color:var(--red)}
.dot-sm{width:8px;height:8px;border-radius:50%;display:inline-block}
.dot-sm.on{background:var(--green)}
.dot-sm.off{background:#F44336;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-time{font-size:11px;color:var(--brown-light);white-space:nowrap}
.btn-update{background:var(--brown);color:var(--text);border:none;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s}
.btn-update:active{transform:scale(.97)}
.btn-update.spinning .ico{animation:spin .8s linear}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-exit{background:none;border:none;color:var(--brown-light);font-size:13px;cursor:pointer;padding:8px}
.btn-exit:hover{color:var(--brown)}

/* ── PAGES ── */
.page{display:none;padding:24px;padding-bottom:100px}
.page.active{display:block}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,#5C3A2A,#331C1C);border-radius:20px;padding:28px 24px;color:var(--text);margin-bottom:20px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(240,125,71,.08);border-radius:50%}
.hero-sub{font-size:13px;color:rgba(242,232,199,.6);font-weight:600;margin-bottom:4px}
.hero-title{font-size:26px;font-weight:800;line-height:1.15;margin-bottom:2px}
.hero-date{font-size:13px;color:rgba(242,232,199,.5)}
.hero-badge{position:absolute;top:24px;right:24px;background:var(--orange);color:#fff;padding:6px 16px;border-radius:50px;font-size:13px;font-weight:700;z-index:1}

/* ── ALERT ── */
.alert{border-radius:14px;padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;gap:14px;border:2px solid}
.alert.ok{background:#F0FFF0;border-color:var(--green)}
.alert.warn{background:#FFFBF0;border-color:#FF9800}
.alert.info{background:#F0F8FF;border-color:var(--blue)}
.alert-ico{font-size:28px;flex-shrink:0}
.alert h3{font-size:14px;font-weight:700}
.alert p{font-size:12px;color:var(--brown-light);margin-top:2px}

/* ── DELIVERY ── */
.del-card{background:#fff;border-radius:14px;padding:16px 20px;margin-bottom:14px;border:2px solid var(--cream-dark);display:flex;align-items:center;gap:14px}
.del-card .ico{font-size:24px;flex-shrink:0}
.del-card h3{font-size:14px;font-weight:700}
.del-card p{font-size:12px;color:var(--brown-light)}

/* ── SECTION HEADER ── */
.sh{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px}
.sh-title{font-size:13px;font-weight:800;color:var(--orange);text-transform:uppercase;letter-spacing:.06em}
.sh-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:50px;background:var(--cream-dark);color:var(--brown-light)}

/* ── KPI ── */
.kg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.k{background:#fff;border-radius:14px;padding:16px;border:2px solid var(--cream-dark)}
.k-label{font-size:11px;font-weight:700;color:var(--brown-light);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.k-val{font-size:22px;font-weight:800;color:var(--brown);line-height:1.1}
.k-sub{font-size:11px;color:#A89880;margin-top:4px}
.k.acc{border-color:var(--orange);background:linear-gradient(135deg,#FFF8F0,#fff)}
.k.grn{border-color:var(--green)}
.k.wrn{border-color:#FF9800}

/* ── PROGRESS ── */
.pb{height:6px;background:var(--cream-dark);border-radius:3px;overflow:hidden;margin-top:8px}
.pf{height:100%;border-radius:3px;transition:width .3s}
.pf.g{background:var(--green)}.pf.o{background:#FF9800}

/* ── CANAL ── */
.cc{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;border:2px solid var(--cream-dark)}
.cc-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cc-n{font-size:15px;font-weight:800}
.cc-b{font-size:12px;font-weight:700;padding:3px 10px;border-radius:50px;background:var(--cream);color:var(--brown-light)}
.cc-s{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.cc-sv{font-size:18px;font-weight:800;text-align:center}
.cc-sl{font-size:10px;color:var(--brown-light);text-transform:uppercase;text-align:center}

/* ── PEDIDO ── */
.pc{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:8px;border:2px solid var(--cream-dark)}
.pc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.pc-cli{font-size:14px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pc-tot{font-size:14px;font-weight:800}
.pc-meta{display:flex;gap:6px;flex-wrap:wrap}
.t{font-size:10px;font-weight:700;padding:2px 8px;border-radius:50px;white-space:nowrap}
.t-ca{background:var(--cream-dark);color:var(--brown-light)}
.t-pe{background:var(--orange-light);color:#E65100}
.t-re{background:var(--blue-bg);color:var(--blue)}
.t-en{background:var(--green-bg);color:var(--green-dark)}
.t-cx{background:var(--red-bg);color:var(--red)}
.t-co{background:var(--green-bg);color:var(--green-dark)}
.t-nc{background:var(--orange-light);color:#E65100}
.t-de{background:var(--blue-bg);color:var(--blue)}
.t-oc{background:#F3E5F5;color:#6A1B9A}
.pc-pr{font-size:11px;color:var(--brown-light);margin-top:6px}

/* ── PILLS ── */
.fr{display:flex;gap:6px;overflow-x:auto;padding:0 0 12px;-webkit-overflow-scrolling:touch}
.fr::-webkit-scrollbar{display:none}
.pill{font-size:12px;font-weight:700;padding:6px 14px;border-radius:50px;border:2px solid var(--cream-dark);background:#fff;color:var(--brown-light);cursor:pointer;white-space:nowrap;transition:.15s}
.pill.on{background:var(--brown);color:var(--text);border-color:var(--brown)}

/* ── STOCK ── */
.si{background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:6px;border:2px solid var(--cream-dark);display:flex;align-items:center;gap:12px}
.si-n{font-size:13px;font-weight:600}
.si-a{font-size:11px;color:var(--brown-light)}
.si-nums{display:flex;gap:14px;margin-left:auto}
.si-v{font-size:16px;font-weight:800;text-align:center}
.si-l{font-size:9px;color:var(--brown-light);text-transform:uppercase;text-align:center}
.si-v.low{color:#E65100}.si-v.ok{color:var(--green-dark)}.si-v.zero{color:var(--red)}

/* ── CAJA BAR ── */
.cr{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;border:2px solid var(--cream-dark);display:flex;align-items:center;gap:12px}
.cr-ca{font-size:13px;font-weight:700;width:100px}
.cr-bar{flex:1;height:24px;background:var(--cream-dark);border-radius:6px;overflow:hidden;display:flex}
.cr-bf{height:100%;transition:width .3s}
.cr-bf.cob{background:var(--green)}.cr-bf.pen{background:#FF9800}
.cr-am{display:flex;gap:12px;font-size:12px;font-weight:700;min-width:160px;justify-content:flex-end}
.cr-am .g{color:var(--green-dark)}.cr-am .o{color:#E65100}

/* ── EMPTY ── */
.empty{text-align:center;padding:50px 20px;color:#A89880}
.empty-ico{font-size:48px;margin-bottom:10px}
.empty-txt{font-size:14px}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--brown);color:var(--text);padding:10px 24px;border-radius:50px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.loading{text-align:center;padding:80px 20px;color:var(--brown-light);font-style:italic}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0}
  .page{padding:16px;padding-bottom:90px}
  .hero-title{font-size:22px}
  .topbar{padding:10px 16px}
  .bnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--cream-dark);z-index:100;padding:4px 0;padding-bottom:env(safe-area-inset-bottom)}
  .bnav-i{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 4px;font-size:10px;font-weight:700;color:var(--brown-light);cursor:pointer;transition:.15s}
  .bnav-i.active{color:var(--orange)}
  .bnav-i .ni{font-size:20px;margin-bottom:2px}
}
@media(min-width:769px){.bnav{display:none}}
</style>
</head>
<body>
<nav class="sidebar">
  <div class="sidebar-brand">
    <img class="sidebar-logo" src="/img/favicon.png" alt="Maleu">
    <div class="sidebar-brand-text"><h2>maleu</h2><small>ADMIN</small></div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-item active" data-p="hoy" onclick="go('hoy')"><span class="nav-icon">&#128293;</span>Hoy</div>
    <div class="nav-item" data-p="pedidos" onclick="go('pedidos')"><span class="nav-icon">&#128203;</span>Pedidos</div>
    <div class="nav-item" data-p="caja" onclick="go('caja')"><span class="nav-icon">&#128176;</span>Caja</div>
    <div class="nav-item" data-p="abastecimiento" onclick="go('abastecimiento')"><span class="nav-icon">&#128230;</span>Abastecimiento</div>
    <div class="nav-item" data-p="metricas" onclick="go('metricas')"><span class="nav-icon">&#128202;</span>Métricas</div>
  </div>
  <div class="sidebar-footer">
    <div class="nav-item exit" onclick="location.href='/'"><span class="nav-icon">&#9664;</span>Salir</div>
  </div>
</nav>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <span class="status-label">Estado:</span>
      <span class="status-badge ok" id="stBadge"><span class="dot-sm on" id="stDot"></span> Todo en orden</span>
    </div>
    <span class="sync-time" id="syncT">Act. --:--</span>
    <button class="btn-update" id="btnR" onclick="load()"><span class="ico">&#8635;</span> Actualizar</button>
    <button class="btn-exit" onclick="location.href='/'">Salir</button>
  </div>

  <div class="loading" id="ld">Cargando datos de Maleu...</div>

  <!-- HOY -->
  <div class="page" id="p-hoy">
    <div class="hero"><div class="hero-sub" id="hSub">--</div><div class="hero-title" id="hTitle">--</div><div class="hero-date" id="hDate">--</div><div class="hero-badge" id="hBadge">--</div></div>
    <div id="alerts"></div>
    <div id="deliv"></div>
    <div class="sh"><span class="sh-title">&#128230; Produccion &times; Stock</span><span class="sh-badge" id="sBadge">--</span></div>
    <div id="sHoy"></div>
  </div>

  <!-- PEDIDOS -->
  <div class="page" id="p-pedidos">
    <div class="fr" id="fRow"></div>
    <div id="pList"></div>
  </div>

  <!-- CAJA -->
  <div class="page" id="p-caja">
    <div class="kg" id="cKpi"></div>
    <div class="sh"><span class="sh-title">&#128176; Por canal</span></div>
    <div id="cList"></div>
  </div>

  <!-- ABASTECIMIENTO -->
  <div class="page" id="p-abastecimiento">
    <div class="kg" id="aKpi"></div>
    <div class="sh"><span class="sh-title">&#128230; Stock completo</span></div>
    <div id="sList"></div>
  </div>

  <!-- METRICAS -->
  <div class="page" id="p-metricas">
    <div class="kg" id="mKpi"></div>
    <div class="sh"><span class="sh-title">&#128202; Por canal</span></div>
    <div id="mList"></div>
  </div>
</div>

<nav class="bnav">
  <div class="bnav-i active" data-p="hoy" onclick="go('hoy')"><span class="ni">&#128293;</span>Hoy</div>
  <div class="bnav-i" data-p="pedidos" onclick="go('pedidos')"><span class="ni">&#128203;</span>Pedidos</div>
  <div class="bnav-i" data-p="caja" onclick="go('caja')"><span class="ni">&#128176;</span>Caja</div>
  <div class="bnav-i" data-p="abastecimiento" onclick="go('abastecimiento')"><span class="ni">&#128230;</span>Stock</div>
  <div class="bnav-i" data-p="metricas" onclick="go('metricas')"><span class="ni">&#128202;</span>Datos</div>
</nav>

<div class="toast" id="toast"></div>

<script>
var API='https://script.google.com/macros/s/AKfycbxmrG5YVSshcYezk8lXFx_uxb7NFGcb9EfTXc7dsIN4rZyj73CET4mk_aKPFPDY2wNi/exec';
var D=null,cur='hoy',fC='Todos',fE='Todos';
var ENT={'Lunes':{z:'Estancias',h:'19:00 a 21:00 hs'},'Miércoles':{z:'Estancias + Pilar + CABA',h:'19:00 a 21:00 hs'},'Viernes':{z:'Estancias + Pilar',h:'19:00 a 21:00 hs'},'Sábado':{z:'Estancias',h:'19:00 a 21:00 hs'},'Domingo':{z:'Estancias',h:'11:00 a 13:00 hs'}};
var DS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
var MS=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
var PN={PPM:'Pack Pizza Muzza',PPJyQ:'Pack Pizza J&Q',PPCyQ:'Pack Pizza C&Q',SCo:'Sorrentinos Copetín',SJyQ:'Sorrentinos J&Q',SCa:'Sorrentinos Calabaza',ECaC:'Empanadas Carne',EJyQ:'Empanadas J&Q',ECyQ:'Empanadas C&Q',EV:'Empanadas Verdura',TG:'Torta Golosa',TLC:'Torta Lemon Curd',TC:'Torta Chocolate',F:'Flan',PMu:'Pizza Muzza',PMa:'Pizza Margarita',PJyQ:'Pizza J&Q',PCC:'Pizza Cebolla',PJyM:'Pizza J&M'};

function f$(n){return n.toLocaleString('es-AR');}
function fs$(n){if(n>=1e6)return(n/1e6).toFixed(1).replace('.0','')+'M';if(n>=1e3)return Math.round(n/1e3)+'K';return''+n;}

function go(p){cur=p;document.querySelectorAll('[data-p]').forEach(function(e){e.classList.toggle('active',e.dataset.p===p);});document.querySelectorAll('.page').forEach(function(e){e.classList.toggle('active',e.id==='p-'+p);});}
function toast(m){var e=$('toast');e.textContent=m;e.classList.add('show');setTimeout(function(){e.classList.remove('show');},2000);}
function $(id){return document.getElementById(id);}

function nextDel(){
  var now=new Date(),hoy=DS[now.getDay()],hr=now.getHours();
  if(ENT[hoy]&&hr<21)return{d:hoy,f:now,hoy:true,i:ENT[hoy]};
  for(var i=1;i<=7;i++){var dt=new Date(now);dt.setDate(dt.getDate()+i);var n=DS[dt.getDay()];if(ENT[n])return{d:n,f:dt,hoy:false,i:ENT[n]};}
  return null;
}

function load(){
  var b=$('btnR');b.classList.add('spinning');setTimeout(function(){b.classList.remove('spinning');},800);
  fetch(API+'?action=admin&t='+Date.now()).then(function(r){return r.json();}).then(function(d){
    D=d;localStorage.setItem('ma2',JSON.stringify(d));render();sync();$('ld').style.display='none';st('on');toast('Datos actualizados');
  }).catch(function(){st('off');var c=localStorage.getItem('ma2');if(c&&!D){D=JSON.parse(c);render();$('ld').style.display='none';toast('Sin conexion — cache');}});
}

function st(s){
  var b=$('stBadge'),d=$('stDot');
  if(s==='on'){d.className='dot-sm on';b.className='status-badge ok';b.innerHTML='<span class="dot-sm on"></span> Todo en orden';}
  else{d.className='dot-sm off';b.className='status-badge error';b.innerHTML='<span class="dot-sm off"></span> Sin conexion';}
}
function sync(){var n=new Date(),h=n.getHours()%12||12,m=String(n.getMinutes()).padStart(2,'0'),ap=n.getHours()>=12?'p. m.':'a. m.';$('syncT').textContent='Act. '+String(h).padStart(2,'0')+':'+m+' '+ap;}

function render(){if(!D)return;rHoy();rPed();rCaja();rAbast();rMet();$('p-'+cur).classList.add('active');
  var t=D.totales,b=$('stBadge');
  if(t.pendientes>0){b.className='status-badge warn';b.innerHTML='<span class="dot-sm on"></span> '+t.pendientes+' pendiente'+(t.pendientes>1?'s':'');}
}

function rHoy(){
  var nx=nextDel();
  if(nx){
    var f=nx.f;
    $('hSub').textContent=nx.hoy?'Hoy':'Mañana';
    if(!nx.hoy){var df=Math.ceil((nx.f-new Date())/(864e5));if(df>1)$('hSub').textContent='En '+df+' dias';}
    $('hTitle').textContent=(nx.hoy?'Hoy':'Mañana')+' \u00b7 '+nx.d;
    $('hDate').textContent=f.getDate()+' de '+MS[f.getMonth()]+' \u00b7 '+f.getFullYear();
    $('hBadge').textContent=nx.i.h;
  }
  var t=D.totales,ac=$('alerts');ac.innerHTML='';
  if(t.pendientes===0&&t.reservados===0){ac.innerHTML='<div class="alert ok"><span class="alert-ico">&#9989;</span><div><h3>Todo en orden</h3><p>No hay acciones pendientes</p></div></div>';}
  else{
    if(t.pendientes>0)ac.innerHTML+='<div class="alert warn"><span class="alert-ico">&#9888;&#65039;</span><div><h3>'+t.pendientes+' pedido'+(t.pendientes>1?'s':'')+' sin confirmar</h3><p>Falta definir Origen</p></div></div>';
    if(t.noCobrado>0)ac.innerHTML+='<div class="alert info"><span class="alert-ico">&#128176;</span><div><h3>$'+f$(t.noCobrado)+' pendientes de cobro</h3><p>'+Math.round(t.noCobrado/Math.max(t.facturado,1)*100)+'% del facturado</p></div></div>';
  }
  var dc=$('deliv');dc.innerHTML='';
  if(nx){
    var ph=D.pedidos.filter(function(p){return p.de===nx.d&&p.es!=='Entregado'&&p.es!=='Cancelado';});
    if(!ph.length)dc.innerHTML='<div class="del-card"><span class="ico">&#128666;</span><div><h3>Sin pedidos para esta entrega</h3><p>'+nx.d+' \u00b7 '+nx.i.h+'</p></div></div>';
    else{var tot=ph.reduce(function(s,p){return s+p.$;},0);dc.innerHTML='<div class="del-card"><span class="ico">&#128666;</span><div><h3>'+ph.length+' pedido'+(ph.length>1?'s':'')+' para entregar</h3><p>'+nx.d+' \u00b7 '+nx.i.h+' \u00b7 $'+f$(tot)+'</p></div></div>';}
    // Stock needed
    var sb=$('sBadge'),sc=$('sHoy');
    if(!ph.length){sb.textContent='sin pedidos';sc.innerHTML='<div class="empty"><div class="empty-ico">&#127881;</div><div class="empty-txt">Sin pedidos activos para esta entrega.</div></div>';}
    else{
      var need={};ph.forEach(function(p){p.p.forEach(function(r){need[r.a]=(need[r.a]||0)+r.q;});});
      sb.textContent=ph.length+' pedido'+(ph.length>1?'s':'');sc.innerHTML='';
      Object.keys(need).forEach(function(a){
        var q=need[a],si=D.stock.find(function(s){return s.a===a;}),dsp=si?si.d:0,ok=dsp>=q;
        var el=document.createElement('div');el.className='si';
        el.innerHTML='<div style="flex:1"><div class="si-n">'+(PN[a]||a)+'</div><div class="si-a">Necesita: '+q+' \u00b7 Disponible: '+dsp+'</div></div><div style="font-size:20px">'+(ok?'&#9989;':'&#9888;&#65039;')+'</div>';
        sc.appendChild(el);
      });
    }
  }
}

function rPed(){
  var fr=$('fRow');fr.innerHTML='';
  var cans=['Todos'];D.canales.forEach(function(c){if(c.pedidos>0)cans.push(c.nombre);});
  cans.forEach(function(c){var p=document.createElement('span');p.className='pill'+(fC===c?' on':'');p.textContent=c;p.onclick=function(){fC=c;rPed();};fr.appendChild(p);});
  ['Todos','Pendiente','Reservado','Entregado','Cancelado'].forEach(function(e){var p=document.createElement('span');p.className='pill'+(fE===e?' on':'');p.textContent=e;p.onclick=function(){fE=e;rPed();};fr.appendChild(p);});
  var ct=$('pList');ct.innerHTML='';
  var fl=D.pedidos.filter(function(p){return(fC==='Todos'||p.h===fC)&&(fE==='Todos'||p.es===fE);});
  if(!fl.length){ct.innerHTML='<div class="empty"><div class="empty-ico">&#128230;</div><div class="empty-txt">No hay pedidos con estos filtros</div></div>';return;}
  var ord={'Pendiente':0,'Reservado':1,'Entregado':2,'Cancelado':3};
  fl.sort(function(a,b){return(ord[a.es]||0)-(ord[b.es]||0);});
  fl.forEach(function(p){
    var c=document.createElement('div');c.className='pc';
    var pr=p.p.map(function(r){return r.q+'x '+(PN[r.a]||r.a);}).join(' \u00b7 ');
    var ec={'Pendiente':'t-pe','Reservado':'t-re','Entregado':'t-en','Cancelado':'t-cx'};
    var oc=p.o==='Depósito'||p.o==='Deposito'?'t-de':p.o==='Orden de Compra'?'t-oc':'t-pe';
    c.innerHTML='<div class="pc-top"><span class="pc-cli">'+p.c+'</span><span class="pc-tot">$'+f$(p.$)+'</span></div><div class="pc-meta"><span class="t t-ca">'+p.h+'</span><span class="t '+(ec[p.es]||'t-pe')+'">'+p.es+'</span><span class="t '+(p.ep==='Cobrado'?'t-co':'t-nc')+'">'+p.ep+'</span>'+(p.o&&p.o!=='Pendiente'?'<span class="t '+oc+'">'+p.o+'</span>':'')+'<span class="t t-ca">'+p.f+' \u00b7 '+p.de+'</span></div>'+(pr?'<div class="pc-pr">'+pr+'</div>':'');
    ct.appendChild(c);
  });
}

function rCaja(){
  var t=D.totales,pct=t.facturado>0?Math.round(t.cobrado/t.facturado*100):0;
  $('cKpi').innerHTML='<div class="k acc"><div class="k-label">Facturado total</div><div class="k-val">$'+f$(t.facturado)+'</div><div class="k-sub">'+t.pedidos+' pedidos</div></div><div class="k grn"><div class="k-label">Cobrado</div><div class="k-val">$'+f$(t.cobrado)+'</div><div class="pb"><div class="pf '+(pct>=70?'g':'o')+'" style="width:'+pct+'%"></div></div></div><div class="k wrn"><div class="k-label">Pendiente cobro</div><div class="k-val">$'+f$(t.noCobrado)+'</div><div class="k-sub">'+(t.facturado>0?Math.round(t.noCobrado/t.facturado*100):0)+'% del total</div></div><div class="k"><div class="k-label">Ticket promedio</div><div class="k-val">$'+f$(t.ticket)+'</div></div>';
  var cl=$('cList');cl.innerHTML='';
  D.canales.forEach(function(c){if(!c.pedidos)return;var pct2=c.facturado>0?Math.round(c.cobrado/c.facturado*100):0;var r=document.createElement('div');r.className='cr';r.innerHTML='<div class="cr-ca">'+c.nombre+'</div><div class="cr-bar"><div class="cr-bf cob" style="width:'+pct2+'%"></div><div class="cr-bf pen" style="width:'+(100-pct2)+'%"></div></div><div class="cr-am"><span class="g">$'+fs$(c.cobrado)+'</span><span class="o">$'+fs$(c.noCobrado)+'</span></div>';cl.appendChild(r);});
}

function rAbast(){
  var ls=D.stock.filter(function(s){return s.d<=3;}).length,zs=D.stock.filter(function(s){return s.d<=0;}).length;
  $('aKpi').innerHTML='<div class="k'+(D.oc.pendientes>0?' wrn':'')+'"><div class="k-label">OC abiertas</div><div class="k-val">'+D.oc.pendientes+'</div><div class="k-sub">'+(D.oc.costo>0?'$'+f$(D.oc.costo)+' en compras':'Sin compras pendientes')+'</div></div><div class="k'+(zs>0?' wrn':'')+'"><div class="k-label">Alertas stock</div><div class="k-val">'+(zs>0?zs+' sin stock':ls>0?ls+' bajos':'OK')+'</div><div class="k-sub">'+D.stock.length+' productos</div></div>';
  var sc=$('sList');sc.innerHTML='';
  if(!D.stock||!D.stock.length){sc.innerHTML='<div class="empty"><div class="empty-ico">&#128230;</div><div class="empty-txt">Sin datos de stock</div></div>';return;}
  D.stock.slice().sort(function(a,b){return a.d-b.d;}).forEach(function(s){
    var el=document.createElement('div');el.className='si';var cls=s.d<=0?'zero':s.d<=3?'low':'ok';
    el.innerHTML='<div style="flex:1"><div class="si-n">'+s.n+'</div><div class="si-a">'+s.a+'</div></div><div class="si-nums"><div><div class="si-v">'+s.f+'</div><div class="si-l">Fisico</div></div><div><div class="si-v">'+s.r+'</div><div class="si-l">Reserv.</div></div><div><div class="si-v '+cls+'">'+s.d+'</div><div class="si-l">Disp.</div></div></div>';
    sc.appendChild(el);
  });
}

function rMet(){
  var t=D.totales,pct=t.facturado>0?Math.round(t.cobrado/t.facturado*100):0;
  $('mKpi').innerHTML='<div class="k acc"><div class="k-label">Facturacion semana</div><div class="k-val">$'+f$(t.facturado)+'</div></div><div class="k"><div class="k-label">Pedidos</div><div class="k-val">'+t.pedidos+'</div><div class="k-sub">'+t.entregados+' ent \u00b7 '+t.reservados+' res \u00b7 '+t.pendientes+' pend</div></div><div class="k"><div class="k-label">Ticket promedio</div><div class="k-val">$'+f$(t.ticket)+'</div></div><div class="k"><div class="k-label">Tasa de cobro</div><div class="k-val">'+pct+'%</div><div class="pb"><div class="pf '+(pct>=70?'g':'o')+'" style="width:'+pct+'%"></div></div></div>';
  var ml=$('mList');ml.innerHTML='';
  D.canales.forEach(function(c){if(!c.pedidos)return;var cd=document.createElement('div');cd.className='cc';var p2=c.facturado>0?Math.round(c.cobrado/c.facturado*100):0;cd.innerHTML='<div class="cc-h"><span class="cc-n">'+c.nombre+'</span><span class="cc-b">'+c.pedidos+' pedidos</span></div><div class="cc-s"><div><div class="cc-sv">$'+fs$(c.facturado)+'</div><div class="cc-sl">Facturado</div></div><div><div class="cc-sv" style="color:#2E7D32">$'+fs$(c.cobrado)+'</div><div class="cc-sl">Cobrado</div></div><div><div class="cc-sv" style="color:#E65100">$'+fs$(c.noCobrado)+'</div><div class="cc-sl">Pend.</div></div></div><div class="pb" style="margin-top:10px"><div class="pf '+(p2>=70?'g':'o')+'" style="width:'+p2+'%"></div></div>';ml.appendChild(cd);});
}

(function(){var c=localStorage.getItem('ma2');if(c){try{D=JSON.parse(c);render();$('ld').style.display='none';}catch(e){}}load();setInterval(load,120000);window.addEventListener('online',function(){st('on');load();});window.addEventListener('offline',function(){st('off');});})();
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw-admin.js').catch(function(){});
