<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#331C1C">
<link rel="manifest" href="/estancias/admin-manifest.json">
<link rel="icon" href="/img/favicon.png">
<link rel="apple-touch-icon" href="/img/favicon.png">
<title>Maleu Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--brown:#331C1C;--brown-mid:#5C3A2A;--brown-light:#7A4A4A;--cream:#F5F2EB;--cream-dark:#E8DFC4;--cream-darker:#D4C8A0;--orange:#F07D47;--orange-light:#FFF3E0;--green:#4CAF50;--green-bg:#E8F5E9;--green-dark:#2E7D32;--red:#C62828;--red-bg:#FFEBEE;--blue:#1565C0;--blue-bg:#E3F2FD;--text:#F2E8C7;--sidebar-w:200px}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--cream);color:var(--brown);overflow-x:hidden;min-height:100dvh}

/* ── LAYOUT ── */
.app{display:flex;min-height:100dvh}

/* ── SIDEBAR (desktop) ── */
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#4A2820 0%,#331C1C 100%);color:var(--text);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s}
.sidebar-brand{padding:20px 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo{width:32px;height:32px;border-radius:8px;object-fit:cover}
.sidebar-brand-text h2{font-size:18px;font-weight:800;letter-spacing:.03em;line-height:1}
.sidebar-brand-text small{font-size:10px;color:var(--orange);font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.sidebar-nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 20px;font-size:14px;font-weight:600;color:rgba(242,232,199,.5);cursor:pointer;transition:.15s;border-left:3px solid transparent}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.04)}
.nav-item.active{color:var(--orange);border-left-color:var(--orange);background:rgba(240,125,71,.08)}
.nav-item .nav-icon{font-size:18px;width:24px;text-align:center}
.sidebar-footer{padding:12px 20px;border-top:1px solid rgba(255,255,255,.08)}
.nav-item.exit{color:rgba(242,232,199,.3)}
.nav-item.exit:hover{color:var(--text)}

/* ── MAIN ── */
.main{flex:1;margin-left:var(--sidebar-w);min-height:100dvh}

/* ── TOPBAR ── */
.topbar{background:var(--cream);padding:14px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:90;border-bottom:1px solid var(--cream-dark)}
.topbar-left{flex:1;display:flex;align-items:center;gap:8px}
.status-label{font-size:12px;color:var(--brown-light)}
.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:4px 12px;border-radius:50px}
.status-badge.ok{background:var(--green-bg);color:var(--green-dark)}
.status-badge.warn{background:var(--orange-light);color:#E65100}
.status-badge.error{background:var(--red-bg);color:var(--red)}
.status-dot-sm{width:8px;height:8px;border-radius:50%}
.status-dot-sm.online{background:var(--green)}
.status-dot-sm.offline{background:#F44336;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-time{font-size:11px;color:var(--brown-light);white-space:nowrap}
.btn-update{background:var(--brown);color:var(--text);border:none;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.15s}
.btn-update:active{transform:scale(.97)}
.btn-update.spinning .btn-icon{animation:spin .8s linear}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-salir{background:none;border:none;color:var(--brown-light);font-size:13px;cursor:pointer;padding:8px}
.btn-salir:hover{color:var(--brown)}

/* ── PAGE SECTIONS ── */
.page{display:none;padding:24px;padding-bottom:100px}
.page.active{display:block}

/* ── HOY: HERO CARD ── */
.hero{background:linear-gradient(135deg,#5C3A2A,#331C1C);border-radius:20px;padding:28px 24px;color:var(--text);margin-bottom:20px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:rgba(240,125,71,.08);border-radius:50%}
.hero-label{font-size:13px;color:rgba(242,232,199,.6);font-weight:600;margin-bottom:4px}
.hero-title{font-size:26px;font-weight:800;line-height:1.15;margin-bottom:2px}
.hero-date{font-size:13px;color:rgba(242,232,199,.5)}
.hero-horario{position:absolute;top:24px;right:24px;background:var(--orange);color:#fff;padding:6px 16px;border-radius:50px;font-size:13px;font-weight:700;z-index:1}

/* ── ALERT CARD ── */
.alert-card{border-radius:14px;padding:16px 20px;margin-bottom:14px;display:flex;align-items:center;gap:14px;border:2px solid}
.alert-card.ok{background:#F0FFF0;border-color:var(--green)}
.alert-card.warn{background:#FFFBF0;border-color:#FF9800}
.alert-card.info{background:#F0F8FF;border-color:var(--blue)}
.alert-icon{font-size:28px;flex-shrink:0}
.alert-text h3{font-size:14px;font-weight:700}
.alert-text p{font-size:12px;color:var(--brown-light);margin-top:2px}

/* ── DELIVERY CARD ── */
.delivery-card{background:#fff;border-radius:14px;padding:16px 20px;margin-bottom:14px;border:2px solid var(--cream-dark);display:flex;align-items:center;gap:14px}
.delivery-icon{font-size:24px;flex-shrink:0}
.delivery-text h3{font-size:14px;font-weight:700}
.delivery-text p{font-size:12px;color:var(--brown-light)}

/* ── SECTION HEADER ── */
.sec-header{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px}
.sec-title{font-size:13px;font-weight:800;color:var(--orange);text-transform:uppercase;letter-spacing:.06em}
.sec-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:50px;background:var(--cream-dark);color:var(--brown-light)}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.kpi{background:#fff;border-radius:14px;padding:16px;border:2px solid var(--cream-dark)}
.kpi-label{font-size:11px;font-weight:700;color:var(--brown-light);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.kpi-value{font-size:22px;font-weight:800;color:var(--brown);line-height:1.1}
.kpi-sub{font-size:11px;color:#A89880;margin-top:4px}
.kpi.accent{border-color:var(--orange);background:linear-gradient(135deg,#FFF8F0,#fff)}
.kpi.green{border-color:var(--green)}
.kpi.warn{border-color:#FF9800}
.kpi.wide{grid-column:1/-1}

/* ── PROGRESS BAR ── */
.progress-bar{height:6px;background:var(--cream-dark);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-fill.green{background:var(--green)}
.progress-fill.orange{background:#FF9800}

/* ── CANAL CARDS ── */
.canal-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;border:2px solid var(--cream-dark)}
.canal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.canal-name{font-size:15px;font-weight:800}
.canal-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:50px;background:var(--cream);color:var(--brown-light)}
.canal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.canal-stat{text-align:center}
.canal-stat-value{font-size:18px;font-weight:800}
.canal-stat-label{font-size:10px;color:var(--brown-light);text-transform:uppercase}

/* ── PEDIDO LIST ── */
.pedido-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:8px;border:2px solid var(--cream-dark)}
.pedido-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.pedido-cliente{font-size:14px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pedido-total{font-size:14px;font-weight:800}
.pedido-meta{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:50px;white-space:nowrap}
.tag-canal{background:var(--cream-dark);color:var(--brown-light)}
.tag-pendiente{background:var(--orange-light);color:#E65100}
.tag-reservado{background:var(--blue-bg);color:var(--blue)}
.tag-entregado{background:var(--green-bg);color:var(--green-dark)}
.tag-cancelado{background:var(--red-bg);color:var(--red)}
.tag-cobrado{background:var(--green-bg);color:var(--green-dark)}
.tag-nocobrado{background:var(--orange-light);color:#E65100}
.tag-deposito{background:var(--blue-bg);color:var(--blue)}
.tag-oc{background:#F3E5F5;color:#6A1B9A}
.pedido-prods{font-size:11px;color:var(--brown-light);margin-top:6px}

/* ── FILTER PILLS ── */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding:0 0 12px;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.pill{font-size:12px;font-weight:700;padding:6px 14px;border-radius:50px;border:2px solid var(--cream-dark);background:#fff;color:var(--brown-light);cursor:pointer;white-space:nowrap;transition:.15s}
.pill.active{background:var(--brown);color:var(--text);border-color:var(--brown)}

/* ── STOCK LIST ── */
.stock-item{background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:6px;border:2px solid var(--cream-dark);display:flex;align-items:center;gap:12px}
.stock-name{font-size:13px;font-weight:600}
.stock-abbr{font-size:11px;color:var(--brown-light)}
.stock-nums{display:flex;gap:14px;margin-left:auto}
.stock-num{text-align:center}
.stock-num-val{font-size:16px;font-weight:800}
.stock-num-label{font-size:9px;color:var(--brown-light);text-transform:uppercase}
.stock-num-val.low{color:#E65100}
.stock-num-val.ok{color:var(--green-dark)}
.stock-num-val.zero{color:var(--red)}

/* ── CAJA TABLE ── */
.caja-row{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;border:2px solid var(--cream-dark);display:flex;align-items:center;gap:12px}
.caja-canal{font-size:13px;font-weight:700;width:100px}
.caja-bar{flex:1;height:24px;background:var(--cream-dark);border-radius:6px;overflow:hidden;position:relative;display:flex}
.caja-bar-fill{height:100%;transition:width .3s}
.caja-bar-fill.cobrado{background:var(--green)}
.caja-bar-fill.pendiente{background:#FF9800}
.caja-amounts{display:flex;gap:12px;font-size:12px;font-weight:700;min-width:160px;justify-content:flex-end}
.caja-amt.green{color:var(--green-dark)}
.caja-amt.orange{color:#E65100}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:50px 20px;color:#A89880}
.empty-state-icon{font-size:48px;margin-bottom:10px}
.empty-state-text{font-size:14px}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--brown);color:var(--text);padding:10px 24px;border-radius:50px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* ── LOADING ── */
.loading{text-align:center;padding:80px 20px;color:var(--brown-light);font-style:italic}

/* ── MOBILE ── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .page{padding:16px;padding-bottom:90px}
  .hero-title{font-size:22px}
  .topbar{padding:10px 16px}
  /* Mobile bottom nav */
  .mobile-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:2px solid var(--cream-dark);z-index:100;padding:4px 0;padding-bottom:env(safe-area-inset-bottom)}
  .mobile-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:6px 4px;font-size:10px;font-weight:700;color:var(--brown-light);cursor:pointer;transition:.15s}
  .mobile-nav-item.active{color:var(--orange)}
  .mobile-nav-item .nav-icon{font-size:20px;margin-bottom:2px}
}
@media(min-width:769px){
  .mobile-nav{display:none}
}
</style>
</head>
<body>

<!-- SIDEBAR (desktop) -->
<nav class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <img class="sidebar-logo" src="/img/favicon.png" alt="Maleu">
    <div class="sidebar-brand-text">
      <h2>maleu</h2>
      <small>ADMIN</small>
    </div>
  </div>
  <div class="sidebar-nav">
    <div class="nav-item active" data-page="hoy" onclick="switchPage('hoy')"><span class="nav-icon">&#128293;</span>Hoy</div>
    <div class="nav-item" data-page="pedidos" onclick="switchPage('pedidos')"><span class="nav-icon">&#128203;</span>Pedidos</div>
    <div class="nav-item" data-page="caja" onclick="switchPage('caja')"><span class="nav-icon">&#128176;</span>Caja</div>
    <div class="nav-item" data-page="abastecimiento" onclick="switchPage('abastecimiento')"><span class="nav-icon">&#128230;</span>Abastecimiento</div>
    <div class="nav-item" data-page="metricas" onclick="switchPage('metricas')"><span class="nav-icon">&#128202;</span>Métricas</div>
  </div>
  <div class="sidebar-footer">
    <div class="nav-item exit" onclick="location.href='/'"><span class="nav-icon">&#9664;</span>Salir</div>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="status-label">Estado:</span>
      <span class="status-badge ok" id="statusBadge"><span class="status-dot-sm online" id="statusDot"></span> Todo en orden</span>
    </div>
    <span class="sync-time" id="syncTime">Act. --:-- --</span>
    <button class="btn-update" id="btnRefresh" onclick="refresh()"><span class="btn-icon">&#8635;</span> Actualizar</button>
    <button class="btn-salir" onclick="location.href='/'">Salir</button>
  </div>

  <!-- LOADING -->
  <div class="loading" id="loading">Cargando datos de Maleu...</div>

  <!-- ══ PAGE: HOY ══ -->
  <div class="page" id="page-hoy">
    <div class="hero" id="heroCard">
      <div class="hero-label" id="heroLabel">Hoy</div>
      <div class="hero-title" id="heroTitle">--</div>
      <div class="hero-date" id="heroDate">--</div>
      <div class="hero-horario" id="heroHorario">--</div>
    </div>
    <div id="alertContainer"></div>
    <div id="deliveryContainer"></div>
    <div class="sec-header">
      <span class="sec-title">&#128230; Produccion &times; Stock</span>
      <span class="sec-badge" id="stockBadgeHoy">--</span>
    </div>
    <div id="stockHoyContainer"></div>
  </div>

  <!-- ══ PAGE: PEDIDOS ══ -->
  <div class="page" id="page-pedidos">
    <div class="filter-row" id="filterRow"></div>
    <div id="pedidosContainer"></div>
  </div>

  <!-- ══ PAGE: CAJA ══ -->
  <div class="page" id="page-caja">
    <div class="kpi-grid" id="cajaKpis"></div>
    <div class="sec-header"><span class="sec-title">&#128176; Por canal</span></div>
    <div id="cajaContainer"></div>
  </div>

  <!-- ══ PAGE: ABASTECIMIENTO ══ -->
  <div class="page" id="page-abastecimiento">
    <div class="kpi-grid" id="abastKpis"></div>
    <div class="sec-header"><span class="sec-title">&#128230; Stock completo</span></div>
    <div id="stockContainer"></div>
  </div>

  <!-- ══ PAGE: METRICAS ══ -->
  <div class="page" id="page-metricas">
    <div class="kpi-grid" id="metricasKpis"></div>
    <div class="sec-header"><span class="sec-title">&#128202; Por canal</span></div>
    <div id="metricasCanales"></div>
  </div>

</div><!-- /main -->

<!-- MOBILE NAV -->
<nav class="mobile-nav">
  <div class="mobile-nav-item active" data-page="hoy" onclick="switchPage('hoy')"><span class="nav-icon">&#128293;</span>Hoy</div>
  <div class="mobile-nav-item" data-page="pedidos" onclick="switchPage('pedidos')"><span class="nav-icon">&#128203;</span>Pedidos</div>
  <div class="mobile-nav-item" data-page="caja" onclick="switchPage('caja')"><span class="nav-icon">&#128176;</span>Caja</div>
  <div class="mobile-nav-item" data-page="abastecimiento" onclick="switchPage('abastecimiento')"><span class="nav-icon">&#128230;</span>Stock</div>
  <div class="mobile-nav-item" data-page="metricas" onclick="switchPage('metricas')"><span class="nav-icon">&#128202;</span>Datos</div>
</nav>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbxmrG5YVSshcYezk8lXFx_uxb7NFGcb9EfTXc7dsIN4rZyj73CET4mk_aKPFPDY2wNi/exec';
var DATA = null;
var currentPage = 'hoy';
var filterCanal = 'Todos';
var filterEstado = 'Todos';

// ── Dias y horarios de entrega ──
var ENTREGAS = {
  'Lunes':    {zona:'Estancias del Pilar', h:'19:00 a 21:00 hs'},
  'Miércoles':{zona:'Estancias + Pilar + CABA', h:'19:00 a 21:00 hs'},
  'Viernes':  {zona:'Estancias + Pilar', h:'19:00 a 21:00 hs'},
  'Sábado':   {zona:'Estancias del Pilar', h:'19:00 a 21:00 hs'},
  'Domingo':  {zona:'Estancias del Pilar', h:'11:00 a 13:00 hs'}
};
var DIAS_SEMANA = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
var MESES = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

var PROD_NAMES = {
  PPM:'Pack Pizza Muzza', PPJyQ:'Pack Pizza J&Q', PPCyQ:'Pack Pizza C&Q',
  SCo:'Sorrentinos Copetín', SJyQ:'Sorrentinos J&Q', SCa:'Sorrentinos Calabaza',
  ECaC:'Empanadas Carne', EJyQ:'Empanadas J&Q', ECyQ:'Empanadas C&Q', EV:'Empanadas Verdura',
  TG:'Torta Golosa', TLC:'Torta Lemon Curd', TC:'Torta Chocolate',
  F:'Flan', PMu:'Pizza Muzza', PMa:'Pizza Margarita',
  PJyQ:'Pizza J&Q', PCC:'Pizza Cebolla', PJyM:'Pizza J&M'
};

// ── FORMAT ──
function fmt$(n){
  if(n>=1000000)return(n/1000000).toFixed(1).replace('.0','')+'M';
  if(n>=1000)return Math.round(n/1000).toLocaleString('es-AR')+'';
  return String(n);
}
function fmtFull$(n){return n.toLocaleString('es-AR');}

// ── NAV ──
function switchPage(page){
  currentPage=page;
  document.querySelectorAll('.nav-item:not(.exit)').forEach(function(n){n.classList.toggle('active',n.dataset.page===page);});
  document.querySelectorAll('.mobile-nav-item').forEach(function(n){n.classList.toggle('active',n.dataset.page===page);});
  document.querySelectorAll('.page').forEach(function(p){p.classList.toggle('active',p.id==='page-'+page);});
}

function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(function(){el.classList.remove('show');},2000);}

// ── NEXT DELIVERY ──
function getNextDelivery(){
  var now=new Date();
  var hoy=DIAS_SEMANA[now.getDay()];
  var hora=now.getHours();
  var entregaDias=Object.keys(ENTREGAS);
  // Check today first (if before delivery end)
  if(ENTREGAS[hoy]&&hora<21){
    return{dia:hoy,fecha:now,esHoy:true,info:ENTREGAS[hoy]};
  }
  // Find next delivery day
  for(var i=1;i<=7;i++){
    var d=new Date(now);d.setDate(d.getDate()+i);
    var nombre=DIAS_SEMANA[d.getDay()];
    if(ENTREGAS[nombre])return{dia:nombre,fecha:d,esHoy:false,info:ENTREGAS[nombre]};
  }
  return null;
}

// ── FETCH ──
function refresh(){
  var btn=document.getElementById('btnRefresh');
  btn.classList.add('spinning');
  setTimeout(function(){btn.classList.remove('spinning');},800);
  fetch(API+'?action=admin&t='+Date.now())
    .then(function(r){return r.json();})
    .then(function(d){
      DATA=d;
      localStorage.setItem('maleu_admin',JSON.stringify(d));
      render();
      updateSync();
      document.getElementById('loading').style.display='none';
      setStatus('online');
      toast('Datos actualizados');
    })
    .catch(function(){
      setStatus('offline');
      var c=localStorage.getItem('maleu_admin');
      if(c&&!DATA){DATA=JSON.parse(c);render();document.getElementById('loading').style.display='none';toast('Sin conexion — datos del cache');}
    });
}

function setStatus(s){
  var dot=document.getElementById('statusDot');
  var badge=document.getElementById('statusBadge');
  if(s==='online'){
    dot.className='status-dot-sm online';
    badge.className='status-badge ok';
    badge.innerHTML='<span class="status-dot-sm online"></span> Todo en orden';
  } else {
    dot.className='status-dot-sm offline';
    badge.className='status-badge error';
    badge.innerHTML='<span class="status-dot-sm offline"></span> Sin conexion';
  }
}

function updateSync(){
  var now=new Date();
  var hh=String(now.getHours()).padStart(2,'0');
  var mm=String(now.getMinutes()).padStart(2,'0');
  var ampm=now.getHours()>=12?'p. m.':'a. m.';
  var h12=now.getHours()%12||12;
  document.getElementById('syncTime').textContent='Act. '+String(h12).padStart(2,'0')+':'+mm+' '+ampm;
}

// ── RENDER ──
function render(){
  if(!DATA)return;
  renderHoy();
  renderPedidos();
  renderCaja();
  renderAbastecimiento();
  renderMetricas();
  document.getElementById('page-'+currentPage).classList.add('active');
  updateStatusBadge();
}

function updateStatusBadge(){
  var t=DATA.totales;
  var badge=document.getElementById('statusBadge');
  var dot=document.getElementById('statusDot');
  if(t.pendientes>0){
    badge.className='status-badge warn';
    badge.innerHTML='<span class="status-dot-sm online"></span> '+t.pendientes+' pendiente'+(t.pendientes>1?'s':'');
  } else {
    badge.className='status-badge ok';
    badge.innerHTML='<span class="status-dot-sm online"></span> Todo en orden';
  }
}

// ── HOY ──
function renderHoy(){
  var next=getNextDelivery();
  if(next){
    var f=next.fecha;
    document.getElementById('heroLabel').textContent=next.esHoy?'Hoy':'Mañana';
    if(!next.esHoy){
      var diff=Math.ceil((next.fecha-new Date())/(1000*60*60*24));
      if(diff>1)document.getElementById('heroLabel').textContent='En '+diff+' dias';
    }
    document.getElementById('heroTitle').textContent=(next.esHoy?'Hoy':'Mañana')+' \u00b7 '+next.dia;
    document.getElementById('heroDate').textContent=f.getDate()+' de '+MESES[f.getMonth()]+' \u00b7 '+f.getFullYear();
    document.getElementById('heroHorario').textContent=next.info.h;
  }

  // Alerts
  var ac=document.getElementById('alertContainer');
  ac.innerHTML='';
  var t=DATA.totales;
  if(t.pendientes===0&&t.reservados===0){
    ac.innerHTML='<div class="alert-card ok"><span class="alert-icon">&#9989;</span><div class="alert-text"><h3>Todo en orden</h3><p>No hay acciones pendientes</p></div></div>';
  } else {
    if(t.pendientes>0){
      ac.innerHTML+='<div class="alert-card warn"><span class="alert-icon">&#9888;&#65039;</span><div class="alert-text"><h3>'+t.pendientes+' pedido'+(t.pendientes>1?'s':'')+' sin confirmar</h3><p>Falta definir Origen (Deposito / Orden de Compra)</p></div></div>';
    }
    if(t.noCobrado>0){
      ac.innerHTML+='<div class="alert-card info"><span class="alert-icon">&#128176;</span><div class="alert-text"><h3>$'+fmtFull$(t.noCobrado)+' pendientes de cobro</h3><p>'+Math.round(t.noCobrado/Math.max(t.facturado,1)*100)+'% del facturado total</p></div></div>';
    }
  }

  // Delivery info
  var dc=document.getElementById('deliveryContainer');
  dc.innerHTML='';
  if(next){
    // Count orders for this delivery day
    var pedidosHoy=DATA.pedidos.filter(function(p){return p.de===next.dia&&p.es!=='Entregado'&&p.es!=='Cancelado';});
    if(pedidosHoy.length===0){
      dc.innerHTML='<div class="delivery-card"><span class="delivery-icon">&#128666;</span><div class="delivery-text"><h3>Sin pedidos para esta entrega</h3><p>'+next.dia+' \u00b7 '+next.info.h+'</p></div></div>';
    } else {
      var totalHoy=pedidosHoy.reduce(function(s,p){return s+p.$;},0);
      dc.innerHTML='<div class="delivery-card"><span class="delivery-icon">&#128666;</span><div class="delivery-text"><h3>'+pedidosHoy.length+' pedido'+(pedidosHoy.length>1?'s':'')+' para entregar</h3><p>'+next.dia+' \u00b7 '+next.info.h+' \u00b7 $'+fmtFull$(totalHoy)+'</p></div></div>';
    }
  }

  // Stock summary for today's orders
  var sb=document.getElementById('stockBadgeHoy');
  var sc=document.getElementById('stockHoyContainer');
  if(next){
    var pedidosHoy2=DATA.pedidos.filter(function(p){return p.de===next.dia&&p.es!=='Entregado'&&p.es!=='Cancelado';});
    if(pedidosHoy2.length===0){
      sb.textContent='sin pedidos';
      sc.innerHTML='<div class="empty-state"><div class="empty-state-icon">&#127881;</div><div class="empty-state-text">Sin pedidos activos para esta entrega.</div></div>';
    } else {
      // Aggregate products needed
      var needed={};
      pedidosHoy2.forEach(function(p){p.p.forEach(function(pr){needed[pr.a]=(needed[pr.a]||0)+pr.q;});});
      sb.textContent=pedidosHoy2.length+' pedido'+(pedidosHoy2.length>1?'s':'');
      sc.innerHTML='';
      Object.keys(needed).forEach(function(abbr){
        var qty=needed[abbr];
        var stockInfo=DATA.stock.find(function(s){return s.a===abbr;});
        var disp=stockInfo?stockInfo.d:0;
        var ok=disp>=qty;
        var item=document.createElement('div');
        item.className='stock-item';
        item.innerHTML='<div style="flex:1"><div class="stock-name">'+(PROD_NAMES[abbr]||abbr)+'</div><div class="stock-abbr">Necesita: '+qty+' \u00b7 Disponible: '+disp+'</div></div><div style="font-size:20px">'+(ok?'&#9989;':'&#9888;&#65039;')+'</div>';
        sc.appendChild(item);
      });
    }
  }
}

// ── PEDIDOS ──
function renderPedidos(){
  var fr=document.getElementById('filterRow');
  fr.innerHTML='';
  var canales=['Todos'];
  DATA.canales.forEach(function(c){if(c.pedidos>0)canales.push(c.nombre);});
  canales.forEach(function(c){
    var p=document.createElement('span');
    p.className='pill'+(filterCanal===c?' active':'');
    p.textContent=c;
    p.onclick=function(){filterCanal=c;renderPedidos();};
    fr.appendChild(p);
  });
  ['Todos','Pendiente','Reservado','Entregado','Cancelado'].forEach(function(e){
    var p=document.createElement('span');
    p.className='pill'+(filterEstado===e?' active':'');
    p.textContent=e;
    p.onclick=function(){filterEstado=e;renderPedidos();};
    fr.appendChild(p);
  });

  var ct=document.getElementById('pedidosContainer');
  ct.innerHTML='';
  var filtered=DATA.pedidos.filter(function(p){
    if(filterCanal!=='Todos'&&p.h!==filterCanal)return false;
    if(filterEstado!=='Todos'&&p.es!==filterEstado)return false;
    return true;
  });
  if(filtered.length===0){ct.innerHTML='<div class="empty-state"><div class="empty-state-icon">&#128230;</div><div class="empty-state-text">No hay pedidos con estos filtros</div></div>';return;}
  var orden={'Pendiente':0,'Reservado':1,'Entregado':2,'Cancelado':3};
  filtered.sort(function(a,b){return(orden[a.es]||0)-(orden[b.es]||0);});
  filtered.forEach(function(p){
    var card=document.createElement('div');
    card.className='pedido-card';
    var prods=p.p.map(function(pr){return pr.q+'x '+(PROD_NAMES[pr.a]||pr.a);}).join(' \u00b7 ');
    card.innerHTML='<div class="pedido-top"><span class="pedido-cliente">'+p.c+'</span><span class="pedido-total">$'+fmtFull$(p.$)+'</span></div><div class="pedido-meta"><span class="tag tag-canal">'+p.h+'</span><span class="tag tag-'+p.es.toLowerCase()+'">'+p.es+'</span><span class="tag tag-'+(p.ep==='Cobrado'?'cobrado':'nocobrado')+'">'+p.ep+'</span>'+(p.o&&p.o!=='Pendiente'?'<span class="tag tag-'+(p.o==='Depósito'||p.o==='Deposito'?'deposito':'oc')+'">'+p.o+'</span>':'')+'<span class="tag tag-canal">'+p.f+' \u00b7 '+p.de+'</span></div>'+(prods?'<div class="pedido-prods">'+prods+'</div>':'');
    ct.appendChild(card);
  });
}

// ── CAJA ──
function renderCaja(){
  var t=DATA.totales;
  var kpis=document.getElementById('cajaKpis');
  kpis.innerHTML='<div class="kpi accent"><div class="kpi-label">Facturado total</div><div class="kpi-value">$'+fmtFull$(t.facturado)+'</div><div class="kpi-sub">'+t.pedidos+' pedidos esta semana</div></div><div class="kpi green"><div class="kpi-label">Cobrado</div><div class="kpi-value">$'+fmtFull$(t.cobrado)+'</div><div class="progress-bar"><div class="progress-fill '+(t.facturado>0&&t.cobrado/t.facturado>=.7?'green':'orange')+'" style="width:'+(t.facturado>0?Math.round(t.cobrado/t.facturado*100):0)+'%"></div></div></div><div class="kpi warn"><div class="kpi-label">Pendiente de cobro</div><div class="kpi-value">$'+fmtFull$(t.noCobrado)+'</div><div class="kpi-sub">'+(t.facturado>0?Math.round(t.noCobrado/t.facturado*100):0)+'% del total</div></div><div class="kpi"><div class="kpi-label">Ticket promedio</div><div class="kpi-value">$'+fmtFull$(t.ticket)+'</div></div>';

  var cc=document.getElementById('cajaContainer');
  cc.innerHTML='';
  DATA.canales.forEach(function(c){
    if(c.pedidos===0)return;
    var pctCob=c.facturado>0?Math.round(c.cobrado/c.facturado*100):0;
    var row=document.createElement('div');
    row.className='caja-row';
    row.innerHTML='<div class="caja-canal">'+c.nombre+'</div><div class="caja-bar"><div class="caja-bar-fill cobrado" style="width:'+pctCob+'%"></div><div class="caja-bar-fill pendiente" style="width:'+(100-pctCob)+'%"></div></div><div class="caja-amounts"><span class="caja-amt green">$'+fmt$(c.cobrado)+'</span><span class="caja-amt orange">$'+fmt$(c.noCobrado)+'</span></div>';
    cc.appendChild(row);
  });
}

// ── ABASTECIMIENTO ──
function renderAbastecimiento(){
  var kpis=document.getElementById('abastKpis');
  var lowStock=DATA.stock.filter(function(s){return s.d<=3;}).length;
  var zeroStock=DATA.stock.filter(function(s){return s.d<=0;}).length;
  kpis.innerHTML='<div class="kpi'+(DATA.oc.pendientes>0?' warn':'')+'"><div class="kpi-label">OC abiertas</div><div class="kpi-value">'+DATA.oc.pendientes+'</div><div class="kpi-sub">'+(DATA.oc.costo>0?'$'+fmtFull$(DATA.oc.costo)+' en compras':'Sin compras pendientes')+'</div></div><div class="kpi'+(zeroStock>0?' warn':'')+'"><div class="kpi-label">Alertas stock</div><div class="kpi-value">'+(zeroStock>0?zeroStock+' sin stock':lowStock>0?lowStock+' bajos':'OK')+'</div><div class="kpi-sub">'+DATA.stock.length+' productos en catalogo</div></div>';

  var sc=document.getElementById('stockContainer');
  sc.innerHTML='';
  if(!DATA.stock||DATA.stock.length===0){sc.innerHTML='<div class="empty-state"><div class="empty-state-icon">&#128230;</div><div class="empty-state-text">Sin datos de stock</div></div>';return;}
  var sorted=DATA.stock.slice().sort(function(a,b){return a.d-b.d;});
  sorted.forEach(function(s){
    var item=document.createElement('div');
    item.className='stock-item';
    var cls=s.d<=0?'zero':s.d<=3?'low':'ok';
    item.innerHTML='<div style="flex:1"><div class="stock-name">'+s.n+'</div><div class="stock-abbr">'+s.a+'</div></div><div class="stock-nums"><div class="stock-num"><div class="stock-num-val">'+s.f+'</div><div class="stock-num-label">Fisico</div></div><div class="stock-num"><div class="stock-num-val">'+s.r+'</div><div class="stock-num-label">Reserv.</div></div><div class="stock-num"><div class="stock-num-val '+cls+'">'+s.d+'</div><div class="stock-num-label">Disp.</div></div></div>';
    sc.appendChild(item);
  });
}

// ── METRICAS ──
function renderMetricas(){
  var t=DATA.totales;
  var kpis=document.getElementById('metricasKpis');
  kpis.innerHTML='<div class="kpi accent"><div class="kpi-label">Facturacion semana</div><div class="kpi-value">$'+fmtFull$(t.facturado)+'</div></div><div class="kpi"><div class="kpi-label">Pedidos</div><div class="kpi-value">'+t.pedidos+'</div><div class="kpi-sub">'+t.entregados+' ent \u00b7 '+t.reservados+' res \u00b7 '+t.pendientes+' pend</div></div><div class="kpi"><div class="kpi-label">Ticket promedio</div><div class="kpi-value">$'+fmtFull$(t.ticket)+'</div></div><div class="kpi"><div class="kpi-label">Tasa de cobro</div><div class="kpi-value">'+(t.facturado>0?Math.round(t.cobrado/t.facturado*100):0)+'%</div><div class="progress-bar"><div class="progress-fill '+(t.facturado>0&&t.cobrado/t.facturado>=.7?'green':'orange')+'" style="width:'+(t.facturado>0?Math.round(t.cobrado/t.facturado*100):0)+'%"></div></div></div>';

  var mc=document.getElementById('metricasCanales');
  mc.innerHTML='';
  DATA.canales.forEach(function(c){
    if(c.pedidos===0)return;
    var card=document.createElement('div');
    card.className='canal-card';
    card.innerHTML='<div class="canal-header"><span class="canal-name">'+c.nombre+'</span><span class="canal-badge">'+c.pedidos+' pedidos</span></div><div class="canal-stats"><div class="canal-stat"><div class="canal-stat-value">$'+fmt$(c.facturado)+'</div><div class="canal-stat-label">Facturado</div></div><div class="canal-stat"><div class="canal-stat-value" style="color:#2E7D32">$'+fmt$(c.cobrado)+'</div><div class="canal-stat-label">Cobrado</div></div><div class="canal-stat"><div class="canal-stat-value" style="color:#E65100">$'+fmt$(c.noCobrado)+'</div><div class="canal-stat-label">Pend. cobro</div></div></div><div class="progress-bar" style="margin-top:10px"><div class="progress-fill '+(c.facturado>0&&c.cobrado/c.facturado>=.7?'green':'orange')+'" style="width:'+(c.facturado>0?Math.round(c.cobrado/c.facturado*100):0)+'%"></div></div>';
    mc.appendChild(card);
  });
}

// ── INIT ──
(function(){
  var c=localStorage.getItem('maleu_admin');
  if(c){try{DATA=JSON.parse(c);render();document.getElementById('loading').style.display='none';}catch(e){}}
  refresh();
  setInterval(refresh,120000);
  window.addEventListener('online',function(){setStatus('online');refresh();});
  window.addEventListener('offline',function(){setStatus('offline');});
})();
if('serviceWorker' in navigator){navigator.serviceWorker.register('/estancias/sw-admin.js').catch(function(){});}
