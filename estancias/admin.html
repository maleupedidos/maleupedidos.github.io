<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#331C1C">
<link rel="manifest" href="/estancias/admin-manifest.json">
<link rel="icon" href="/img/favicon.png">
<link rel="apple-touch-icon" href="/img/favicon.png">
<title>Maleu Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#F5F2EB;color:#331C1C;overflow-x:hidden;min-height:100dvh}

/* ── TOP BAR ── */
.topbar{background:#331C1C;color:#F2E8C7;padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.topbar h1{font-size:17px;font-weight:800;flex:1;letter-spacing:.03em}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.status-dot.online{background:#4CAF50}
.status-dot.offline{background:#F44336;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-time{font-size:10px;color:#A89880;white-space:nowrap}
.btn-refresh{background:none;border:none;color:#F2E8C7;font-size:20px;cursor:pointer;padding:8px;border-radius:8px;line-height:1}
.btn-refresh:active{background:rgba(255,255,255,.15)}
.btn-refresh.spinning{animation:spin .8s linear}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TABS ── */
.tabs{display:flex;background:#E8DFC4;position:sticky;top:52px;z-index:99;border-bottom:1px solid #D4C8A0}
.tab{flex:1;padding:12px 8px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;transition:.15s;color:#7A4A4A}
.tab.active{border-bottom-color:#F07D47;color:#F07D47}

/* ── LOADING / EMPTY ── */
.loading{text-align:center;padding:80px 20px;color:#7A4A4A;font-style:italic}

/* ── SECTION ── */
.section{display:none;padding:12px;padding-bottom:80px}
.section.active{display:block}

/* ── KPI GRID ── */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.kpi{background:#fff;border-radius:14px;padding:16px;border:2px solid #E8DFC4}
.kpi-label{font-size:11px;font-weight:700;color:#7A4A4A;text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
.kpi-value{font-size:24px;font-weight:800;color:#331C1C;line-height:1.1}
.kpi-value.money::before{content:'$';font-size:16px;font-weight:700;color:#7A4A4A;margin-right:2px}
.kpi-sub{font-size:11px;color:#A89880;margin-top:4px}
.kpi.wide{grid-column:1/-1}
.kpi.accent{border-color:#F07D47;background:linear-gradient(135deg,#FFF8F0,#fff)}
.kpi.green{border-color:#4CAF50}
.kpi.warn{border-color:#FF9800}

/* ── CANAL CARDS ── */
.canal-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px;border:2px solid #E8DFC4}
.canal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.canal-name{font-size:15px;font-weight:800}
.canal-badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:50px;background:#F5F2EB;color:#7A4A4A}
.canal-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.canal-stat{text-align:center}
.canal-stat-value{font-size:18px;font-weight:800}
.canal-stat-label{font-size:10px;color:#7A4A4A;text-transform:uppercase}

/* ── PEDIDO LIST ── */
.pedido-card{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:8px;border:2px solid #E8DFC4;transition:.15s}
.pedido-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.pedido-cliente{font-size:14px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pedido-total{font-size:14px;font-weight:800;color:#331C1C}
.pedido-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:50px;white-space:nowrap}
.tag-canal{background:#E8DFC4;color:#7A4A4A}
.tag-pendiente{background:#FFF3E0;color:#E65100}
.tag-reservado{background:#E3F2FD;color:#1565C0}
.tag-entregado{background:#E8F5E9;color:#2E7D32}
.tag-cancelado{background:#FFEBEE;color:#C62828}
.tag-cobrado{background:#E8F5E9;color:#2E7D32}
.tag-nocobrado{background:#FFF3E0;color:#E65100}
.tag-deposito{background:#E3F2FD;color:#1565C0}
.tag-oc{background:#F3E5F5;color:#6A1B9A}
.pedido-prods{font-size:11px;color:#7A4A4A;margin-top:6px}

/* ── STOCK LIST ── */
.stock-item{background:#fff;border-radius:12px;padding:12px 16px;margin-bottom:6px;border:2px solid #E8DFC4;display:flex;align-items:center;gap:12px}
.stock-name{flex:1;font-size:13px;font-weight:600}
.stock-abbr{font-size:11px;color:#7A4A4A}
.stock-nums{display:flex;gap:12px;align-items:center}
.stock-num{text-align:center}
.stock-num-val{font-size:16px;font-weight:800}
.stock-num-label{font-size:9px;color:#7A4A4A;text-transform:uppercase}
.stock-num-val.low{color:#E65100}
.stock-num-val.ok{color:#2E7D32}
.stock-num-val.zero{color:#C62828}

/* ── PROGRESS BAR ── */
.progress-bar{height:6px;background:#E8DFC4;border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width .3s}
.progress-fill.green{background:#4CAF50}
.progress-fill.orange{background:#FF9800}

/* ── FILTER PILLS ── */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding:0 0 12px;-webkit-overflow-scrolling:touch}
.filter-row::-webkit-scrollbar{display:none}
.pill{font-size:12px;font-weight:700;padding:6px 14px;border-radius:50px;border:2px solid #E8DFC4;background:#fff;color:#7A4A4A;cursor:pointer;white-space:nowrap;transition:.15s}
.pill.active{background:#331C1C;color:#F2E8C7;border-color:#331C1C}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:40px 20px;color:#A89880}
.empty-state-icon{font-size:40px;margin-bottom:8px}
.empty-state-text{font-size:14px}

/* ── TOAST ── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#331C1C;color:#F2E8C7;padding:10px 20px;border-radius:50px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="status-dot online" id="statusDot"></div>
  <h1>MALEU ADMIN</h1>
  <span class="sync-time" id="syncTime">--:--</span>
  <button class="btn-refresh" id="btnRefresh" onclick="refresh()">&#x21bb;</button>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" data-tab="resumen" onclick="switchTab('resumen')">Resumen</div>
  <div class="tab" data-tab="pedidos" onclick="switchTab('pedidos')">Pedidos</div>
  <div class="tab" data-tab="stock" onclick="switchTab('stock')">Stock</div>
</div>

<!-- LOADING -->
<div class="loading" id="loading">Cargando datos de Maleu...</div>

<!-- ══ TAB: RESUMEN ══ -->
<div class="section" id="sec-resumen">

  <!-- KPIs principales -->
  <div class="kpi-grid" id="kpiGrid">
    <div class="kpi accent">
      <div class="kpi-label">Facturado</div>
      <div class="kpi-value money" id="kpiFact">0</div>
      <div class="kpi-sub" id="kpiFactSub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Pedidos</div>
      <div class="kpi-value" id="kpiPedidos">0</div>
      <div class="kpi-sub" id="kpiPedidosSub"></div>
    </div>
    <div class="kpi green">
      <div class="kpi-label">Cobrado</div>
      <div class="kpi-value money" id="kpiCobrado">0</div>
      <div class="progress-bar"><div class="progress-fill green" id="progCobrado"></div></div>
    </div>
    <div class="kpi warn">
      <div class="kpi-label">Pendiente cobro</div>
      <div class="kpi-value money" id="kpiNoCobrado">0</div>
      <div class="kpi-sub" id="kpiNoCobradoSub"></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Ticket promedio</div>
      <div class="kpi-value money" id="kpiTicket">0</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">OC abiertas</div>
      <div class="kpi-value" id="kpiOC">0</div>
      <div class="kpi-sub" id="kpiOCSub"></div>
    </div>
  </div>

  <!-- Canales -->
  <div id="canalesContainer"></div>
</div>

<!-- ══ TAB: PEDIDOS ══ -->
<div class="section" id="sec-pedidos">
  <div class="filter-row" id="filterRow"></div>
  <div id="pedidosContainer"></div>
</div>

<!-- ══ TAB: STOCK ══ -->
<div class="section" id="sec-stock">
  <div id="stockContainer"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxmrG5YVSshcYezk8lXFx_uxb7NFGcb9EfTXc7dsIN4rZyj73CET4mk_aKPFPDY2wNi/exec';
var DATA = null;
var currentTab = 'resumen';
var filterCanal = 'Todos';
var filterEstado = 'Todos';

// ── NOMBRES PRODUCTOS ──
var PROD_NAMES = {
  PPM:'Pack Pizza Muzza', PPJyQ:'Pack Pizza J&Q', PPCyQ:'Pack Pizza C&Q',
  SCo:'Sorrentinos Copetín', SJyQ:'Sorrentinos J&Q', SCa:'Sorrentinos Calabaza',
  ECaC:'Empanadas Carne', EJyQ:'Empanadas J&Q', ECyQ:'Empanadas C&Q', EV:'Empanadas Verdura',
  TG:'Torta Golosa', TLC:'Torta Lemon Curd', TC:'Torta Chocolate',
  F:'Flan', PMu:'Pizza Muzza', PMa:'Pizza Margarita',
  PJyQ:'Pizza J&Q', PCC:'Pizza Cebolla', PJyM:'Pizza J&M'
};

// ── FORMAT ──
function fmt$(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1).replace('.0','') + 'M';
  if (n >= 1000) return Math.round(n/1000) + 'K';
  return String(n);
}
function fmtFull$(n) {
  return n.toLocaleString('es-AR');
}

// ── TABS ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.toggle('active', t.dataset.tab === tab); });
  document.querySelectorAll('.section').forEach(function(s){ s.classList.toggle('active', s.id === 'sec-' + tab); });
}

// ── TOAST ──
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2000);
}

// ── FETCH DATA ──
function refresh() {
  var btn = document.getElementById('btnRefresh');
  btn.classList.add('spinning');
  setTimeout(function(){ btn.classList.remove('spinning'); }, 800);

  fetch(APPS_SCRIPT_URL + '?action=admin&t=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(d){
      DATA = d;
      localStorage.setItem('maleu_admin', JSON.stringify(d));
      render();
      updateSyncTime();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('statusDot').className = 'status-dot online';
      toast('Datos actualizados');
    })
    .catch(function(err){
      console.error(err);
      document.getElementById('statusDot').className = 'status-dot offline';
      // Try cache
      var cached = localStorage.getItem('maleu_admin');
      if (cached && !DATA) {
        DATA = JSON.parse(cached);
        render();
        document.getElementById('loading').style.display = 'none';
        toast('Sin conexion - datos del cache');
      }
    });
}

function updateSyncTime() {
  var now = new Date();
  var hh = String(now.getHours()).padStart(2,'0');
  var mm = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('syncTime').textContent = hh + ':' + mm;
}

// ── RENDER ──
function render() {
  if (!DATA) return;
  renderResumen();
  renderPedidos();
  renderStock();
  // Show first tab
  document.getElementById('sec-' + currentTab).classList.add('active');
}

function renderResumen() {
  var t = DATA.totales;

  document.getElementById('kpiFact').textContent = fmtFull$(t.facturado);
  document.getElementById('kpiFactSub').textContent = t.entregados + ' entregados / ' + t.pendientes + ' pendientes';
  document.getElementById('kpiPedidos').textContent = t.pedidos;
  document.getElementById('kpiPedidosSub').textContent = t.entregados + ' ent · ' + t.reservados + ' res · ' + t.pendientes + ' pend';
  document.getElementById('kpiCobrado').textContent = fmtFull$(t.cobrado);
  document.getElementById('kpiNoCobrado').textContent = fmtFull$(t.noCobrado);
  document.getElementById('kpiNoCobradoSub').textContent = t.facturado > 0 ? Math.round(t.noCobrado / t.facturado * 100) + '% del total' : '';
  document.getElementById('kpiTicket').textContent = fmtFull$(t.ticket);
  document.getElementById('kpiOC').textContent = DATA.oc.pendientes;
  document.getElementById('kpiOCSub').textContent = DATA.oc.costo > 0 ? '$' + fmtFull$(DATA.oc.costo) + ' en compras' : '';

  // Progress cobrado
  var pct = t.facturado > 0 ? Math.round(t.cobrado / t.facturado * 100) : 0;
  var prog = document.getElementById('progCobrado');
  prog.style.width = pct + '%';
  prog.className = 'progress-fill ' + (pct >= 70 ? 'green' : 'orange');

  // Canales
  var container = document.getElementById('canalesContainer');
  container.innerHTML = '';
  DATA.canales.forEach(function(c) {
    if (c.pedidos === 0) return;
    var card = document.createElement('div');
    card.className = 'canal-card';
    card.innerHTML =
      '<div class="canal-header">' +
        '<span class="canal-name">' + c.nombre + '</span>' +
        '<span class="canal-badge">' + c.pedidos + ' pedidos</span>' +
      '</div>' +
      '<div class="canal-stats">' +
        '<div class="canal-stat"><div class="canal-stat-value">$' + fmt$(c.facturado) + '</div><div class="canal-stat-label">Facturado</div></div>' +
        '<div class="canal-stat"><div class="canal-stat-value" style="color:#2E7D32">$' + fmt$(c.cobrado) + '</div><div class="canal-stat-label">Cobrado</div></div>' +
        '<div class="canal-stat"><div class="canal-stat-value" style="color:#E65100">$' + fmt$(c.noCobrado) + '</div><div class="canal-stat-label">Pend. cobro</div></div>' +
      '</div>' +
      '<div class="progress-bar" style="margin-top:10px"><div class="progress-fill ' + (c.facturado > 0 && c.cobrado/c.facturado >= .7 ? 'green' : 'orange') + '" style="width:' + (c.facturado > 0 ? Math.round(c.cobrado/c.facturado*100) : 0) + '%"></div></div>';
    container.appendChild(card);
  });
}

function renderPedidos() {
  // Filters
  var filterRow = document.getElementById('filterRow');
  filterRow.innerHTML = '';
  var canales = ['Todos'];
  DATA.canales.forEach(function(c){ if (c.pedidos > 0) canales.push(c.nombre); });
  canales.forEach(function(c) {
    var pill = document.createElement('span');
    pill.className = 'pill' + (filterCanal === c ? ' active' : '');
    pill.textContent = c;
    pill.onclick = function(){ filterCanal = c; renderPedidos(); };
    filterRow.appendChild(pill);
  });
  // Estado pills
  var estados = ['Todos','Pendiente','Reservado','Entregado','Cancelado'];
  estados.forEach(function(e) {
    var pill = document.createElement('span');
    pill.className = 'pill' + (filterEstado === e ? ' active' : '');
    pill.textContent = e;
    pill.onclick = function(){ filterEstado = e; renderPedidos(); };
    filterRow.appendChild(pill);
  });

  var container = document.getElementById('pedidosContainer');
  container.innerHTML = '';

  var filtered = DATA.pedidos.filter(function(p) {
    if (filterCanal !== 'Todos' && p.h !== filterCanal) return false;
    if (filterEstado !== 'Todos' && p.es !== filterEstado) return false;
    return true;
  });

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#128230;</div><div class="empty-state-text">No hay pedidos con estos filtros</div></div>';
    return;
  }

  // Sort: pendientes primero, luego reservados, entregados, cancelados
  var orden = { 'Pendiente': 0, 'Reservado': 1, 'Entregado': 2, 'Cancelado': 3 };
  filtered.sort(function(a,b){ return (orden[a.es]||0) - (orden[b.es]||0); });

  filtered.forEach(function(p) {
    var card = document.createElement('div');
    card.className = 'pedido-card';

    var estadoClass = 'tag-' + p.es.toLowerCase();
    var pagoClass = p.ep === 'Cobrado' ? 'tag-cobrado' : 'tag-nocobrado';
    var origenClass = p.o === 'Deposito' || p.o === 'Depósito' ? 'tag-deposito' : p.o === 'Orden de Compra' ? 'tag-oc' : 'tag-pendiente';

    var prodsText = p.p.map(function(pr){ return pr.q + 'x ' + (PROD_NAMES[pr.a] || pr.a); }).join(' · ');

    card.innerHTML =
      '<div class="pedido-top">' +
        '<span class="pedido-cliente">' + p.c + '</span>' +
        '<span class="pedido-total">$' + fmtFull$(p.$) + '</span>' +
      '</div>' +
      '<div class="pedido-meta">' +
        '<span class="tag tag-canal">' + p.h + '</span>' +
        '<span class="tag ' + estadoClass + '">' + p.es + '</span>' +
        '<span class="tag ' + pagoClass + '">' + p.ep + '</span>' +
        (p.o && p.o !== 'Pendiente' ? '<span class="tag ' + origenClass + '">' + p.o + '</span>' : '') +
        '<span class="tag" style="background:#F5F2EB;color:#7A4A4A">' + p.f + ' · ' + p.de + '</span>' +
      '</div>' +
      (prodsText ? '<div class="pedido-prods">' + prodsText + '</div>' : '');

    container.appendChild(card);
  });
}

function renderStock() {
  var container = document.getElementById('stockContainer');
  container.innerHTML = '';

  if (!DATA.stock || DATA.stock.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">&#128230;</div><div class="empty-state-text">Sin datos de stock</div></div>';
    return;
  }

  // Sort: low stock first
  var sorted = DATA.stock.slice().sort(function(a,b){ return a.d - b.d; });

  sorted.forEach(function(s) {
    var item = document.createElement('div');
    item.className = 'stock-item';

    var dispClass = s.d <= 0 ? 'zero' : s.d <= 3 ? 'low' : 'ok';

    item.innerHTML =
      '<div style="flex:1">' +
        '<div class="stock-name">' + s.n + '</div>' +
        '<div class="stock-abbr">' + s.a + '</div>' +
      '</div>' +
      '<div class="stock-nums">' +
        '<div class="stock-num"><div class="stock-num-val">' + s.f + '</div><div class="stock-num-label">Fisico</div></div>' +
        '<div class="stock-num"><div class="stock-num-val">' + s.r + '</div><div class="stock-num-label">Reserv.</div></div>' +
        '<div class="stock-num"><div class="stock-num-val ' + dispClass + '">' + s.d + '</div><div class="stock-num-label">Disp.</div></div>' +
      '</div>';

    container.appendChild(item);
  });
}

// ── INIT ──
(function init() {
  // Try cache first for instant load
  var cached = localStorage.getItem('maleu_admin');
  if (cached) {
    try {
      DATA = JSON.parse(cached);
      render();
      document.getElementById('loading').style.display = 'none';
      document.getElementById('sec-resumen').classList.add('active');
    } catch(e) {}
  }
  // Then fetch fresh
  refresh();

  // Auto-refresh every 2 minutes
  setInterval(refresh, 120000);

  // Online/offline events
  window.addEventListener('online', function(){
    document.getElementById('statusDot').className = 'status-dot online';
    refresh();
  });
  window.addEventListener('offline', function(){
    document.getElementById('statusDot').className = 'status-dot offline';
  });
})();

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/estancias/sw-admin.js').catch(function(){});
}
</script>
</body>
</html>
